<!doctype html>

<head>

<title>Harvest Moon SNES Text Editor Helper</title>
<style>
:root { color-scheme: dark; --bg:#101217; --panel:#181c24; --line:#2b3240; --text:#eef2ff; --muted:#9aa4b2; --accent:#8ab4ff; }
* { box-sizing:border-box; }
body { margin:0; font-family:system-ui,Segoe UI,Arial,sans-serif; background:var(--bg); color:var(--text); }
header { position:sticky; top:0; background:linear-gradient(180deg,#171b23,#101217); border-bottom:1px solid var(--line); padding:16px; z-index:2; }
h1 { margin:0 0 10px; font-size:20px; }
.controls { display:grid; grid-template-columns: 1fr 170px 140px; gap:10px; }
input, select, textarea { width:100%; background:#0c0f14; color:var(--text); border:1px solid var(--line); border-radius:10px; padding:10px; }
main { padding:16px; display:grid; gap:12px; }
.card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; }
.meta { color:var(--muted); font-size:12px; display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
.label { color:var(--accent); font-family:ui-monospace,Consolas,monospace; }
pre { white-space:pre-wrap; overflow-wrap:anywhere; background:#0c0f14; border:1px solid var(--line); border-radius:10px; padding:10px; }
button { background:#263143; color:var(--text); border:1px solid #3a4658; border-radius:10px; padding:8px 10px; cursor:pointer; }
button:hover { border-color:var(--accent); }
.small { font-size:12px; color:var(--muted); }
@media (max-width:760px) { .controls { grid-template-columns:1fr; } }
</style>
</head>

d, <LINE>It's the feed for cows and  chickens. I would be thrown into a pinch if<LINE>it's gone."}, {"index_hex": "010", "bank": "B6", "snes_addr": "B68B5E", "label": "Text_Manual_Hoe", "category": "Manual", "max_words": "133", "markup_text": "\"Hoe\"                       Plow the ground to make a   field.<LINE>Raise vegetables in the     field.<LINE>Try various ways to make thefield."}, {"index_hex": "011", "bank": "B6", "snes_addr": "B68C68", "label": "Text_Manual_Axe", "category": "Manual", "max_words": "131", "markup_text": "\"Axe\"                       Split logs to make lumber.  Lumber is useful.<LINE>Focus on one point and hit. Don't enter the control pad."}, {"index_hex": "012", "bank": "B6", "snes_addr": "B68D6E", "label": "Text_Manual_Hammer", "category": "Manual", "max_words": "172", "markup_text": "\"Hammer\"                    Breaks rocks and breaks     fences down.<LINE>Big rocks can be knocked    down when focusing on one   spot.<LINE>Don't ever enter the        control pad."}, {"index_hex": "013", "bank": "B6", "snes_addr": "B68EC6", "label": "Text_Manual_Can", "category": "Manual", "max_words": "160", "markup_text": "\"Watering can\"              Water the crops. Once a day.No watering is necessary<LINE>on rainy days.              Dip up water at a well or a pond when it runs out."}, {"index_hex": "014", "bank": "B6", "snes_addr": "B69006", "label": "Text_Manual_Milker", "category": "Manual", "max_words": "57", "markup_text": "\"Milker\"                    Milk cows and ship the milk."}, {"index_hex": "015", "bank": "B6", "snes_addr": "B69078", "label": "Text_Manual_Brush", "category": "Manual", "max_words": "125", "markup_text": "\"Brush\"                     Brushing raises the cows'   level of affection.<LINE>A cow with High affection   gives a lot of milk."}, {"index_hex": "016", "bank": "B6", "snes_addr": "B69172", "label": "Text_Manual_Bell", "category": "Manual", "max_words": "107", "markup_text": "\"Bell\"                      A tool used daughter Anncan get married living like that."}, {"index_hex": "041", "bank": "B6", "snes_addr": "B6AA16", "label": "Text_041_Animal_HowsWorkGoingSomeWild", "category": "Animal", "max_words": "85", "markup_text": "Hi: how's your work going?  There are some wild dogs:   so you should fix the fence."}, {"index_hex": "042", "bank": "B6", "snes_addr": "B6AAC0", "label": "Text_042_Church_BelieveGodExistsBelieve", "category": "Church", "max_words": "55", "markup_text": "I believe God exists.       You believe it: don't you?"}, {"index_hex": "043", "bank": "B6", "snes_addr": "B6AB2E", "label": "Text_043_Dialog_StrangeAlwaysNowNothingAll", "category": "Dialog", "max_words": "97", "markup_text": "Hey: it's strange. She is   always here by now.<LINE>.....oh no:                 it's nothing at all."}, {"index_hex": "044", "bank": "B6", "snes_addr": "B6ABF0", "label": "Text_044_Dialog_TakingWalkTooImportantGet", "category": "Dialog", "max_words": "151", "markup_text": "Hi. Are you taking a walk   too? It's important to get afew days off.<LINE>Working hard till late at   night will drive you crazy: mentally and physically."}, {"index_hex": "045", "bank": "B6", "snes_addr": "B6AD1E", "label": "Text_045_Romance_HelpMyselfWorryingAboutAnn", "category": "Romance", "max_words": "180", "markup_text": "I just can't help myself    worrying about Ann so much. Mr. <CTRL_FFFD>eh: you are of the<LINE>same generation as Ann.     What do you think of her?   ....oh: sorry.<LINE>Maybe I'm a little confused."}, {"index_hex": "046", "bank": "B6", "snes_addr": "B6AE86", "label": "Text_046_Shop_AlwaysLookFineBagSeed", "category": "Shop", "max_words": "99", "markup_text": "Hello. You always look fine.The bag of seed for sowing. It's convenient to buy<LINE>a few bags at once."}, {"index_hex": "047", "bank": "B6", "snes_addr": "B6AF4C", "label": "Text_047_Dialog_GrassGrowsAutumnYoudontHave", "category": "Dialog", "max_words": "71", "markup_text": "Grass grows in Autumn so youdon't have to mow much      before Winter."}, {"index_hex": "048", "bank": "B6", "snes_addr": "B6AFDA", "label": "Text_048_Romance_MayEveryoneGiveKindnessEveryone", "category": "Romance", "max_words": "49", "markup_text": "May everyone give kindness  to everyone else...."}, {"index_hex": "049", "bank": "B6", "snes_addr": "B6B03C", "label": "Text_049_Dialog_Entry", "category": "Dialog", "max_words": "5", "markup_text": "...."}, {"index_hex": "04A", "bank": "B6", "snes_addr": "B6B046", "label": "Text_04A_Sign_ShopClosedSaturdaysBathingInthe", "category": "Sign", "max_words": "75", "markup_text": "What? The shop is closed on Saturdays. So I'm bathing inthe sun. Nice:huh?"}, {"index_hex": "04B", "bank": "B6", "snes_addr": "B6B0DC", "label": "Text_04B_Weather_KindDarkRainyDaysFeels", "category": "Weather", "max_words": "129", "markup_text": "It's kind of dark on rainy  days....feels slightly      lonely:doesn't it?<LINE>But the rain is good when itcomes to producing crops."}, {"index_hex": "04C", "bank": "B6", "snes_addr": "B6B1DE", "label": "Text_04C_Dialog_CoincidenceHavingMealToday", "category": "Dialog", "max_words": "54", "markup_text": "What a coincidence. Are you having a meal here today?"}, {"index_hex": "04D", "bank": "B6", "snes_addr": "B6B24A", "label": "Text_04D_Dialog_EasyWorkSteadilyButWorthwhile", "category": "Dialog", "max_words": "68", "markup_text": "It's not easy to work       steadily but it's           worthwhile."}, {"index_hex": "04E", "bank": "B6", "snes_addr": "B6B2D2", "label": "Text_04E_Church_HopeBusinessBetterBetterGod", "category": "Church", "max_words": "107", "markup_text": "Hope business will be       better:it will be better   ....<LINE>What? Isn't it the God of   business? Oh:well."}, {"index_hex": "04F", "bank": "B6", "snes_addr": "B6B3A8", "label": "Text_04F_Diary_GoodBatheSunEatWork", "category": "Diary", "max_words": "100", "markup_text": "It's good to bathe in the   sun. Eat well and work hard.Good health is the<LINE>foundation of happiness."}, {"index_hex": "050", "bank": "B6", "snes_addr": "B6B470", "label": "Text_050_Animal_EatSomethingTiredCakesBest", "category": "Animal", "max_words": "81", "markup_text": "Eat something when you are  tired. Our cakes are the    best to get more energy."}, {"index_hex": "051", "bank": "B6", "snes_addr": "B6B512", "label": "Text_051_Dialog_HowdyYoungBoysWhatsUp", "category": "Dialog", "max_words": "37", "markup_text": "Howdy:young boys, What's up?....hic."}, {"index_hex": "052", "bank": "B6", "snes_addr": "B6B55C", "label": "Text_052_Animal_HicWorkingLikeDogOnly", "category": "Animal", "max_words": "57", "markup_text": "...hic:working like a dog   is not the only way to live."}, {"index_hex": "053", "bank": "B6", "snes_addr": "B6B5CE", "label": "Text_053_Dialog_MyRoutineTakeWalkSundays", "category": "Dialog", "max_words": "65", "markup_text": "It's my routine to take a   walk on Sundays so it's OK  with me."}, {"index_hex": "054", "bank": "B6", "snes_addr": "B6B650", "label": "Text_054_Weather_StartedRainingNowGeeWas", "category": "Weather", "max_words": "107", "markup_text": "Oh no:it started raining    now...gee: I was going to   work.<LINE>Well:I can do nothing but   stay home today."}, {"index_hex": "055", "bank": "B6", "snes_addr": "B6B726", "label": "Text_055_Weather_SayingMatterIfRainsWork", "category": "Weather", "max_words": "83", "markup_text": "What are you saying?        It doesn't matter if It     rains to do our work here,"}, {"index_hex": "056", "bank": "B6", "snes_addr": "B6B7CC", "label": "Text_056_Dialog_UlpSooooGreatShesOut", "category": "Dialog", "max_words": "77", "markup_text": "ulp...soooo...great,        She's out.I can relax as    much as<LINE>I want:yeah."}, {"index_hex": "057", "bank": "B6", "snes_addr": "B6B866", "label": "Text_057_Church_CalmInsideChurchManyPeople", "category": "Church", "max_words": "102", "markup_text": "You can be calm inside the  church.Not many people here:you know.<LINE>It's crowded on holidays    though."}, {"index_hex": "058", "bank": "B6", "snes_addr": "B6B932", "label": "Text_058_Animal_FeltTimeWentSlowlyWas", "category": "Animal", "max_words": "131", "markup_text": "I felt time went by slowly  when I was young.           Now time goes by too fast<LINE>and one year seems short.   It's strange:really."}, {"index_hex": "059", "bank": "B6", "snes_addr": "B6BA38", "label": "Text_059_Animal_HaveSympathyPeopleKindPeople", "category": "Animal", "max_words": "136", "markup_text": "Have sympathy for people.   When you are kind to people:they give you<LINE>kindness in return.         Animals are the same as us  for sure."}, {"index_hex": "05A", "bank": "B6", "snes_addr": "B6BB48", "label": "Text_05A_Dialog_NecessarilyRightWrongDailyIncidents", "category": "Dialog", "max_words": "92", "markup_text": "It's not necessarily right  or wrong. Daily incidents   are neither.<LINE>It's up to you:really."}, {"index_hex": "05B", "bank": "B6", "snes_addr": "B6BC00", "label": "Text_05B_Weather_KnowConsumeYourstaminaRainyDay", "category": "Weather", "max_words": "83", "markup_text": "I know it won't consume yourstamina on a rainy day but  you should be off.<LINE>Really."}, {"index_hex": "05C", "bank": "B6", "snes_addr": "B6BCA6", "label": "Text_05C_Animal_ToughTakeCareCowsTake", "category": "Animal", "max_words": "163", "markup_text": "It's tough to take care of  cows.Take good care of them so that they do not<LINE>get sick.My note is right   there so read it carefully  so you can avoid any<LINE>diseases."}, {"index_hex": "05D", "bank": "B6", "snes_addr": "B6BDEC", "label": "Text_05D_Animal_HensLayEggsPutCage", "category": "Animal", "max_words": "146", "markup_text": "Hey:do your hens lay eggs?  Put them in the cage.       And feed them every day.<LINE>They won't lay eggs for     <CTRL_B5>days after you miss a      feeding."}, {"index_hex": "05E", "bank": "B6", "snes_addr": "B6BF10", "label": "Text_05E_Weather_YoungBoyPutLivestockInside", "category": "Weather", "max_words": "87", "markup_text": "Hey:young boy, Put your     livestock inside the pen    before the weather gets<LINE>worse,"}, {"index_hex": "05F", "bank": "B6", "snes_addr": "B6BFBE", "label": "Text_05F_Animal_KnowCowsGiveMoreMilk", "category": "Animal", "max_words": "177", "markup_text": "You know:cows give you more milk when you take good careof them with love.<LINE>..hey:are you listening to  me? They will like you and  good calves will be born<LINE>...listen to me:boy,"}, {"index_hex": "060", "bank": "B6", "snes_addr": "B6C120", "label": "Text_060_Dialog_RedoLifeMightHaveSecond", "category": "Dialog", "max_words": "93", "markup_text": "You can't redo your life.   You might not have the      second chance.<LINE>Think before you act."}, {"index_hex": "061", "bank": "B6", "snes_addr": "B6C1DA", "label": "Text_061_Church_AskingIfGotoChurchGod", "category": "Church", "max_words": "116", "markup_text": "Are you asking if I don't goto church? God is everywhereand He is nowhere:<LINE>you know.                   Hee-hee-hee."}, {"index_hex": "062", "bank": "B6", "snes_addr": "B6C2C2", "label": "Text_062_Romance_TheresUsefulBookOverAbout", "category": "Romance", "max_words": "75", "markup_text": "There's a useful book over  there: about girls:I wrote  it.Better read it."}, {"index_hex": "063", "bank": "B6", "snes_addr": "B6C358", "label": "Text_063_Sign_AlsoMidwifeKnowMayorsDaughter", "category": "Sign", "max_words": "127", "markup_text": "I'm also a midwife.You know:the mayor's daughter Maria  and the grocery shop<LINE>owner's daughter Ann        I delivered them all."}, {"index_hex": "064", "bank": "B6", "snes_addr": "B6C456", "label": "Text_064_Dialog_GrownUpsAlwaysMakeRule", "category": "Dialog", "max_words": "125", "markup_text": "Grown-ups always make rule  telling us to do this:do    that:don't do this:<LINE>don't do that.What hard workit is being a child."}, {"index_hex": "065", "bank": "B6", "snes_addr": "B6C550", "label": "Text_065_Romance_HmmmLoveMariasSisterCantbe", "category": "Romance", "max_words": "60", "markup_text": "Hmmm...is he in love with   Maria's sister? ....it can'tbe."}, {"index_hex": "066", "bank": "B6", "snes_addr": "B6C5C8", "label": "Text_066_Sign_GatherManyThingsIntheMountain", "category": "Sign", "max_words": "127", "markup_text": "We can gather many things inthe mountain.I want to sell them but they won't allow<LINE>a little kid to go to the   mountains alone."}, {"index_hex": "067", "bank": "B6", "snes_addr": "B6C6C6", "label": "Text_067_Dialog_GotDate", "category": "Dialog", "max_words": "45", "markup_text": "Please:please,              I've got a date."}, {"index_hex": "068", "bank": "B6", "snes_addr": "B6C720", "label": "Text_068_Romance_YoudBetterReadBookWritten", "category": "Romance", "max_words": "127", "markup_text": "You'd better read the book  written by Mrs.             Fortune-teller many times.<LINE>It's pretty hard to capture a girl's heart."}, {"index_hex": "069", "bank": "B6", "snes_addr": "B6C81E", "label": "Text_069_Dialog_YeahWelcomeMakeYourselfatHome", "category": "Dialog", "max_words": "37", "markup_text": "Yeah: welcome. Make yourselfat home."}, {"index_hex": "06A", "bank": "B6", "snes_addr": "B6C868", "label": "Text_06A_Shop_ThingsGirlsLikeFlowersSweets", "category": "Shop", "max_words": "101", "markup_text": "Things girls like are       flowers and sweets:right?<LINE>I'm saving money to buy a   present for Maria."}, {"index_hex": "06B", "bank": "B6", "snes_addr": "B6C932", "label": "Text_06B_Romance_LoveMariaWishMyBride", "category": "Romance", "max_words": "64", "markup_text": "I love Maria.I wish she     would be my bride in the    future."}, {"index_hex": "06C", "bank": "B6", "snes_addr": "B6C9B2", "label": "Text_06C_Church_AlwaysPrayGrownUpVery", "category": "Church", "max_words": "53", "markup_text": "I always pray that I can be a grown-up very quickly."}, {"index_hex": "06D", "bank": "B6", "snes_addr": "B6CA1C", "label": "Text_06D_Dialog_DateDateWalkAll", "category": "Dialog", "max_words": "61", "markup_text": "It's not a date, It's not a date, Just a walk:that's    all,"}, {"index_hex": "06E", "bank": "B6", "snes_addr": "B6CA96", "label": "Text_06E_Shipping_PutCropsShippingBoxCollect", "category": "Shipping", "max_words": "70", "markup_text": "Oh yes:put crops in the     shipping box so I can       collect them."}, {"index_hex": "06F", "bank": "B6", "snes_addr": "B6CB22", "label": "Text_06F_Animal_UseToolLoseStaminaBut", "category": "Animal", "max_words": "86", "markup_text": "You can't use the tool when you lose your stamina but   you can carry things a<LINE>round."}, {"index_hex": "070", "bank": "B6", "snes_addr": "B6CBCE", "label": "Text_070_Dialog_DrinkAfterWorkBest", "category": "Dialog", "max_words": "38", "markup_text": "Well: a drink after work is the best."}, {"index_hex": "071", "bank": "B6", "snes_addr": "B6CC1A", "label": "Text_071_Shipping_ThingsShipFlowersAnimalsPerishables", "category": "Shipping", "max_words": "117", "markup_text": "Things you can't ship are   flowers:animals:and         perishables like cakes.<LINE>Don't put those things in   the box."}, {"index_hex": "072", "bank": "B6", "snes_addr": "B6CD04", "label": "Text_072_Shipping_EvenIfPutShippingGoods", "category": "Shipping", "max_words": "102", "markup_text": "Even if you put shipping    goods in the box at night:  they won't last till<LINE>the morning.So wasteful."}, {"index_hex": "073", "bank": "B6", "snes_addr": "B6CDD0", "label": "Text_073_Shipping_CollectShippingGoodsEvenShed", "category": "Shipping", "max_words": "69", "markup_text": "I collect shipping goods    even in the shed so please  don't worry."}, {"index_hex": "074", "bank": "B6", "snes_addr": "B6CE5A", "label": "Text_074_Weather_ShallWatchWeatherForecastYoud", "category": "Weather", "max_words": "120", "markup_text": "Shall we watch the weather  forecast? You'd better put  the livestock inside right<LINE>after you find out it's     raining."}, {"index_hex": "075", "bank": "B6", "snes_addr": "B6CF4A", "label": "Text_075_Church_MuchEasierLiveIfWas", "category": "Church", "max_words": "78", "markup_text": "It would be much easier to  live if it was true that Godbrings you happiness."}, {"index_hex": "076", "bank": "B6", "snes_addr": "B6CFE6", "label": "Text_076_Diary_AnythingHappenLivesCaseYoud", "category": "Diary", "max_words": "75", "markup_text": "Anything can happen in our  lives. Just in case:you'd   better save money."}, {"index_hex": "077", "bank": "B6", "snes_addr": "B6D07C", "label": "Text_077_Romance_KnowMoneyImportantButMost", "category": "Romance", "max_words": "100", "markup_text": "I know money is important   but the most important thingis love:you know:<LINE>LOVE, Don't you think so?"}, {"index_hex": "078", "bank": "B6", "snes_addr": "B6D144", "label": "Text_078_Shipping_WanderingPeddlerButOftenSell", "category": "Shipping", "max_words": "155", "markup_text": "I'm a wandering peddler.    But I don't often sell      anything to anyone.<LINE>If there's anything you wantto sell: just put them on   that table over there."}, {"index_hex": "079", "bank": "B6", "snes_addr": "B6D27A", "label": "Text_079_Weather_FencesEasyBreakAfterRain", "category": "Weather", "max_words": "111", "markup_text": "Fences are easy to break    after rain and snow.<LINE>Please make new fences afterknocking the broken fences  down."}, {"index_hex": "07A", "bank": "B6", "snes_addr": "B6D358", "label": "Text_07A_Sign_LiveMountainsHuntingAnimalsEve", "category": "Sign", "max_words": "123", "markup_text": "I live in the mountains     hunting animals.<LINE>Eve always tells me to come down to the town but I won'tchange my life style."}, {"index_hex": "07B", "bank": "B6", "snes_addr": "B6D44E", "label": "Text_07B_Mountain_HaveHeardPowerBerryEat", "category": "Mountain", "max_words": "85", "markup_text": "Have you heard of           \"Power Berry\"?  Eat it and  you'll gain a little energy."}, {"index_hex": "07C", "bank": "B6", "snes_addr": "B6D4F8", "label": "Text_07C_Weather_RainsMustKeepoffTopMountain", "category": "Weather", "max_words": "81", "markup_text": "When it rains: you must keepoff the top of the mountain:because it is dangerous."}, {"index_hex": "07D", "bank": "B6", "snes_addr": "B6D59A", "label": "Text_07D_Mountain_SomeMushroomsPoisonousCareful", "category": "Mountain", "max_words": "53", "markup_text": "Some mushrooms are          poisonous:so be careful."}, {"index_hex": "07E", "bank": "B6", "snes_addr": "B6D604", "label": "Text_07E_Mountain_WantFishC", "category": "Mountain", "max_words": "58", "markup_text": "Hey:do you want to fish?<LINE> Yes                         No<CHOICE_OR_WAIT>c"}, {"index_hex": "07F", "bank": "B6", "snes_addr": "B6D678", "label": "Text_07F_Manual_UseMyFishingRodUse", "category": "Manual", "max_words": "47", "markup_text": "OK:you can use my fishing   rod. Use Y button."}, {"index_hex": "080", "bank": "B6", "snes_addr": "B6D6D6", "label": "Text_080_Shipping_PrettyGoodTastesGoodSells", "category": "Shipping", "max_words": "68", "markup_text": "No:this is pretty good. It  tastes good and sells at a  high price."}, {"index_hex": "081", "bank": "B6", "snes_addr": "B6D75E", "label": "Text_081_Dialog_VisitUsAgain", "category": "Dialog", "max_words": "16", "markup_text": "Visit us again."}, {"index_hex": "082", "bank": "B6", "snes_addr": "B6D77E", "label": "Text_082_Dialog_FineDayToday", "category": "Dialog", "max_words": "29", "markup_text": "Hello.It's a fine day today."}, {"index_hex": "083", "bank": "B6", "snes_addr": "B6D7B8", "label": "Text_083_Romance_HotEveryDayButDoing", "category": "Romance", "max_words": "47", "markup_text": "It's been hot every day but how are you doing?"}, {"index_hex": "084", "bank": "B6", "snes_addr": "B6D816", "label": "Text_084_Romance_SomehowLoveAutumnScenery", "category": "Romance", "max_words": "37", "markup_text": "I somehow love the autumn   scenery."}, {"index_hex": "085", "bank": "B6", "snes_addr": "B6D860", "label": "Text_085_Dialog_HopeItllSpringSoon", "category": "Dialog", "max_words": "27", "marku aveComeListenPriestC", "category": "Church", "max_words": "76", "markup_text": "Oh:you have come to listen  to the priest.<LINE> Yes                         No<CHOICE_OR_WAIT>c"}, {"index_hex": "08F", "bank": "B6", "snes_addr": "B6DD0E", "label": "Text_08F_Dialog_Devout", "category": "Dialog", "max_words": "16", "markup_text": "You are devout."}, {"index_hex": "090", "bank": "B6", "snes_addr": "B6DD2E", "label": "Text_090_Animal_ThenPray", "category": "Animal", "max_words": "40", "markup_text": "No? then:why are you here?  Oh:to pray?"}, {"index_hex": "091", "bank": "B6", "snes_addr": "B6DD7E", "label": "Text_091_Weather_WelcomeRainHaveaLotRain", "category": "Weather", "max_words": "64", "markup_text": "It's a welcome rain. We havea lot of rain here in       spring."}, {"index_hex": "092", "bank": "B6", "snes_addr": "B6DDFE", "label": "Text_092_Dialog_UumComeOvertoRanchSome", "category": "Dialog", "max_words": "57", "markup_text": "Uum...well...can I come overto your ranch some day soon?"}, {"index_hex": "093", "bank": "B6", "snes_addr": "B6DE70", "label": "Text_093_Dialog_LonelyLivingBigPlaceLittle", "category": "Dialog", "max_words": "88", "markup_text": "Aren't you lonely living in that big place?<LINE> A little lonely             No:not at all<CHOICE_OR_WAIT>c"}, {"index_hex": "094", "bank": "B6", "snes_addr": "B6DF20", "label": "Text_094_Dialog_UumIfNothingGGood", "category": "Dialog", "max_words": "50", "markup_text": "Uum..well...yes: if...no:   nothing....g-good-by."}, {"index_hex": "095", "bank": "B6", "snes_addr": "B6DF84", "label": "Text_095_Dialog_SeeSorryMeanAskAnything", "category": "Dialog", "max_words": "66", "markup_text": "I..see...sorry:I didn't     mean to ask you anything    personal."}, {"index_hex": "096", "bank": "B6", "snes_addr": "B6E008", "label": "Text_096_Dialog_GoingMakeGreatToolsLike", "category": "Dialog", "max_words": "47", "markup_text": "I'm going to make great     tools like my dad,"}, {"index_hex": "097", "bank": "B6", "snes_addr  "B6FAAE", "label": "Text_0C9_Dialog_Sorry", "category": "Dialog", "max_words": "11", "markup_text": "I'm sorry."}, {"index_hex": "0CA", "bank": "B6", "snes_addr": "B6FAC4", "label": "Text_0CA_Romance_StillnessWinterMakesMeCalm", "category": "Romance", "max_words": "67", "markup_text": "The stillness of Winter     makes me calm down so       I love it."}, {"index_hex": "0CB", "bank": "B6", "snes_addr": "B6FB4A", "label": "Text_0CB_Romance_LikeAnimalsLoveLikeC", "category": "Romance", "max_words": "73", "markup_text": "Hey:do you like animals?<LINE> I love them                 I don't like them<CHOICE_OR_WAIT>c"}, {"index_hex": "0CC", "bank": "B6", "snes_addr": "B6FBDC", "label": "Text_0CC_Romance_LoveAnimalsToo", "category": "Romance", "max_words": "25", "markup_text": "Yes? I love animals too."}, {"index_hex": "0CD", "bank": "B6", "snes_addr": "B6FC0E", "label": "Text_0CD_Town_LyingAnimalsTakePeopleWho", "category": "Town", "max_words": "67", "markup_text": "You are lying. animals dont take to people who don't    like them."}, {"index_hex": "0CE", "bank": "B6", "snes_addr": "B6FC94", "label": "Text_0CE_Animal_EiBarkWildDogswhenCome", "category": "Animal", "max_words": "79", "markup_text": "<CTRL_FFFD>ei would bark at wild dogswhen they come here. Check  if the fence is broken."}, {"index_hex": "0CF", "bank": "B6", "snes_addr": "B6FD32", "label": "Text_0CF_Dialog_HardLookAfterAnimalsAlways", "category": "Dialog", "max_words": "169", "markup_text": "It's hard to look after     animals.We always must be   careful so they dont<LINE>get sick....                I feel just like a mother   who is taking care of her<LINE>children."}, {"index_hex": "0D0", "bank": "B6", "snes_addr": "B6FE84", "label": "Text_0D0_Romance_AlwaysRunningAroundLookFine", "category": "Romance", "max_words": "88", "markup_text": "You are always running      around:aren't you? You look fine even if it's cold<LINE>outside."}, {"index_hex": "0D1", "bank": "B6", "snes_addr": "B6FF34", "label": "Text_0D1_Dialog_HopeMyDadStaysHealthy", "category": "Dialog", "max_words": "102", "markup_text": "I hope my dad stays healthy at all times."}, {"index_hex": "0D2", "bank": "B7", "snes_addr": "B78000", "label": "Text_0D2_Dialog_MyUncleLikedMakeFriends", "category": "Dialog", "max_words": "87", "markup_text": "My uncle liked you. Please  make friends with him.OK?<LINE> OK                          No<CHOICE_OR_WAIT>c"}, {"index_hex": "0D3", "bank": "B7", "snes_addr": "B780AE", "label": "Text_0D3_Dialog_GladExcuseHimBeingMeddlesome", "category": "Dialog", "max_words": "107", "markup_text": "Really? I'm glad. Please    excuse him for being        meddlesome.<LINE>I guess he gets that from   my mother."}, {"index_hex": "0D4", "bank": "B7", "snes_addr": "B78184", "label": "Text_0D4_Dialog_HesStrictButBasicallyGood", "category": "Dialog", "max_words": "41", "markup_text": "He's strict but basically a good person."}, {"index_hex": "0D5", "bank": "B7", "snes_addr": "B781D6", "label": "Text_0D5_Dialog_TooSoakedMightCatchCold", "category": "Dialog", "max_words": "86", "markup_text": "Oh no: you are too soaked.  You might catch a cold      unless you dry yourself<LINE>soon."}, {"index_hex": "0D6", "bank": "B7", "snes_addr": "B78282", "label": "Text_0D6_Dialog_ComeDadLetsGoHomenow", "category": "Dialog", "max_words": "33", "markup_text": "Oh:come on:Dad.Let's go homenow."}, {"index_hex": "0D7", "bank": "B7", "snes_addr": "B782C4", "label": "Text_0D7_Dialog_OtherwiseMomGetMad", "category": "Dialog", "max_words": "47", "markup_text": "Otherwise Mom will get      really mad at you."}, {"index_hex": "0D8", "bank": "B7", "snes_addr": "B78322", "label": "Text_0D8_Animal_TasteMyNewCakeBaked", "category": "Animal", "max_words": "45", "markup_text": "Will you taste my new cake  when it's baked?"}, {"index_hex": "0D9", "bank": "B7", "snes_addr": "B7837C", "label": "Text_0D9_Dialog_BakedNewCakeHaveBite", "category": "Dialog", "max_words": "83", "markup_text": "Hey:I baked a new cake.     Will you have a bite?<LINE> Yes                         No<CHOICE_OR_WAIT>c"}, {"index_hex": "0DA", "bank": "B7", "snes_addr": "B78422", "label": "Text_0DA_Sign_GoodCheesecakeThinkGoodEnough", "category": "Sign", "max_words": "94", "markup_text": "Is it good? It's a          cheesecake. Do you think    it's good enough to sell<LINE>at the shop?"}, {"index_hex": "0DB", "bank": "B7", "snes_addr": "B784DE", "label": "Text_0DB_Romance_LookPrettyBusyHopeEverythings", "category": "Romance", "max_words": "66", "markup_text": "You look pretty busy.       I hope everything's well    with you."}, {"index_hex": "0DC", "bank": "B7", "snes_addr": "B78562", "label": "Text_0DC_Dialog_CoincidenceMeetC", "category": "Dialog", "max_words": "76", "markup_text": "Oh:what a coincidence to    meet you here.<LINE> Yes                         No<CHOICE_OR_WAIT>c"}, {"index_hex": "0DD", "bank": "B7", "snes_addr": "B785FA", "label": "Text_0DD_Dialog_TeeHee", "category": "Dialog", "max_words": "11", "markup_text": "Tee-hee..."}, {"index_hex": "0DE", "bank": "B7", "snes_addr": "B78610", "label": "Text_0DE_Shop_WowCoincidenceWereWaitingMe", "category": "Shop", "max_words": "105", "markup_text": "Wow:what a coincidence.     Hey:were you waiting for    me here?<LINE>Titter...I'm waiting for youat the bar."}, {"index_hex": "0DF", "bank": "B7", "snes_addr": "B786E2", "label": "Text_0DF_Sign_CameShopSorryButToo", "category": "Sign", "max_words": "76", "markup_text": "Hi.I just came to shop.     Sorry:but I'm in too much ofa hurry to see you."}, {"index_hex": "0E0", "bank": "B7", "snes_addr": "B7877A", "label": "Text_0E0_Weather_CameRainGlad", "category": "Weather", "max_words": "41", "markup_text": "You came here in this rain? I'm so glad."}, {"index_hex": "0E1", "bank": "B7", "snes_addr": "B787CC", "label": "Text_0E1_Dialog_GrandPaStrict", "category": "Dialog", "max_words": "25", "markup_text": "Grand-pa is so strict..."}, {"index_hex": "0E2", "bank": "B7", "snes_addr": "B787FE", "label": "Text_0E2_Dialog_PrettyDaringShallWashBack", "category": "Dialog", "max_words": "106", "markup_text": "You are pretty daring:      aren't you? Shall I wash    your back?<LINE> Yes                         N..N..No<CHOICE_OR_WAIT>c"}, {"index_hex": "0E3", "bank": "B7", "snes_addr": "B788D2", "label": "Text_0E3_Dialog_Kidding", "category": "Dialog", "max_words": "23", "markup_text": "Hey: I'm just kidding."}, {"index_hex": "0E4", "bank": "B7", "snes_addr": "B78900", "label": "Text_0E4_Dialog_HeeHee", "category": "Dialog", "max_words": "24", "markup_text": "Hee-hee: I won't do it."}, {"index_hex": "0E5", "bank": "B7", "snes_addr": "B78930", "label": "Text_0E5_Dialog_LookFineToday", "category": "Dialog", "max_words": "25", "markup_text": "Hi. You look fine today."}, {"index_hex": "0E6", "bank": "B7", "snes_addr": "B78962", "label": "Text_0E6_Dialog_MyHomeMadeFruitJuice", "category": "Dialog", "max_words": "94", "markup_text": "It's my home made fruit     juice. Do you want it?<LINE> Yes                         No thank you<CHOICE_OR_WAIT>c"}, {"index_hex": "0E7", "bank": "B7", "snes_addr": "B78A1E", "label": "Text_0E7_Dialog_TeeHeeKissIfDrink", "category": "Dialog", "max_words": "47", "markup_text": "Tee-hee...I'll kiss you if  you can drink it. "}, {"index_hex": "0E8", "bank": "B7", "snes_addr": "B78A7C", "label": "Text_0E8_Shop_BarAhaWantSeeMe", "category": "Shop", "max_words": "64", "markup_text": "Why are you here at this    bar? ...Aha: you want to    see me."}, {"index_hex": "0E9", "bank": "B7", "snes_addr": "B78AFC", "label": "Text_0E9_Dialog_GetCoolNight", "category": "Dialog", "max_words": "35", "markup_text": "It doesn't get cool at      night."}, {"index_hex": "0EA", "bank": "B7", "snes_addr": "B78B42", "label": "Text_0EA_Dialog_ThanksLotToday", "category": "Dialog", "max_words": "24", "markup_text": "Thanks a lot for today."}, {"index_hex": "0EB", "bank": "B7", "snes_addr": "B78B72", "label": "Text_0EB_Dialog_LikeAlone", "category": "Dialog", "max_words": "26", "markup_text": "I don't like to be alone."}, {"index_hex": "0EC", "bank": "B7", "snes_addr": "B78BA6", "label": "Text_0EC_Sign_SometimesGoMountainsGatherSome", "category": "Sign", "max_words": "65", "markup_text": "I sometimes go to the       mountains to gather some    berries."}, {"index_hex": "0ED", "bank": "B7", "snes_addr": "B78C28", "label": "Text_0ED_Animal_WasntColdOutsideColdBetter", "category": "Animal", "max_words": "97", "markup_text": "Wasn't it cold outside?     When it's cold: you better  drink and warm you body<LINE>from the inside."}, {"index_hex": "0EE", "bank": "B7", "snes_addr": "B78CEA", "label": "Text_0EE_Dialog_SawRanchOtherDayNoticeme", "category": "Dialog", "max_words": "85", "markup_text": "I saw you at the ranch the  other day. You didn't noticeme because you were working."}, {"index_hex": "0EF", "bank": "B7", "snes_addr": "B78D94", "label": "Text_0EF_Dialog_StandAloneinHugePlaceFeel", "category": "Dialog", "max_words": "120", "markup_text": "I couldn't stand to be alonein that huge place. Don't   you feel lonely there?<LINE> Sometimes                   Not at all<CHOICE_OR_WAIT>c"}, {"index_hex": "0F0", "bank": "B7", "snes_addr": "B78E84", "label": "Text_0F0_Weather_MuchBetterHaveSomeoneAround", "category": "Weather", "max_words": "178", "markup_text": "It's much better to have    someone around me and say   \"yeah:\" when I say \"<LINE>the weather is fine.\"       Feel secure: don't you ?    I think it's better than<LINE>being alone. Right?"}, {"index_hex": "0F1", "bank": "B7", "snes_addr": "B78FE8", "label": "Text_0F1_Dialog_SureLiveAloneButitsLike", "category": "Dialog", "max_words": "81", "markup_text": "Sure: you can live alone butit's just like breathing:   you know? It's lonely..."}, {"index_hex": "0F2", "bank": "B7", "snes_addr": "B7908A", "label": "Text_0F2_Dialog_OneWhoSupposedWorkRanch", "category": "Dialog", "max_words": "87", "markup_text": "Hello. You are the one who  is supposed to work at this ranch today.<LINE>What's your name?"}, {"index_hex": "0F3", "bank": "B7", "snes_addr": "B79138", "label": "Text_0F3_Shipping_MrEjChargeShippingCome", "category": "Shipping", "max_words": "215", "markup_text": "Mr.<CTRL_FFFD>ej:I'm in charge of    shipping here. I come here  every evening to pick up<LINE>stuff you put in the        shipping box. Nice to meet  you.<LINE>Oh yeah: ask anything you   want to people in town.     It will help you."}, {"index_hex": "0F4", "bank": "B7", "snes_addr": "B792E6", "label": "Text_0F4_Dialog_ManagingTheranchAloneSeparatelyParents", "category": "Dialog", "max_words": "196", "markup_text": "Hello. Where are you        from?...You are managing theranch alone: separately<LINE>from your parents? Great,   There's nothing here in the ranch: is there?...for<LINE>practice? You have wonderfulparents."}, {"index_hex": "0F5", "bank": "B7", "snes_addr": "B7946E", "label": "Text_0F5_Town_MayorTownPleasureMeetSome", "category": "Town", "max_words": "197", "markup_text": "Hi: How do you do? I'm the  mayor of this town. It's a  pleasure to meet you.<LINE>There are some tools left inthe shed that your          grandfather used to use.<LINE>And a book on how to use    them:too."}, {"index_hex": "0F6", "bank": "B7", "snes_addr": "B795F8", "label": "Text_0F6_Animal_GrandfatherHelpedMeThoseDays", "category": "Animal", "max_words": "162", "markup_text": "Your grandfather helped me  in those days. If you have  any  problems: don't<LINE>hesitate to talk to me.     Well:you should get some    rest when you get back home."}, {"index_hex": "0F7", "bank": "B7", "snes_addr": "B7973C", "label": "Text_0F7_Church_HardButGiveUpYeah", "category": "Church", "max_words": "121", "markup_text": "How do you do? Hard:isn't   it? But don't give up..................Oh:yeah<LINE>I have a daughter....she maybe at the church."}, {"index_hex": "0F8", "bank": "B7", "snes_addr": "B7982E", "label": "Text_0F8_Romance_CuteGirlLonghair", "category": "Romance", "max_words": "34", "markup_text": "She is a cute girl with longhair."}, {"index_hex": "0F9", "bank": "B7", "snes_addr": "B79872", "label": "Text_0F9_Romance_HaventSeenBeforeComeRanch", "category": "Romance", "max_words": "85", "markup_text": "I haven't seen you before.  Did you come to that ranch? I'm Maria.<LINE>Nice meeting you."}, {"index_hex": "0FA", "bank": "B7", "snes_addr": "B7991C", "label": "Text_0FA_Dialog_MayHardFirstButGive", "category": "Dialog", "max_words": "43", "markup_text": "It may be hard at first but don't give up."}, {"index_hex": "0FB", "bank": "B7", "snes_addr": "B79972", "label": "Text_0FB_Town_HeardSomethingHeardFaintSound", "category": "Town", "max_words": "156", "markup_text": "I've heard something,       I've heard a faint sound of laughter behind the trees<LINE>in the ranch. And some      people talking:too,         ...What was that?"}, {"index_hex": "0FC", "bank": "B7", "snes_addr": "B79AAA", "label": "Text_0FC_Dialog_HeHello", "category": "Dialog", "max_words": "11", "markup_text": "He..Hello."}, {"index_hex": "0FD", "bank": "B7", "snes_addr": "B79AC0", "label": "Text_0FD_Sign_PriestChurchAskQuestionsPeople", "category": "Sign", "max_words": "161", "markup_text": "How do you do? I'm the      priest of this church.      Ask questions to people at<LINE>the shop. They know many    things. And for the rest:   check the signboards."}, {"index_hex": "0FE", "bank": "B7", "snes_addr": "B79C02", "label": "Text_0FE_Dialog_YoullHavePlentyChallengesBut", "category": "Dialog", "max_words": "96", "markup_text": "You'll have a plenty of     challenges but things will  be better for sure.<LINE>Please stick to it."}, {"index_hex": "0FF", "bank": "B7", "snes_addr": "B79CC2", "label": "Text_0FF_Town_YearOverTodayWasYear", "category": "Town", "max_words": "174", "markup_text": "This year is over today.    What was your year like?<LINE>Well:this town will be in a festive mood tomorrow       because lots of people<LINE>are going to the top to see the sun rise."}, {"index_hex": "100", "bank": "B7", "snes_addr": "B79E1E", "label": "Text_100_Sign_ShippingBoxLivestockAfterTalking", "category": "Sign", "max_words": "96", "markup_text": "\"Shipping box for livestock\"After talking at the shop:  put livestock in here.<LINE>Livestock Dealer"}, {"index_hex": "101", "bank": "B7", "snes_addr": "B79EDE", "label": "Text_101_Manual_ToolsShedPenPickUp", "category": "Manual", "max_words": "110", "markup_text": "Tools are in the shed and   the pen. Pick them up with  A button to get equipped.<LINE>To use them: push Y button."}, {"index_hex": "102", "bank": "B7", "snes_addr": "B79FBA", "label": "Text_102_Dialog_UnfortunatelyTheresNothingSaleBut", "category": "Dialog", "max_words": "111", "markup_text": "Unfortunately: there's      nothing for sale here but   there will be soon.<LINE>So please drop by in a      while."}, {"index_hex": "103", "bank": "B7", "snes_addr": "B7A098", "label": "Text_103_Romance_HehOwnerRanchAnnNice", "category": "Romance", "max_words": "74", "markup_text": "Heh: you are the owner of   the ranch. I'm Ann.         Nice to meet you."}, {"index_hex": "104", "bank": "B7", "snes_addr": "B7A12C", "label": "Text_104_Diary_StaminaDecreasesUseToolsEat", "category": "Diary", "max_words": "85", "markup_text": "Stamina decreases when you  use tools. Eat food or      sleep in the bed to<LINE>recover."}, {"index_hex": "105", "bank": "B7", "snes_addr": "B7A1D6", "label": "Text_105_Manual_WentRanchIfGoingRaise", "category": "Manual", "max_words": "205", "markup_text": "You went to the ranch:      didn't you? If you are      going to raise crops there:<LINE>I'll give this to you.      It's a watering can.        It's for getting water<LINE>from the pond. I'll bring itto your shed."}, {"index_hex": "106", "bank": "B7", "snes_addr": "B7A370", "label": "Text_106_Manual_VegetableSeedsSoonComeAgain", "category": "Manual", "max_words": "53", "markup_text": "Vegetable seeds will be in  soon so come again soon."}, {"index_hex": "107", "bank": "B7", "snes_addr": "B7A3DA", "label": "Text_107_Romance_NinaTheseCropsMustSowed", "category": "Romance", "max_words": "145", "markup_text": "How do you do? I'm Nina.    These crops must be sowed   during a certain season.<LINE>They won't germinate unless you sow them in the proper  season."}, {"index_hex": "108", "bank": "B7", "snes_addr": "B7A4FC", "label": "Text_108_Dialog_HavePlowGroundMakeField", "category": "Dialog", "max_words": "63", "markup_text": "And you have to plow the    ground well to make it a    field."}, {"index_hex": "109", "bank": "B7", "snes_addr": "B7A57A", "label": "Text_109_Romance_WelcomeYoudBetterEatEveryday", "category": "Romance", "max_words": "64", "markup_text": "Welcome. You'd better eat   everyday: you know. Stamina is key."}, {"index_hex": "10A", "bank": "B7", "snes_addr": "B7A5FA", "label": "Text_10A_Dialog_MustHardKnowButtryBest", "category": "Dialog", "max_words": "43", "markup_text": "It must be hard: I know: buttry your best."}, {"index_hex": "10B", "bank": "B7", "snes_addr": "B7A650", "label": "Text_10B_Dialog_PuffHicHaveSeenBefore", "category": "Dialog", "max_words": "36", "markup_text": "Puff...hic..Have I seen you before?"}, {"index_hex": "10C", "bank": "B7", "snes_addr": "B7A698", "label": "Text_10C_Animal_SonHaveHaveMeadowBuy", "category": "Animal", "max_words": "240", "markup_text": "Hey:son, You have to have a meadow to buy livestock.    Not only for cows<LINE>but also for chickens.      I have some grass left so   use it to raise them.<LINE>I'll bring it to your shed. Talk to me over the counter when you want to buy<LINE>livestock."}, {"index_hex": "10D", "bank": "B7", "snes_addr": "B7A878", "label": "Text_10D_Animal_FirstMustHavePlentyGrass", "category": "Animal", "max_words": "116", "markup_text": "First:you must have a       plenty of grass when you    raise livestock.<LINE>Beginners should start off  with chickens."}, {"index_hex": "10E", "bank": "B7", "snes_addr": "B7A960", "label": "Text_10E_Manual_HowdyPutThoseCowsPen", "category": "Manual", "max_words": "143", "markup_text": "Howdy, I put those cows in  the pen and gave those bellsfor free.<LINE>Well:first thing to do is toname them with affection.Take good care of them,"}, {"index_hex": "10F", "bank": "B7", "snes_addr": "B7AA7E", "label": "Text_10F_Shipping_WanderingPeddlerHaveAnythingSell", "category": "Shipping", "max_words": "155", "markup_text": "Hello. I'm a wandering      peddler.I don't have        anything to sell right<LINE>now though. If you want to  sell something: bring it to me so I can buy it."}, {"index_hex": "110", "bank": "B7", "snes_addr": "B7ABB4", "label": "Text_110_Romance_GirlsTownAllCuteGood", "category": "Romance", "max_words": "79", "markup_text": "Girls in this town are all  cute and good-natured so it may be fun to be here."}, {"index_hex": "111", "bank": "B7", "snes_addr": "B7AC52", "label": "Text_111_Animal_HohohoMisterKnowBeginFirst", "category": "Animal", "max_words": "225", "markup_text": "Hohoho...Mister: you don't  know what to begin with:do  you?<LINE>First:you must learn how to use those tools with the    book in the shed.<LINE>The rest: ask the florist   about the crops  and the    livestock dealer about<LINE>livestock."}, {"index_hex": "112", "bank": "B7", "snes_addr": "B7AE14", "label": "Text_112_Animal_OverextendYourselfTiredGoBed", "category": "Animal", "max_words": "167", "markup_text": "Don't overextend yourself.  When you are tired: just go to bed earlier.<LINE>The healthy body is your    precious asset. Try your    best to become an<LINE>independent rancher."}, {"index_hex": "113", "bank": "B7", "snes_addr": "B7AF62", "label": "Text_113_Weather_MrsFortuneTellersWordsAlways", "category": "Weather", "max_words": "90", "markup_text": "Mrs.Fortune-teller's words  always prove right.  Just   like the weather fore<LINE>cast on TV."}, {"index_hex": "114", "bank": "B7", "snes_addr": "B7B016", "label": "Text_114_Romance_EllenNiceMeeting", "category": "Romance", "max_words": "41", "markup_text": "Oh:hi:I'm Ellen. Nice       meeting you."}, {"index_hex": "115", "bank": "B7", "snes_addr": "B7B068", "label": "Text_115_Dialog_HeirRanchWonderIfManage", "category": "Dialog", "max_words": "112", "markup_text": "What? Are you the heir of   the ranch? I wonder if you  can manage it.<LINE>Young men these days have   little guts."}, {"index_hex": "116", "bank": "B7", "snes_addr": "B7B148", "label": "Text_116_Sign_BarClosedTodayUsuallyOpen", "category": "Sign", "max_words": "78", "markup_text": "Hello. The bar is closed    today. It's usually open    except Sunday though."}, {"index_hex": "117", "bank": "B7", "snes_addr": "B7B1E4", "label": "Text_117_Dialog_GoingBackRanchYetC", "category": "Dialog", "max_words": "73", "markup_text": "Are you going back to the   ranch?<LINE> Yes                         Not yet<CHOICE_OR_WAIT>c"}, {"index_hex": "118", "bank": "B7", "snes_addr": "B7B276", "label": "Text_118_Weather_ThenGiveLiftTraineeShipping", "category": "Weather", "max_words": "128", "markup_text": "Then:I'll give you a lift.  I'm a trainee of shipping   too.<LINE>Let's do our best to achieveeach other's goal.          With grit,"}, {"index_hex": "119", "bank": "B7", "snes_addr": "B7B376", "label": "Text_119_Animal_LetMeKnowGoHome", "category": "Animal", "max_words": "34", "markup_text": "OK.Let me know when you go  home."}, {"index_hex": "11A", "bank": "B7", "snes_addr": "B7B3BA", "label": "Text_11A_Dialog_SuggestListenVillagersLittleMore", "category": "Dialog", "max_words": "57", "markup_text": "I suggest you listen to     the villagers a little more."}, {"index_hex": "11B", "bank": "B7", "snes_addr": "B7B42C", "label": "Text_11B_Romance_YouveComeHauntedRanchTee", "category": "Romance", "max_words": "110", "markup_text": "You've come to that haunted ranch? Tee:hee...good luck. I'm Eve:nice to meet you.<LINE>Here you are: it's from me."}, {"index_hex": "11C", "bank": "B7", "snes_addr": "B7B508", "label": "Text_11C_Dialog_BestThingRecoverFatigueRelax", "category": "Dialog", "max_words": "54", "markup_text": "The best t guarantee   that you will regret this   for the rest of your life."}, {"index_hex": "150", "bank": "B7", "snes_addr": "B7DB4C", "label": "Text_150_Weather_ToughWeatherGloomy", "category": "Weather", "max_words": "47", "markup_text": "Hey: it's tough when the    weather is gloomy."}, {"index_hex": "151", "bank": "B7", "snes_addr": "B7DBAA", "label": "Text_151_Dialog_BusyBusy", "category": "Dialog", "max_words": "16", "markup_text": "I'm busy: busy."}, {"index_hex": "152", "bank": "B7", "snes_addr": "B7DBCA", "label": "Text_152_Dialog_WayBackConnectedWorldBelow", "category": "Dialog", "max_words": "63", "markup_text": "It's the way back. It's     connected to the world here below."}, {"index_hex": "153", "bank": "B7", "snes_addr": "B7DC48", "label": "Text_153_Dialog_GoodLordWhatsHappeningPlace", "category": "Dialog", "max_words": "65", "markup_text": "Good Lord: what's happening here? Hey: Is your place    alright?"}, {"index_hex": "154", "bank": "B7", "snes_addr": "B7DCCA", "label": "Text_154_Weather_SayHurricaneComingTomorrow", "category": "Weather", "max_words": "50", "markup_text": "They say a hurricane is     coming here tomorrow."}, {"index_hex": "155", "bank": "B7", "snes_addr": "B7DD2E", "label": "Text_155_Dialog_WindBlowingHarderMakesMe", "category": "Dialog", "max_words": "54", "markup_text": "The wind is blowing harder  and that makes me scared."}, {"index_hex": "156", "bank": "B7", "snes_addr": "B7DD9A", "label": "Text_156_Weather_SkyLooksThreateningProbablyHave", "category": "Weather", "max_words": "83", "markup_text": "Oh well: the sky looks      threatening. We'll probably have a hurricane tomorrow."}, {"index_hex": "157", "bank": "B7", "snes_addr": "B7DE40", "label": "Text_157_Weather_KnowButGetExcitedSomething", "category": "Weather", "max_words": "85", "markup_text": "I don't know why but I get  excited when something like a hurricane comes.Don't you?"}, {"index_hex": "158", "bank": "B7", "snes_addr": "B7DEEA", "label": "Text_158_Weather_WindBlowingH bel": "Text_160_Dialog_ImpossibleGoOutToday", "category": "Dialog", "max_words": "35", "markup_text": "It's impossible to go out   today."}, {"index_hex": "161", "bank": "B7", "snes_addr": "B7E41C", "label": "Text_161_Weather_ThankGodWasOnlySlight", "category": "Weather", "max_words": "67", "markup_text": "Thank God that there was    only slight damage from the hurricane."}, {"index_hex": "162", "bank": "B7", "snes_addr": "B7E4A2", "label": "Text_162_Weather_ThinkPreciousWeatherCockWas", "category": "Weather", "max_words": "57", "markup_text": "I think the precious        weather-cock was blown away."}, {"index_hex": "163", "bank": "B7", "snes_addr": "B7E514", "label": "Text_163_Romance_GladEverybodyFine", "category": "Romance", "max_words": "28", "markup_text": "I'm glad everybody is fine."}, {"index_hex": "164", "bank": "B7", "snes_addr": "B7E54C", "label": "Text_164_Dialog_RanchAlright", "category": "Dialog", "max_words": "23", "markup_text": "Is your ranch alright?"}, {"index_hex": "165", "bank": "B7", "snes_addr": "B7E57A", "label": "Text_165_Dialog_WasAwfulOursAlright", "category": "Dialog", "max_words": "40", "markup_text": "That was awful. Yes: ours   is alright."}, {"index_hex": "166", "bank": "B7", "snes_addr": "B7E5CA", "label": "Text_166_Dialog_LetsLookAroundRanchTrouble", "category": "Dialog", "max_words": "75", "markup_text": "Let's look around the ranch.There will be trouble if thefences are broken."}, {"index_hex": "167", "bank": "B7", "snes_addr": "B7E660", "label": "Text_167_Dialog_EarthquakeLastNightRegisteredRichter", "category": "Dialog", "max_words": "90", "markup_text": "The earthquake last night   registered <$00B6> on the richter scale.<LINE>The damage is not serious."}, {"index_hex": "168", "bank": "B7", "snes_addr": "B7E714", "label": "Text_168_Dialog_YoudBetterInspect", "category": "Dialog", "max_words": "39", "markup_text": "You'd better inspect here   and there."}, {"index_hex": "169", "bank": "B7", "snes_addr": "B7E762", "label": "Text_169_Dialog_EarthquakeNotice", "category": "Dialog", "max_words": "48", "markup_text": "What? An earthquake?        I didn't notice it."}, {"index_hex": "16A", "bank": "B7", "snes_addr": "B7E7C2", "label": "Text_16A_Sign_WonderMyGrandpaDoingLot", "category": "Sign", "max_words": "127", "markup_text": "I wonder how my grandpa is  doing. There are a lot of   areas to collapse spots<LINE>in the mountain so I'm      worried about him."}, {"index_hex": "16B", "bank": "B7", "snes_addr": "B7E8C0", "label": "Text_16B_Dialog_WasSurprisedRanchAlright", "category": "Dialog", "max_words": "43", "markup_text": "I was surprised.Is your     ranch alright?"}, {"index_hex": "16C", "bank": "B7", "snes_addr": "B7E916", "label": "Text_16C_Weather_CowsSimpleKeepOutGround", "category": "Weather", "max_words": "101", "markup_text": "Cows are simple. So don't   keep them out on the ground when it rains: snows:<LINE>and a hurricane comes."}, {"index_hex": "16D", "bank": "B7", "snes_addr": "B7E9E0", "label": "Text_16D_Romance_SeemsChangesEverywhereCausedEarthquake", "category": "Romance", "max_words": "118", "markup_text": "It seems there are changes  everywhere caused by the    earthquake.<LINE>We were just talking of     going to look around."}, {"index_hex": "16E", "bank": "B7", "snes_addr": "B7EACC", "label": "Text_16E_Dialog_BigRockOutCollapsedEarthquake", "category": "Dialog", "max_words": "75", "markup_text": "The big rock out there      collapsed by the earthquake.Did you know that?"}, {"index_hex": "16F", "bank": "B7", "snes_addr": "B7EB62", "label": "Text_16F_Dialog_WasPrettySurprised", "category": "Dialog", "max_words": "39", "markup_text": "Oh yes:I was pretty         surprised."}, {"index_hex": "170", "bank": "B7", "snes_addr": "B7EBB0", "label": "Text_170_Dialog_ListenGoThroughRock", "category": "Dialog", "max_words": "46", "markup_text": "Hey:listen: we can go       through the rock."}, {"index_hex": "171", "bank": "B7", "snes_addr": "B7EC0C", "label": "Text_171_Dialog_MightAbleGoEndRanch", "category": "Dialog", "max_words": "94", "markup_text": "It might be able to go to   the end of the ranch faster through here.<LINE>But time still goes on."}, {"index_hex": "172", "bank": "B7", "snes_addr": "B7ECC8", "label": "Text_172_Animal_HaveSeenMoleScaresCows", "category": "Animal", "max_words": "106", "markup_text": "Have you seen a mole?It     scares the cows sometimes.  You'd better kick it<LINE>out of the fence right away."}, {"index_hex": "173", "bank": "B7", "snes_addr": "B7ED9C", "label": "Text_173_Dialog_Happy", "category": "Dialog", "max_words": "14", "markup_text": "I'm happy...."}, {"index_hex": "174", "bank": "B7", "snes_addr": "B7EDB8", "label": "Text_174_Dialog_HaventThoughtAboutitYet", "category": "Dialog", "max_words": "38", "markup_text": "Well:I haven't thought aboutit yet..."}, {"index_hex": "175", "bank": "B7", "snes_addr": "B7EE04", "label": "Text_175_Dialog_SureMe", "category": "Dialog", "max_words": "21", "markup_text": "...Are you sure? Me?"}, {"index_hex": "176", "bank": "B7", "snes_addr": "B7EE2E", "label": "Text_176_Dialog_YoureKidding", "category": "Dialog", "max_words": "18", "markup_text": "You're kidding..."}, {"index_hex": "177", "bank": "B7", "snes_addr": "B7EE52", "label": "Text_177_Dialog_YesYou", "category": "Dialog", "max_words": "10", "markup_text": "Yes, You,"}, {"index_hex": "178", "bank": "B7", "snes_addr": "B7EE66", "label": "Text_178_Dialog_AfraidTooEarly", "category": "Dialog", "max_words": "29", "markup_text": "I'm afraid it's too early..."}, {"index_hex": "179", "bank": "B7", "snes_addr": "B7EEA0", "label": "Text_179_Dialog_WhatYes", "category": "Dialog", "max_words": "17", "markup_text": "What? ......Yes."}, {"index_hex": "17A", "bank": "B7", "snes_addr": "B7EEC2", "label": "Text_17A_Dialog_AllTooSuddenKnow", "category": "Dialog", "max_words": "53", "markup_text": "It's all too sudden so I    don't know what to do..."}, {"index_hex": "17B", "bank": "B7", "snes_addr": "B7EF2C", "label": "Text_17B_Dialog_TitterAlrightSay", "category": "Dialog", "max_words": "28", "markup_text": "Titter...alright. I say OK."}, {"index_hex": "17C", "bank": "B7", "snes_addr": "B7EF64", "label": "Text_17C_Dialog_StillTooEarly", "category": "Dialog", "max_words": "28", "markup_text": "Well: It's still too early."}, {"index_hex": "17D", "bank": "B7", "snes_addr": "B7EF9C", "label": "Text_17D_Dialog_GoodMorningDaDarlingHappy", "category": "Dialog", "max_words": "64", "markup_text": "Good morning....da-darling. Be happy together from      now on."}, {"index_hex": "17E", "bank": "B7", "snes_addr": "B7F01C", "label": "Text_17E_Dialog_JmClCnGo", "category": "Dialog", "max_words": "20", "markup_text": " <CTRL_FFFD>jm:<CTRL_FFFC>cl<CTRL_FFFD>cn of <CTRL_FFFD>go."}, {"index_hex": "17F", "bank": "B7", "snes_addr": "B7F044", "label": "Text_17F_Dialog_TooLate", "category": "Dialog", "max_words": "19", "markup_text": "Don't be too late."}, {"index_hex": "180", "bank": "B7", "snes_addr": "B7F06A", "label": "Text_180_Dialog_ThankTroubleDarling", "category": "Dialog", "max_words": "37", "markup_text": "Thank you for your trouble: darling."}, {"index_hex": "181", "bank": "B7", "snes_addr": "B7F0B4", "label": "Text_181_Diary_WorkHardTodayToo", "category": "Diary", "max_words": "28", "markup_text": "Please work hard today:too."}, {"index_hex": "182", "bank": "B7", "snes_addr": "B7F0EC", "label": "Text_182_Dialog_GotMyBestTodayalso", "category": "Dialog", "max_words": "34", "markup_text": "I've got to do my best todayalso."}, {"index_hex": "183", "bank": "B7", "snes_addr": "B7F130", "label": "Text_183_Diary_WorkHardGiveHouseGood", "category": "Diary", "max_words": "48", "markup_text": "I'll work hard to give the  house a good shine."}, {"index_hex": "184", "bank": "B7", "snes_addr": "B7F190", "label": "Text_184_Dialog_StrangeSameSkyButWind", "category": "Dialog", "max_words": "72", "markup_text": "It's strange. It's the same sky but the wind and the airfeel different."}, {"index_hex": "185", "bank": "B7", "snes_addr": "B7F220", "label": "Text_185_Dialog_TryMyBestMakeSomething", "category": "Dialog", "max_words": "61", "markup_text": "I'll try my best to make    something that will help    you."}, {"index_hex": "186", "bank": "B7", "snes_addr": "B7F29A", "label": "Text_186_Dialog_TakeCareThoseToolsToo", "category": "Dialog", "max_words": "93", "markup_text": "I'll take care of those     tools too.                  .....Don't worry.<LINE>I won't break any."}, {"index_hex": "187", "bank": "B7", "snes_addr": "B7F354", "label": "Text_187_Animal_AutoMilkingYogurtMakerSpecial", "category": "Animal", "max_words": "97", "markup_text": "\"Auto Milking <$0040> Yogurt-Maker: Special Version\"          I wish it would be<LINE>finished by spring..."}, {"index_hex": "188", "bank": "B7", "snes_addr": "B7F416", "label": "Text_188_Dialog_TimeGoesQuicklyFeelLike", "category": "Dialog", "max_words": "70", "markup_text": "Time goes by really quickly.I feel like I met you only afew days ago."}, {"index_hex": "189", "bank": "B7", "snes_addr": "B7F4A2", "label": "Text_189_Weather_WeatherBeautifulLetsGoPicnic", "category": "Weather", "max_words": "75", "markup_text": "The weather is beautiful.   Let's go on a picnic to the mountain top soon."}, {"index_hex": "18A", "bank": "B7", "snes_addr": "B7F538", "label": "Text_18A_Dialog_LaLaLaLaLa", "category": "Dialog", "max_words": "71", "markup_text": "La-la-la-la-la...           The sky is blue. I somehow  feel cheerful."}, {"index_hex": "18B", "bank": "B7", "snes_addr": "B7F5C6", "label": "Text_18B_Sign_MysteriousFlowerMountainSomedayDreaming", "category": "Sign", "max_words": "95", "markup_text": "That mysterious flower in   the mountain:someday I'm    dreaming of growing them<LINE>at the ranch."}, {"index_hex": "18C", "bank": "B7", "snes_addr": "B7F684", "label": "Text_18C_Dialog_GoodMorningSweetheartWasSparrow", "category": "Dialog", "max_words": "122", "markup_text": "Good morning: sweetheart.   There was a sparrow playing in front of our house<LINE>some minutes ago.           It was so cute."}, {"index_hex": "18D", "bank": "B7", "snes_addr": "B7F778", "label": "Text_18D_Romance_WantCookDeliciousMealsEvery", "category": "Romance", "max_words": "53", "markup_text": "I want to cook delicious    meals for you every day."}, {"index_hex": "18E", "bank": "B7", "snes_addr": "B7F7E2", "label": "Text_18E_Dialog_EpMayDescendedOfaThoroughbred", "category": "Dialog", "max_words": "112", "markup_text": "<CTRL_FFFD>ep may be the descended ofa Thoroughbred.             Don't you think so?<LINE>It has a pretty fine coat   of hair."}, {"index_hex": "18F", "bank": "B7", "snes_addr": "B7F8C2", "label": "Text_18F_Dialog_SpringWonderful", "category": "Dialog", "max_words": "25", "markup_text": "Yes:spring is wonderful."}, {"index_hex": "190", "bank": "B7", "snes_addr": "B7F8F4", "label": "Text_190_Dialog_GraduallyGettingUsedLivingLonely", "category": "Dialog", "max_words": "103", "markup_text": "Gradually I am getting used to living here. What? Am I  lonely?<LINE>Oh:come on:you are here     beside me."}, {"index_hex": "191", "bank": "B7", "snes_addr": "B7F9C2", "label": "Text_191_Sign_ManyKindsAnimalsMountainGive", "category": "Sign", "max_words": "87", "markup_text": "There are many kinds of     animals in the mountain.    Doesnt' that give you<LINE>comfort?"}, {"index_hex": "192", "bank": "B7", "snes_addr": "B7FA70", "label": "Text_192_Romance_CookEvening", "category": "Romance", "max_words": "37", "markup_text": "What should I cook this     evening?"}, {"index_hex": "193", "bank": "B7", "snes_addr": "B7FABA", "label": "Text_193_Dialog_HoneyWork", "category": "Dialog", "max_words": "25", "markup_text": "Honey: please work well."}, {"index_hex": "194", "bank": "B7", "snes_addr": "B7FAEC", "label": "Text_194_Dialog_SundaysRanch", "category": "Dialog", "max_words": "35", "markup_text": "There are no Sundays at     ranch."}, {"index_hex": "195", "bank": "B7", "snes_addr": "B7FB32", "label": "Text_195_Dialog_WarmSuchComfort ance", "max_words": "89", "markup_text": "How's Ann doing? Is she     working well as a good wife?I'm so very worried<LINE>about her..."}, {"index_hex": "3C6", "bank": "BA", "snes_addr": "BAB7B8", "label": "Text_3C5_Romance_NinaLikesSweetsSuchAs", "category": "Romance", "max_words": "89", "markup_text": "Nina likes sweets:such as   cakes and berries of        Fullmoon Plant.<LINE>I like that one."}, {"index_hex": "3C7", "bank": "BA", "snes_addr": "BAB86A", "label": "Text_3C6_Mountain_HoHoHoHowsNina", "category": "Mountain", "max_words": "82", "markup_text": "Ho-ho-ho:how's Nina doing?  Doesn't she bother you by   saying something selfish?"}, {"index_hex": "3C8", "bank": "BA", "snes_addr": "BAB90E", "label": "Text_3C7_Romance_IfWantWifeChooseGirl", "category": "Romance", "max_words": "96", "markup_text": "If you want a wife:choose a girl who likes children.    Girls like that can have<LINE>many children."}, {"index_hex": "3C9", "bank": "BA", "snes_addr": "BAB9CE", "label": "Text_3C8_Romance_LookLittleHeavierYoutEllen", "category": "Romance", "max_words": "141", "markup_text": "What? You look a little     heavier:don't yout?         Ellen is just like me:<LINE>she is not only a pretty    girl but also can cook very well."}, {"index_hex": "3CA", "bank": "BA", "snes_addr": "BABAE8", "label": "Text_3C9_Romance_LotThingsHappenWhileAlive", "category": "Romance", "max_words": "124", "markup_text": "Oh well:a lot of things     happen while you are alive. You just couldn't go<LINE>through your life if you gotmad at everything."}, {"index_hex": "3CB", "bank": "BA", "snes_addr": "BABBE0", "label": "Text_3CA_Dialog_CarryJokestoFar", "category": "Dialog", "max_words": "36", "markup_text": "Hey you:you carry your jokesto far."}, {"index_hex": "3CC", "bank": "BA", "snes_addr": "BABC28", "label": "Text_3CB_Animal_ThinkPeopleWhoCheatWho", "category": "Animal", "max_words": "151", "markup_text": "When I think of people who  cheat and who are cheated:  I suppose being cheated<LINE>is kind of happier than     cheating someone.           I do think so."}, {"index_hex": "3CD", "bank": "BA", "snes_addr": "BABD56", "label": "Text_3CC_Romance_MostImportantThingLifeProbably", "category": "Romance", "max_words": "85", "markup_text": "The most important thing in life is probably having     someone you love beside you."}, {"index_hex": "3CE", "bank": "BA", "snes_addr": "BABE00", "label": "Text_3CD_Romance_HaveHeardBlueFeatherGrandma", "category": "Romance", "max_words": "106", "markup_text": "Have you heard of Blue      Feather? Grandma never tellsme what it is:<LINE>saying kids don't need to   know ."}, {"index_hex": "3CF", "bank": "BA", "snes_addr": "BABED4", "label": "Text_3CE_Dialog_FemalePsychologyComplicated", "category": "Dialog", "max_words": "41", "markup_text": "Female psychology is        complicated."}, {"index_hex": "3D0", "bank": "BA", "snes_addr": "BABF26", "label": "Text_3CF_Manual_PrettyHardMoveCowsAs", "category": "Manual", "max_words": "154", "markup_text": "It's pretty hard to move    cows as you intend. Well:it takes time and guts to do<LINE>it properly. I'm now the cowmaster. I want to show you  my  bell skills"}, {"index_hex": "3D1", "bank": "BA", "snes_addr": "BAC05A", "label": "Text_3D0_Animal_DealingLivestocktodayBecomeSickOutside", "category": "Animal", "max_words": "107", "markup_text": "I won't be dealing livestocktoday. They could become    sick outside on a day<LINE>like today. Some other time."}, {"index_hex": "3D2", "bank": "BA", "snes_addr": "BAC130", "label": "Text_3D1_Sign_SeeSunsetTopMountainFeel", "category": "Sign", "max_words": "106", "markup_text": "When you see the sunset at  the top of the mountain:    don't you feel like it's<LINE>saying something to you?"}, {"index_hex": "3D3", "bank": "BA", "snes_addr": "BAC204", "label": "Text_3D2_Romance_EveKindGirlComesOften", "category": "Romance", "max_words": "111", "markup_text": "Eve is a kind girl. She     comes here often to be in mycompany.<LINE>But she talks about nothing but you recently."}, {"index_hex": "3D4", "bank": "BA", "snes_addr": "BAC2E2", "label": "Text_3D3_Romance_HowsEveDoingSeeGood", "category": "Romance", "max_words": "72", "markup_text": "How's Eve doing? Oh:I see.  That's good. She easily     becomes lonely."}, {"index_hex": "3D5", "bank": "BA", "snes_addr": "BAC372", "label": "Text_3D4_Town_SisterPinkScoldIfPicked", "category": "Town", "max_words": "76", "markup_text": "Sister Pink would scold you if you picked too much      flowers and plants."}, {"index_hex": "3D6", "bank": "BA", "snes_addr": "BAC40A", "label": "Text_3D5_Romance_BigHouseNecessaryIfWant", "category": "Romance", "max_words": "53", "markup_text": "A big house is necessary if you want to get married."}, {"index_hex": "3D7", "bank": "BA", "snes_addr": "BAC474", "label": "Text_3D6_Dialog_GatherLogsWinterToo", "category": "Dialog", "max_words": "40", "markup_text": "You can gather logs in      winter too."}, {"index_hex": "3D8", "bank": "BA", "snes_addr": "BAC4C4", "label": "Text_3D7_Dialog_HowdyHaveJuicePartyHome", "category": "Dialog", "max_words": "67", "markup_text": "Howdy, Why don't you have a juice party at home         sometimes?"}, {"index_hex": "3D9", "bank": "BA", "snes_addr": "BAC54A", "label": "Text_3D8_Animal_GotMarriedWorkHarderBad", "category": "Animal", "max_words": "112", "markup_text": "You got married and work    harder. It's not a bad thingbut she gets in a bad<LINE>mood when you come home     late."}, {"index_hex": "3DA", "bank": "BA", "snes_addr": "BAC62A", "label": "Text_3D9_Dialog_HappyMan", "category": "Dialog", "max_words": "16", "markup_text": "Hey:happy man,,"}, {"index_hex": "3DB", "bank": "BA", "snes_addr": "BAC64A", "label": "Text_3DA_Romance_MarriedCuteWifeHuhIf", "category": "Romance", "max_words": "92", "markup_text": "You are married to a cute   wife:huh? If you want kids: you have to move to<LINE>a bigger house."}, {"index_hex": "3DC", "bank": "BA", "snes_addr": "BAC702", "label": "Text_3DB_Sign_HaveSeenRareBer category": "Manual", "max_words": "288", "markup_text": "Tomato and corn seeds must  be planted in summer.       Notice: Never grow when<LINE>planting in other seasons.  Be able to have more fruits by watering after the<LINE>harvest.                    Tomatoes grow quicker. Die  in autumn. Shipping rate:<LINE>Tomato!<CTRL_B3> piece <CTRL_B3><CTRL_B2><CTRL_B2>G         Corn!<CTRL_B3> piece   <CTRL_B3><CTRL_B4><CTRL_B2>G"}, {"index_hex": "458", "bank": "BB", "snes_addr": "BB8BF6", "label": "Text_457_Manual_TurnipPotatoSeedsMustbePlanted", "category": "Manual", "max_words": "237", "markup_text": "Turnip and potato seeds mustbe planted in spring.       They grow quicker than<LINE>tomatoes and corn. turnip   are a quick grower.         Only one harvest per year.<LINE>Shipping rate:              Turnip!<CTRL_B3> piece <$00B8><CTRL_B2>G          Potato!<CTRL_B3> piece <$00BA><CTRL_B2>G"}, {"index_hex": "459", "bank": "BB", "snes_addr": "BB8DD0", "label": "Text_458_Manual_GrassSeedsMustPlantedSpring", "category": "Manual", "max_words": "159", "markup_text": "Grass seeds must be planted from spring to summer.      Cut by autumn.<LINE>No need to water. Grass     doesn't make money but it isimportant as feed to<LINE>livestock."}, {"index_hex": "45A", "bank": "BB", "snes_addr": "BB8F0E", "label": "Text_459_Animal_LivestockNoteCowChickenMilk", "category": "Animal", "max_words": "82", "markup_text": "Livestock note:<LINE> \"Cow\"          \"Chicken\"    \"Milk\"         \"Egg\"        \"Grass\"<CHOICE_OR_WAIT>f"}, {"index_hex": "45B", "bank": "BB", "snes_addr": "BB8FB2", "label": "Text_45A_Weather_CowsSaleYoungOnesMilk", "category": "Weather", "max_words": "359", "markup_text": "Cows on sale are young ones that can't milk. Takes <CTRL_B4><CTRL_B3>   days to grow large<LINE>enough for milking.         The key is to keep them awayfrom sickness:<LINE>Don't forget to feed.       Don't let them out when it  rains:lightening:hurricane.<LINE>Nothing works when they get wet in the morning.<LINE>They don't produce milk     for a while when they get   sick or are in bad mood."}, {"index_hex": "45C", "bank": "BB", "snes_addr": "BB9280", "label": "Text_45B_Manual_EquipMilkerPointYButton", "category": "Manual", "max_words": "234", "markup_text": "Equip the milker and point  Y button to a cow to milk.  Only once a day.<LINE>Cow's affection rate        increases when being brushedor talked to.<LINE>Cows you devote your        affection to can produce    middle-sized and<LINE>large-sized milk."}, {"index_hex": "45D", "bank": "BB", "snes_addr": "BB9454", "label": "Text_45C_Weather_CowsEatGrownGrassGrass", "category": "Weather", "max_words": "179", "markup_text": "Cows eat well grown grass.  When the grass is young:    it's like not feeding:<LINE>so be careful. Cut grass    makes fodder.  It's feed in rainy days and winter.<LINE>Don't run out of it."}, {"index_hex": "45E", "bank": "BB", "snes_addr": "BB95BA", "label": "Text_45D_Weather_ChickensLayOneEggDay", "category": "Weather", "max_words": "233", "markup_text": "Chickens lay one egg a day. It doesn't lay eggs for <CTRL_B5>   days when you forget<LINE>to feed or it gets wet in   the rain. They could be     blown away when you let<LINE>them outside during         hurricane. Possibly to be   eaten by wild dogs."}, {"index_hex": "45F", "bank": "BB", "snes_addr": "BB978C", "label": "Text_45E_Animal_EggsBecomeChicksDayswhenIncubate", "category": "Animal", "max_words": "211", "markup_text": "Eggs become chicks in <CTRL_B5> dayswhen you incubate them. No  feed is necessary for<LINE>chicks. Chicks grow to      chickens in <$00B9> days.         If you increase the amount<LINE>of chickens: the feed will  run out so be careful"}, {"index_hex": "460", "bank": "BB", "snes_addr": "BB9932", "label": "Text_45F_Diary_LessonsLovePresentConversationFestival", "category": "Diary", "max_words": "85", "markup_text": "\"Lessons of Love\"<LINE> Present        Conversation Festival       Diary        Marriage<CHOICE_OR_WAIT>f"}, const q = document.getElementById('q');
const cat = document.getElementById('cat');
const bank = document.getElementById('bank');
const list = document.getElementById('list');
const count = document.getElementById('count');
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function fillFilters() {
  [...new Set(DATA.map(x => x.category).filter(Boolean))].sort().forEach(v => cat.insertAdjacentHTML('beforeend', `<option>${esc(v)}</option>`));
  [...new Set(DATA.map(x => x.bank).filter(Boolean))].sort().forEach(v => bank.insertAdjacentHTML('beforeend', `<option>${esc(v)}</option>`));
}
async function copyText(text) { try { await navigator.clipboard.writeText(text); } catch(e) { prompt('Copie:', text); } }
function render() {
  const term = q.value.trim().toLowerCase();
  const rows = DATA.filter(x => (!cat.value || x.category === cat.value) && (!bank.value || x.bank === bank.value) && (!term || JSON.stringify(x).toLowerCase().includes(term))).slice(0, 250);
  count.textContent = `${rows.length} mostrado(s) de ${DATA.length}. Limite visual: 250 resultados.`;
  list.innerHTML = rows.map(x => `<section class="card"><div class="meta"><span>#${esc(x.index_hex)}</span><span>${esc(x.bank)}:${esc(x.snes_addr)}</span><span>${esc(x.category)}</span><span>max words: ${esc(x.max_words)}</span></div><div class="label">${esc(x.label)}</div><pre>${esc(x.markup_text)}</pre><button onclick="copyText('${String(x.markup_text).replace(/\/g,'\\').replace(/'/g,"\'").replace(/
/g,'\n')}')">copiar texto</button> <button onclick="copyText('${esc(x.label)}')">copiar label</button></section>`).join('');
}
fillFilters();
[q, cat, bank].forEach(el => el.addEventListener('input', render));
render();
</script>
