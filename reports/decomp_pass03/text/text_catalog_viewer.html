 from your father thismorning. He says he will be back hereby the end of summer next year. He's so worried about how you live here so make him feel at ease then."}, {"index_hex": "47A", "snes_addr": "BBAE80", "bank": "BB", "label": "Text_47A_Dialog_ParentsComingTomorrowLastSurprised", "category": "Dialog", "text_preview": "Hello. Your parents are coming tomorrow at last. They will be surprised to see this ranch."}, {"index_hex": "47B", "snes_addr": "BBAF44", "bank": "BB", "label": "Text_47B_Weather_StillNeedTrainedMore", "category": "Weather", "text_preview": "...........Really:you still need to be trained more."}, {"index_hex": "47C", "snes_addr": "BBAFAE", "bank": "BB", "label": "Text_47C_Weather_KindDisappointingWeatherGoodonSunday", "category": "Weather", "text_preview": "It's kind of disappointing when the weather is not goodon Sunday."}, {"index_hex": "47D", "snes_addr": "BBB034", "bank": "BB", "label": "Text_47D_Sign_HoneyShopClosedBecauseSaturday", "category": "Sign", "text_preview": "Honey: the shop is closed because it's Saturday today."}, {"index_hex": "47E", "snes_addr": "BBB0A6", "bank": "BB", "label": "Text_47E_Manual_EquipAxeUseFrontSpring", "category": "Manual", "text_preview": "Equip the axe and use it in front of the spring in the mountain and then. ........"}, {"index_hex": "47F", "snes_addr": "BBB14E", "bank": "BB", "label": "Text_47F_Sign_DoingMakingGreatThingNow", "category": "Sign", "text_preview": "Hey:how are you doing? I'm making a great thing now, It'll be completed around the <CTRL_B4><CTRL_B2>th so come see it at the shop then."}, {"index_hex": "480", "snes_addr": "BBB248", "bank": "BB", "label": "Text_480_Dialog_DarlingHoldChildSometimes", "category": "Dialog", "text_preview": "Darling:will you hold our child sometimes?"}, {"index_hex": "481", "snes_addr": "BBB2A2", "bank": "BB", "label": "Text_481_Dialog_LookCrawlingNow", "category": "Dialog", "text_preview": "Look. He is crawling now,"}, {"index_hex": "482", "snes_addr": "BBB2D6", "bank": "BB", "label": "Text_482_Dialog_ChildGrowsPrettyQuicklyLittle", "category": "Dialog", "text_preview": "This child grows pretty quickly. Just a little bit but he started to speak words."}, {"index_hex": "483", "snes_addr": "BBB384", "bank": "BB", "label": "Text_483_Dialog_RanchMasterRateDStill", "category": "Dialog", "text_preview": "Ranch master rate <CTRL_FFFC>d<$006B> Still a long way to go."}, {"index_hex": "484", "snes_addr": "BBB3EE", "bank": "BB", "label": "Text_484_Dialog_VeryActiveHavePutEye", "category": "Dialog", "text_preview": "He is very active so I have to put on eye on him all thetime."}, {"index_hex": "485", "snes_addr": "BBB46A", "bank": "BB", "label": "Text_485_Dialog_DarlingTakeCareYourself", "category": "Dialog", "text_preview": "Darling:please take care of yourself."}, {"index_hex": "486", "snes_addr": "BBB4B6", "bank": "BB", "label": "Text_486_Dialog_HeardAwfulSoundMorningAll", "category": "Dialog", "text_preview": "I heard an awful sound from here this morning. Are you all right? Has anything strange happened? Check it out."}, {"index_hex": "487", "snes_addr": "BBB5A4", "bank": "BB", "label": "Text_487_Shipping_SaidWereSupposedSellWerent", "category": "Shipping", "text_preview": "You said what? You were supposed to sell it:weren't you? Now I'm leaving."}, {"index_hex": "488", "snes_addr": "BBB640", "bank": "BB", "label": "Text_488_Dialog_RanchMasterRateDTry", "category": "Dialog", "text_preview": "Ranch master rate <CTRL_FFFC>d<$006C> Try harder."}, {"index_hex": "489", "snes_addr": "BBB692", "bank": "BB", "label": "Text_489_Dialog_RanchMasterRateDCome", "category": "Dialog", "text_preview": "Ranch master rate <CTRL_FFFC>d<$006D> Come on:you are so close,"}, {"index_hex": "48A", "snes_addr": "BBB700", "bank": "BB", "label": "Text_48A_Dialog_RanchMasterRateDGreat", "category": "Dialog", "text_preview": "Ranch master rate <CTRL_FFFC>d<$006E> Great, But try to be the best rancher,"}, {"index_hex": "48B", "snes_addr": "BBB78E", "bank": "BB", "label": "Text_48B_Dialog_RanchMasterRateDCongratulations", "category": "Dialog", "text_preview": "Ranch master rate <CTRL_FFFC>d<$006F> Congratulations, You are the perfect rancher now,"}, {"index_hex": "48C", "snes_addr": "BBB832", "bank": "BB", "label": "Text_48C_Romance_RanchDevelopingRateD", "category": "Romance", "text_preview": "Ranch developing rate <CTRL_FFFC>d<$0070>&"}, {"index_hex": "48D", "snes_addr": "BBB86A", "bank": "BB", "label": "Text_48D_Dialog_PChanDoingWonderIf", "category": "Dialog", "text_preview": "How is P-chan doing? I wonder if it's doing OK?"}, {"index_hex": "48E", "snes_addr": "BBB8D8", "bank": "BB", "label": "Text_48E_Dialog_MoneyOnlyThingLifeLook", "category": "Dialog", "text_preview": "Money is not the only thing in life. Look at various things."}, {"index_hex": "48F", "snes_addr": "BBB958", "bank": "BB", "label": "Text_48F_Animal_StrangeLookingOrnamentofChickenLooks", "category": "Animal", "text_preview": "The strange looking ornamentof a chicken looks like it can be broken with a tool."}, {"index_hex": "490", "snes_addr": "BBB9FE", "bank": "BB", "label": "Text_490_Town_BeautifulFlower", "category": "Town", "text_preview": "What a beautiful flower,"}, {"index_hex": "491", "snes_addr": "BBBA30", "bank": "BB", "label": "Text_491_Dialog_EatLotTodayMeanAnything", "category": "Dialog", "text_preview": "Hello:you should eat a lot today. No:it doesn't mean anything."}, {"index_hex": "492", "snes_addr": "BBBAB4", "bank": "BB", "label": "Text_492_Romance_HasNinaMadeSomethingLikea", "category": "Romance", "text_preview": "Has Nina made something likea flower garden at the ranch? Has she?"}, {"index_hex": "493", "snes_addr": "BBBB44", "bank": "BB", "label": "Text_493_Dialog_DarlingForgetPaintDoor", "category": "Dialog", "text_preview": "Darling:didn't you forget to paint the door?"}, {"index_hex": "494", "snes_addr": "BBBBA2", "bank": "BB", "label": "Text_494_Romance_MariaSeemsDoingBroughtMe", "category": "Romance", "text_preview": "Maria seems to be doing well. Yes:she brought me a cake early this morning."}, {"index_hex": "495", "snes_addr": "BBBC44", "bank": "BB", "label": "Text_495_Dialog_GettingAlongWifeArgue", "category": "Dialog", "text_preview": "Are you getting along well with your wife? Don't argue:OK?"}, {"index_hex": "496", "snes_addr": "BBBCBC", "bank": "BB", "label": "Text_496_Dialog_GotCakeFloristsWifeGlad", "category": "Dialog", "text_preview": "I got a cake from the florist's wife. So glad. itslike a dream to me."}, {"index_hex": "497", "snes_addr": "BBBD54", "bank": "BB", "label": "Text_497_Dialog_MyGoodnessNothingLikeKnow", "category": "Dialog", "text_preview": "Oh my goodness, No:no:no: nothing like that, You know:something like... thanks."}];
const q = document.getElementById('q');
const cat = document.getElementById('cat');
const bank = document.getElementById('bank');
const body = document.getElementById('body');
const stats = document.getElementById('stats');
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
for (const c of [...new Set(rows.map(r=>r.category).filter(Boolean))].sort()) cat.insertAdjacentHTML('beforeend', `<option>${esc(c)}</option>`);
for (const b of [...new Set(rows.map(r=>r.bank).filter(Boolean))].sort()) bank.insertAdjacentHTML('beforeend', `<option>${esc(b)}</option>`);
function render() {
  const term = q.value.trim().toLowerCase();
  const c = cat.value; const b = bank.value;
  const filtered = rows.filter(r => (!c || r.category === c) && (!b || r.bank === b) && (!term || JSON.stringify(r).toLowerCase().includes(term)));
  stats.textContent = `${filtered.length} de ${rows.length} entradas`;
  body.innerHTML = filtered.map(r => `<tr><td><code>$${esc(r.index_hex)}</code></td><td><code>$${esc(r.snes_addr)}</code></td><td>${esc(r.bank)}</td><td><span class="badge">${esc(r.category)}</span></td><td><code>${esc(r.label)}</code></td><td class="preview">${esc(r.text_preview)}</td></tr>`).join('');
}
q.addEventListener('input', render); cat.addEventListener('change', render); bank.addEventListener('change', render); render();
</script>
