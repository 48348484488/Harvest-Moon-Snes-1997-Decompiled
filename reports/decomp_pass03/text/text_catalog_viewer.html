": "B7", "label": "Text_16C_Weather_CowsSimpleKeepOutGround", "category": "Weather", "text_preview": "Cows are simple. So don't keep them out on the ground when it rains: snows: and a hurricane comes."}, {"index_hex": "16D", "snes_addr": "B7E9E0", "bank": "B7", "label": "Text_16D_Romance_SeemsChangesEverywhereCausedEarthquake", "category": "Romance", "text_preview": "It seems there are changes everywhere caused by the earthquake. We were just talking of going to look around."}, {"index_hex": "16E", "snes_addr": "B7EACC", "bank": "B7", "label": "Text_16E_Dialog_BigRockOutCollapsedEarthquake", "category": "Dialog", "text_preview": "The big rock out there collapsed by the earthquake.Did you know that?"}, {"index_hex": "16F", "snes_addr": "B7EB62", "bank": "B7", "label": "Text_16F_Dialog_WasPrettySurprised", "category": "Dialog", "text_preview": "Oh yes:I was pretty surprised."}, {"index_hex": "170", "snes_addr": "B7EBB0", "bank": "B7", "label": "Text_170_Dialog_ListenGoThroughRock", "category": "Dialog", "text_preview": "Hey:listen: we can go through the rock."}, {"index_hex": "171", "snes_addr": "B7EC0C", "bank": "B7", "label": "Text_171_Dialog_MightAbleGoEndRanch", "category": "Dialog", "text_preview": "It might be able to go to the end of the ranch faster through here. But time still goes on."}, {"index_hex": "172", "snes_addr": "B7ECC8", "bank": "B7", "label": "Text_172_Animal_HaveSeenMoleScaresCows", "category": "Animal", "text_preview": "Have you seen a mole?It scares the cows sometimes. You'd better kick it out of the fence right away."}, {"index_hex": "173", "snes_addr": "B7ED9C", "bank": "B7", "label": "Text_173_Dialog_Happy", "category": "Dialog", "text_preview": "I'm happy...."}, {"index_hex": "174", "snes_addr": "B7EDB8", "bank": "B7", "label": "Text_174_Dialog_HaventThoughtAboutitYet", "category": "Dialog", "text_preview": "Well:I haven't thought aboutit yet..."}, {"index_hex": "175", "snes_addr": "B7EE04", "bank": "B7", "label": "Text_175_Dialog_SureMe", "category": "Dialog", "text_preview": "...Are you sure? Me?"}, {"index_hex": "176", "snes_addr": "B7EE2E", "bank": "B7", "label": "Text_176_Dialog_YoureKidding", "category": "Dialog", "text_preview": "You're kidding..."}, {"index_hex": "177", "snes_addr": "B7EE52", "bank": "B7", "label": "Text_177_Dialog_YesYou", "category": "Dialog", "text_preview": "Yes, You,"}, {"index_hex": "178", "snes_addr": "B7EE66", "bank": "B7", "label": "Text_178_Dialog_AfraidTooEarly", "category": "Dialog", "text_preview": "I'm afraid it's too early..."}, {"index_hex": "179", "snes_addr": "B7EEA0", "bank": "B7", "label": "Text_179_Dialog_WhatYes", "category": "Dialog", "text_preview": "What? ......Yes."}, {"index_hex": "17A", "snes_addr": "B7EEC2", "bank": "B7", "label": "Text_17A_Dialog_AllTooSuddenKnow", "category": "Dialog", "text_preview": "It's all too sudden so I don't know what to do..."}, {"index_hex": "17B", "snes_addr": "B7EF2C", "bank": "B7", "label": "Text_17B_Dialog_TitterAlrightSay", "category": "Dialog", "text_preview": "Titter...alright. I say OK."}, {"index_hex": "17C", "snes_addr": "B7EF64", "bank": "B7", "label": "Text_17C_Dialog_StillTooEarly", "category": "Dialog", "text_preview": "Well: It's still too early."}, {"index_hex": "17D", "snes_addr": "B7EF9C", "bank": "B7", "label": "Text_17D_Dialog_GoodMorningDaDarlingHappy", "category": "Dialog", "text_preview": "Good morning....da-darling. Be happy together from now on."}, {"index_hex": "17E", "snes_addr": "B7F01C", "bank": "B7", "label": "Text_17E_Dialog_JmClCnGo", "category": "Dialog", "text_preview": "<CTRL_FFFD>jm:<CTRL_FFFC>cl<CTRL_FFFD>cn of <CTRL_FFFD>go."}, {"index_hex": "17F", "snes_addr": "B7F044", "bank": "B7", "label": "Text_17F_Dialog_TooLate", "category": "Dialog", "text_preview": "Don't be too late."}, {"index_hex": "180", "snes_addr": "B7F06A", "bank": "B7", "label": "Text_180_Dialog_ThankTroubleDarling", "category": "Dialog", "text_preview": "Thank you for your trouble: darling."}, {"index_hex": "181", "snes_addr": "B7F0B4", "bank": "B7", "label": "Text_181_Diary_WorkHardTodayToo", "category": "Diary", "text_preview": "Please work hard today:too."}, {"index_hex": "182", "snes_addr": "B7F0EC", "bank": "B7", "label": "Text_182_Dialog_GotMyBestTodayalso", "category": "Dialog", "text_preview": "I've got to do my best todayalso."}, {"index_hex": "183", "snes_addr": "B7F130", "bank": "B7", "label": "Text_183_Diary_WorkHardGiveHouseGood", "category": "Diary", "text_preview": "I'll work hard to give the house a good shine."}, {"index_hex": "184", "snes_addr": "B7F190", "bank": "B7", "label": "Text_184_Dialog_StrangeSameSkyButWind", "category": "Dialog", "text_preview": "It's strange. It's the same sky but the wind and the airfeel different."}, {"index_hex": "185", "snes_addr": "B7F220", "bank": "B7", "label": "Text_185_Dialog_TryMyBestMakeSomething", "category": "Dialog", "text_preview": "I'll try my best to make something that will help you."}, {"index_hex": "186", "snes_addr": "B7F29A", "bank": "B7", "label": "Text_186_Dialog_TakeCareThoseToolsToo", "category": "Dialog", "text_preview": "I'll take care of those tools too. .....Don't worry. I won't break any."}, {"index_hex": "187", "snes_addr": "B7F354", "bank": "B7", "label": "Text_187_Animal_AutoMilkingYogurtMakerSpecial", "category": "Animal", "text_preview": "\"Auto Milking <$0040> Yogurt-Maker: Special Version\" I wish it would be finished by spring..."}, {"index_hex": "188", "snes_addr": "B7F416", "bank": "B7", "label": "Text_188_Dialog_TimeGoesQuicklyFeelLike", "category": "Dialog", "text_preview": "Time goes by really quickly.I feel like I met you only afew days ago."}, {"index_hex": "189", "snes_addr": "B7F4A2", "bank": "B7", "label": "Text_189_Weather_WeatherBeautifulLetsGoPicnic", "category": "Weather", "text_preview": "The weather is beautiful. Let's go on a picnic to the mountain top soon."}, {"index_hex": "18A", "snes_addr": "B7F538", "bank": "B7", "label": "Text_18A_Dialog_LaLaLaLaLa", "category": "Dialog", "text_preview": "La-la-la-la-la... The sky is blue. I somehow feel cheerful."}, {"index_hex": "18B", "snes_addr": "B7F5C6", "bank": "B7", "label": "Text_18B_Sign_MysteriousFlowerMountainSomedayDreaming", "category": "Sign", "text_preview": "That mysterious flower in the mountain:someday I'm dreaming of growing them at the ranch."}, {"index_hex": "18C", "snes_addr": "B7F684", "bank": "B7", "label": "Text_18C_Dialog_GoodMorningSweetheartWasSparrow", "category": "Dialog", "text_preview": "Good morning: sweetheart. There was a sparrow playing in front of our house some minutes ago. It was so cute."}, {"index_hex": "18D", "snes_addr": "B7F778", "bank": "B7", "label": "Text_18D_Romance_WantCookDeliciousMealsEvery", "category": "Romance", "text_preview": "I want to cook delicious meals for you every day."}, {"index_hex": "18E", "snes_addr": "B7F7E2", "bank": "B7", "label": "Text_18E_Dialog_EpMayDescendedOfaThoroughbred", "category": "Dialog", "text_preview": "<CTRL_FFFD>ep may be the descended ofa Thoroughbred. Don't you think so? It has a pretty fine coat of hair."}, {"index_hex": "18F", "snes_addr": "B7F8C2", "bank": "B7", "label": "Text_18F_Dialog_SpringWonderful", "category": "Dialog", "text_preview": "Yes:spring is wonderful."}, {"index_hex": "190", "snes_addr": "B7F8F4", "bank": "B7", "label": "Text_190_Dialog_GraduallyGettingUsedLivingLonely", "category": "Dialog", "text_preview": "Gradually I am getting used to living here. What? Am I lonely? Oh:come on:you are here beside me."}, {"index_hex": "191", "snes_addr": "B7F9C2", "bank": "B7", "label": "Text_191_Sign_ManyKindsAnimalsMountainGive", "category": "Sign", "text_preview": "There are many kinds of animals in the mountain. Doesnt' that give you comfort?"}, {"index_hex": "192", "snes_addr": "B7FA70", "bank": "B7", "label": "Text_192_Romance_CookEvening", "category": "Romance", "text_preview": "What should I cook this evening?"}, {"index_hex": "193", "snes_addr": "B7FABA", "bank": "B7", "label": "Text_193_Dialog_HoneyWork", "category": "Dialog", "text_preview": "Honey: please work well."}, {"index_hex": "194", "snes_addr": "B7FAEC", "bank": "B7", "label": "Text_194_Dialog_SundaysRanch", "category": "Dialog", "text_preview": "There are no Sundays at ranch."}, {"index_hex": "195", "snes_addr": "B7FB32", "bank": "B7", "label": "Text_195_Dialog_WarmSuchComfortableSunday", "category": "Dialog", "text_preview": "It's warm. Such a comfortable Sunday."}, {"index_hex": "196", "snes_addr": "B7FB92", "bank": "B7", "label": "Text_196_Dialog_WorkDayLike", "category": "Dialog", "text_preview": "Do you work on a day like this?"}, {"index_hex": "197", "snes_addr": "B7FBD6", "bank": "B7", "label": "Text_197_Weather_RainingHardOutsideMightCatch", "category": "Weather", "text_preview": "It's raining so hard outside. You might catch cold."}, {"index_hex": "198", "snes_addr": "B7FC52", "bank": "B7", "label": "Text_198_Weather_SnowHardlyWaitforSpring", "category": "Weather", "text_preview": "What snow, I can hardly waitfor spring."}, {"index_hex": "199", "snes_addr": "B7FCA2", "bank": "B7", "label": "Text_199_Dialog_QuietLikeTimeStops", "category": "Dialog", "text_preview": "It's so quiet. Just like time stops."}, {"index_hex": "19A", "snes_addr": "B7FCF2", "bank": "B7", "label": "Text_19A_Dialog_GoingBackMyParentsHome", "category": "Dialog", "text_preview": "I'm going back to my parents' home,"}, {"index_hex": "19B", "snes_addr": "B7FD48", "bank": "B7", "label": "Text_19B_Dialog_CamePickMeUpSorry", "category": "Dialog", "text_preview": "You came to pick me up? ......Sorry."}, {"index_hex": "19C", "snes_addr": "B7FD9A", "bank": "B7", "label": "Text_19C_Dialog_AngryAnyMoreOnlyLittle", "category": "Dialog", "text_preview": "I am not angry any more, Only a little..."}, {"index_hex": "19D", "snes_addr": "B7FDF4", "bank": "B7", "label": "Text_19D_Dialog_WaaaMissed", "category": "Dialog", "text_preview": "Waaa:I missed you."}, {"index_hex": "19E", "snes_addr": "B7FE1A", "bank": "B7", "label": "Text_19E_Dialog_BackHonestWasSorry", "category": "Dialog", "text_preview": "OK:I'll be back. To be honest: I was sorry."}, {"index_hex": "19F", "snes_addr": "B7FE7C", "bank": "B7", "label": "Text_19F_Dialog_KnowGetMadatBecauseyouAlways", "category": "Dialog", "text_preview": "You don't know why I get madat you: do you? It's becauseyou always leave me alone."}, {"index_hex": "1A0", "snes_addr": "B7FF22", "bank": "B7", "label": "Text_1A0_Dialog_DarlingShallPaintHouseBeautiful", "category": "Dialog", "text_preview": "Hey:darling:shall we paint our house in a beautiful color?"}, {"index_hex": "1A1", "snes_addr": "B7FFA0", "bank": "B7", "label": "Text_1A1_Dialog_HasBecomePrettyHouse", "category": "Dialog", "text_preview": "It has become a pretty house."}, {"index_hex": "1A2", "snes_addr": "B88000", "bank": "B8", "label": "Text_1A2_Dialog_UummmmSayUmmGuessPregnant", "category": "Dialog", "text_preview": "Well...Uummmm...say... I...umm.. I guess I'm pregnant."}, {"index_hex": "1A3", "snes_addr": "B8809C", "bank": "B8", "label": "Text_1A3_Dialog_ItllBornSomeTimeLater", "category": "Dialog", "text_preview": "It'll be born some time later."}, {"index_hex": "1A4", "snes_addr": "B880E2", "bank": "B8", "label": "Text_1A4_Dialog_ThinkNameFortheBaby", "category": "Dialog", "text_preview": "Will you think of a name forthe baby?"}, {"index_hex": "1A5", "snes_addr": "B8812E", "bank": "B8", "label": "Text_1A5_Dialog_FeelMyBodyBecomingLittle", "category": "Dialog", "text_preview": "I feel my body becoming a little heavier."}, {"index_hex": "1A6", "snes_addr": "B88186", "bank": "B8", "label": "Text_1A6_Romance_WonderIfBoyorGirl", "category": "Romance", "text_preview": "I wonder if it will be a boyor a girl."}, {"index_hex": "1A7", "snes_addr": "B881D4", "bank": "B8", "label": "Text_1A7_Dialog_KnowWalkAroundMuch", "category": "Dialog", "text_preview": "I know.I won't walk around so much."}, {"index_hex": "1A8", "snes_addr": "B8821E", "bank": "B8", "label": "Text_1A8_Dialog_FeelStrangeGoingHaveBaby", "category": "Dialog", "text_preview": "I feel strange that I'm going to have a baby soon."}, {"index_hex": "1A9", "snes_addr": "B8828C", "bank": "B8", "label": "Text_1A9_Dialog_GetOutMyWayGet", "category": "Dialog", "text_preview": "Get out of my way: get out,"}, {"index_hex": "1AA", "snes_addr": "B882C4", "bank": "B8", "label": "Text_1AA_Dialog_HoneyWorryGoWorkC", "category": "Dialog", "text_preview": "I'm OK:honey.Don't worry. Please go to work. Really? No: no: no<CHOICE_OR_WAIT>c"}, {"index_hex": "1AB", "snes_addr": "B88374", "bank": "B8", "label": "Text_1AB_Dialog_Alright", "category": "Dialog", "text_preview": "I'll do alright."}, {"index_hex": "1AC", "snes_addr": "B88396", "bank": "B8", "label": "Text_1AC_Dialog_MeThank", "category": "Dialog", "text_preview": "Are you with me? Thank you."}, {"index_hex": "1AD", "snes_addr": "B883CE", "bank": "B8", "label": "Text_1AD_Dialog_UughUugh", "category": "Dialog", "text_preview": "uugh..uugh..."}, {"index_hex": "1AE", "snes_addr": "B883EA", "bank": "B8", "label": "Text_1AE_Church_MyGodBabyComing", "category": "Church", "text_preview": "Oh my God:the baby is coming,"}, {"index_hex": "1AF", "snes_addr": "B88432", "bank": "B8", "label": "Text_1AF_Dialog_FalteringFaltering", "category": "Dialog", "text_preview": "Faltering:faltering."}, {"index_hex": "1B0", "snes_addr": "B8845C", "bank": "B8", "label": "Text_1B0_Dialog_TakeEasy", "category": "Dialog", "text_preview": "Take it easy."}, {"index_hex": "1B1", "snes_addr": "B88478", "bank": "B8", "label": "Text_1B1_Dialog_WalkingAbout", "category": "Dialog", "text_preview": "Don't be walking about."}, {"index_hex": "1B2", "snes_addr": "B884A8", "bank": "B8", "label": "Text_1B2_Dialog_GuessGotOldEnoughAble", "category": "Dialog", "text_preview": "I guess I've got to be old enough to be able to see my great grandchild."}, {"index_hex": "1B3", "snes_addr": "B8853C", "bank": "B8", "label": "Text_1B3_Dialog_WaahWaah", "category": "Dialog", "text_preview": "Waah-waah..."}, {"index_hex": "1B4", "snes_addr": "B88556", "bank": "B8", "label": "Text_1B4_Dialog_HoHoHoVeryHealthy", "category": "Dialog", "text_preview": "Ho-ho-ho...It's a very healthy baby boy."}, {"index_hex": "1B5", "snes_addr": "B885B2", "bank": "B8", "label": "Text_1B5_Dialog_Great", "category": "Dialog", "text_preview": "Great,"}, {"index_hex": "1B6", "snes_addr": "B885C0", "bank": "B8", "label": "Text_1B6_Dialog_PhewHaventNervousYears", "category": "Dialog", "text_preview": "Phew...I haven't been this nervous for years."}, {"index_hex": "1B7", "snes_addr": "B8861E", "bank": "B8", "label": "Text_1B7_Romance_LooksLikeNinaButHas", "category": "Romance", "text_preview": "Yes: he looks like Nina. Well...but he has your eyes:maybe."}, {"index_hex": "1B8", "snes_addr": "B8869C", "bank": "B8", "label": "Text_1B8_Animal_RemindsMeNinaWasBorn", "category": "Animal", "text_preview": "It reminds me of when Nina was born."}, {"index_hex": "1B9", "snes_addr": "B886E8", "bank": "B8", "label": "Text_1B9_Animal_RemindsMeEveWasBorn", "category": "Animal", "text_preview": "It reminds me of when Eve was born."}, {"index_hex": "1BA", "snes_addr": "B88734", "bank": "B8", "label": "Text_1BA_Dialog_DarlingNameHim", "category": "Dialog", "text_preview": "Darling: please name him."}, {"index_hex": "1BB", "snes_addr": "B88768", "bank": "B8", "label": "Text_1BB_Dialog_ThankHoneyHappy", "category": "Dialog", "text_preview": "Thank you: honey. I'm so happy."}, {"index_hex": "1BC", "snes_addr": "B887AE", "bank": "B8", "label": "Text_1BC_Dialog_JqCmCrGsBaby", "category": "Dialog", "text_preview": "<CTRL_FFFD>jq:<CTRL_FFFC>cm<CTRL_FFFD>cr of <CTRL_FFFD>gs. Our baby was born."}, {"index_hex": "1BD", "snes_addr": "B88800", "bank": "B8", "label": "Text_1BD_Romance_PresentGladRememberedAnniversary", "category": "Romance", "text_preview": "What? Present? I'm so glad that you remembered the anniversary."}, {"index_hex": "1BE", "snes_addr": "B8888A", "bank": "B8", "label": "Text_1BE_Dialog_LaLaLa", "category": "Dialog", "text_preview": "La-la-la"}, {"index_hex": "1BF", "snes_addr": "B8889C", "bank": "B8", "label": "Text_1BF_Romance_JtCnCuGvGot", "category": "Romance", "text_preview": "<CTRL_FFFD>jt:<CTRL_FFFC>cn<CTRL_FFFD>cu of <CTRL_FFFD>gv. We got married today."}, {"index_hex": "1C0", "snes_addr": "B888F4", "bank": "B8", "label": "Text_1C0_Dialog_Dah", "category": "Dialog", "text_preview": "Dah..."}, {"index_hex": "1C1", "snes_addr": "B88902", "bank": "B8", "label": "Text_1C1_Dialog_DaDa", "category": "Dialog", "text_preview": "Da-da..."}, {"index_hex": "1C2", "snes_addr": "B88914", "bank": "B8", "label": "Text_1C2_Dialog_BooBoo", "category": "Dialog", "text_preview": "Boo-boo..."}, {"index_hex": "1C3", "snes_addr": "B8892A", "bank": "B8", "label": "Text_1C3_Shop_BlueFeatherHappinessHappinessDifferent", "category": "Sign", "text_preview": "This is \"Blue feather of happiness.\"Well:happiness is different for each one though. Right now: it's only <CTRL_B3><CTRL_B2><CTRL_B2><CTRL_B2>G, Buy it Don't buy it Money <CTRL_FFFC>ho<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "1C4", "snes_addr": "B88AC4", "bank": "B8", "label": "Text_1C4_Church_GodBless", "category": "Church", "text_preview": "God bless you,"}, {"index_hex": "1C5", "snes_addr": "B88AE2", "bank": "B8", "label": "Text_1C5_Dialog_ConsiderManyTimesBecauseBig", "category": "Dialog", "text_preview": "Yes: you should consider it many times because it a big choice of life."}, {"index_hex": "1C6", "snes_addr": "B88B7A", "bank": "B8", "label": "Text_1C6_Romance_SillyMarried", "category": "Romance", "text_preview": "Don't be silly:I'm married."}, {"index_hex": "1C7", "snes_addr": "B88BB2", "bank": "B8", "label": "Text_1C7_Dialog_WhoPlayingJokeYoungMan", "category": "Dialog", "text_preview": "Who are you playing a joke on:young man?"}, {"index_hex": "1C8", "snes_addr": "B88C06", "bank": "B8", "label": "Text_1C8_Dialog_Come", "category": "Dialog", "text_preview": "That's it, Come on,"}, {"index_hex": "1C9", "snes_addr": "B88C2E", "bank": "B8", "label": "Text_1C9_Dialog_GivingWrongPerson", "category": "Dialog", "text_preview": "Hey: you are giving it to a wrong person."}, {"index_hex": "1CA", "snes_addr": "B88C82", "bank": "B8", "label": "Text_1CA_Romance_HaveGiveGirlLoveGirl", "category": "Romance", "text_preview": "You have to give it to the girl you love: OK? To the girl you want to marry."}, {"index_hex": "1CB", "snes_addr": "B88D22", "bank": "B8", "label": "Text_1CB_Dialog_WowBlueFeatherShowMe", "category": "Dialog", "text_preview": "Wow:the blue feather, Show it to me."}, {"index_hex": "1CC", "snes_addr": "B88D78", "bank": "B8", "label": "Text_1CC_Animal_GoodMorningExcuseMeBothering", "category": "Animal", "text_preview": "Good morning. Please excuse me for bothering you so early in the morning but have you seen Maria? When I woke up:her bed was empty. Oh Lord:now that she's not here:then:where on earth is she now? Please,Will you look for"}, {"index_hex": "1CD", "snes_addr": "B88F60", "bank": "B8", "label": "Text_1CD_Romance_MariaDadWasWrongCome", "category": "Romance", "text_preview": "Oh:Maria, Your dad was wrong.Please:please come back to me,"}, {"index_hex": "1CE", "snes_addr": "B88FE8", "bank": "B8", "label": "Text_1CE_Romance_UsuallyQuietGirlButReason", "category": "Romance", "text_preview": "She is usually a quiet girl but...reason? ho-ho-ho: it's her father's fault.I'm sorry to trouble you.But please look for her."}, {"index_hex": "1CF", "snes_addr": "B890FE", "bank": "B8", "label": "Text_1CF_Romance_SeemsMariaFatherArguedOver", "category": "Romance", "text_preview": "It seems Maria and her father argued over you."}, {"index_hex": "1D0", "snes_addr": "B89166", "bank": "B8", "label": "Text_1D0_Sign_ThinkMariaWentUpThemountain", "category": "Sign", "text_preview": "I think Maria went up to themountain.She said she wanted to go there alone."}, {"index_hex": "1D1", "snes_addr": "B8920A", "bank": "B8", "label": "Text_1D1_Mountain_MariaGoWenttoExactlyNortheast", "category": "Sign", "text_preview": "Where did Maria go? She wentto...exactly northeast. You see a pond there."}, {"index_hex": "1D2", "snes_addr": "B892A6", "bank": "B8", "label": "Text_1D2_Church_RushAboutPrayingWhile", "category": "Church", "text_preview": "Don't rush.How about praying for a while?"}, {"index_hex": "1D3", "snes_addr": "B89308", "bank": "B8", "label": "Text_1D3_Romance_GirlHaventSeenAny", "category": "Romance", "text_preview": "Hello.A girl? No: I haven't seen any."}, {"index_hex": "1D4", "snes_addr": "B89354", "bank": "B8", "label": "Text_1D4_Romance_WantTodayLookingGirl", "category": "Romance", "text_preview": "Hi.What do you want today? What? Are you looking for a girl?"}, {"index_hex": "1D5", "snes_addr": "B893D4", "bank": "B8", "label": "Text_1D5_Dialog_UummNKnowSureKnow", "category": "Dialog", "text_preview": "Uumm:n-no:I don't know. I sure don't know:really. She's not hiding behind the bed."}, {"index_hex": "1D6", "snes_addr": "B89486", "bank": "B8", "label": "Text_1D6_Dialog_SorryGoingHomeThank", "category": "Dialog", "text_preview": "I'm sorry..I'm...going home.Hey:thank you."}, {"index_hex": "1D7", "snes_addr": "B894DC", "bank": "B8", "label": "Text_1D7_Dialog_WhatsGoing", "category": "Dialog", "text_preview": "What's going on here:hey: you?"}, {"index_hex": "1D8", "snes_addr": "B8951E", "bank": "B8", "label": "Text_1D8_Romance_HoHoHoMariaBack", "category": "Romance", "text_preview": "Ho-ho-ho:Maria is in the back room. She is my daughter. She does the same thing as me. She's just a little sulky."}, {"index_hex": "1D9", "snes_addr": "B89620", "bank": "B8", "label": "Text_1D9_Dialog_Rude", "category": "Dialog", "text_preview": "How rude,"}, {"index_hex": "1DA", "snes_addr": "B89634", "bank": "B8", "label": "Text_1DA_Dialog_LikeSmellMuch", "category": "Dialog", "text_preview": "I don't like this smell so much."}, {"index_hex": "1DB", "snes_addr": "B89678", "bank": "B8", "label": "Text_1DB_Weather_HaveSeenMyWeatherCock", "category": "Weather", "text_preview": "Hey:have you seen my weather-cock? The one on the top of my roof. It was blown away by the strong wind last night. I suppose it came here but please let me know if you find it."}, {"index_hex": "1DC", "snes_addr": "B8983E", "bank": "B8", "label": "Text_1DC_Weather_MadeWeatherCockFormyWife", "category": "Weather", "text_preview": "I made that weather-cock formy wife.so it's just like a memento for Ann. She's usually cheerful but now she's so depressed."}, {"index_hex": "1DD", "snes_addr": "B89938", "bank": "B8", "label": "Text_1DD_Weather_DirectionWhichWeatherCockWent", "category": "Weather", "text_preview": "The Direction in which the weather-cock went to? Somewhere you can keep away from the rain.And the key word is chicken,"}, {"index_hex": "1DE", "snes_addr": "B89A38", "bank": "B8", "label": "Text_1DE_Dialog_FindAha", "category": "Dialog", "text_preview": "You can't find it...aha..."}, {"index_hex": "1DF", "snes_addr": "B89A6E", "bank": "B8", "label": "Text_1DF_Dialog_CameBackHomeSuchAhurry", "category": "Dialog", "text_preview": "She came back home in such ahurry:went into her room right away: and still stays there."}, {"index_hex": "1E0", "snes_addr": "B89B24", "bank": "B8", "label": "Text_1E0_Animal_TraditionAreaCalledBlueFeather", "category": "Animal", "text_preview": "That's a tradition in this area called \"Blue feather ofhappiness.\" Use it when you make a marriage proposal to someone."}, {"index_hex": "1E1", "snes_addr": "B89C2E", "bank": "B8", "label": "Text_1E1_Dialog_HangingMyMemoryButPrecious", "category": "Dialog", "text_preview": "I'm not hanging on to my memory but it's so precious for me. ....Thank you,"}, {"index_hex": "1E2", "snes_addr": "B89CCC", "bank": "B8", "label": "Text_1E2_Town_NiceYoungPeopleWantCheerful", "category": "Town", "text_preview": "How nice the young people are, Yes:I want her to be cheerful all the time. Sure."}, {"index_hex": "1E3", "snes_addr": "B89D76", "bank": "B8", "label": "Text_1E3_Sign_NinaHasntBackSinceWent", "category": "Sign", "text_preview": "Nina hasn't been back since she went to the mountain to find a herb. Please look for her,"}, {"index_hex": "1E4", "snes_addr": "B89E2A", "bank": "B8", "label": "Text_1E4_Dialog_DadOutTakingCareMother", "category": "Dialog", "text_preview": "Her Dad is out taking care of her mother."}, {"index_hex": "1E5", "snes_addr": "B89E80", "bank": "B8", "label": "Text_1E5_Town_HerbGrassTinyLittleWhite", "category": "Town", "text_preview": ".....Herb.... A grass with a tiny little white flower..."}, {"index_hex": "1E6", "snes_addr": "B89F04", "bank": "B8", "label": "Text_1E6_Romance_MmmmGirlFellDownDark", "category": "Romance", "text_preview": "Mmmm:a girl fell down in a dark: small place. Go get her right away before it's too late."}, {"index_hex": "1E7", "snes_addr": "B89FBE", "bank": "B8", "label": "Text_1E7_Dialog_ThankGoodMomBetter", "category": "Dialog", "text_preview": "...Thank you.Good.Mom will be better with this."}, {"index_hex": "1E8", "snes_addr": "B8A020", "bank": "B8", "label": "Text_1E8_Dialog_MoveAnyMore", "category": "Dialog", "text_preview": "....No:I can't move any more."}, {"index_hex": "1E9", "snes_addr": "B8A064", "bank": "B8", "label": "Text_1E9_Romance_HehHehNinaAlwaysWants", "category": "Romance", "text_preview": "Heh-heh:Nina always wants to make up to everyone so it must be hard for you to take care of her."}, {"index_hex": "1EA", "snes_addr": "B8A12E", "bank": "B8", "label": "Text_1EA_Dialog_HaveDoneTimeAllPretty", "category": "Dialog", "text_preview": "What have you done this time? They all are pretty angry."}, {"index_hex": "1EB", "snes_addr": "B8A1AC", "bank": "B8", "label": "Text_1EB_Dialog_MyPChanGoneIf", "category": "Dialog", "text_preview": "My P-chan is gone. If you see her: please let me know.Promise me."}, {"index_hex": "1EC", "snes_addr": "B8A234", "bank": "B8", "label": "Text_1EC_Dialog_RecentlyCuteCustomerCame", "category": "Dialog", "text_preview": "Recently a cute customer came here."}, {"index_hex": "1ED", "snes_addr": "B8A282", "bank": "B8", "label": "Text_1ED_Romance_EllensBirdFlewAwayPretty", "category": "Romance", "text_preview": "Ellen's bird flew away so she is pretty depressed."}, {"index_hex": "1EE", "snes_addr": "B8A2EC", "bank": "B8", "label": "Text_1EE_Dialog_Aha", "category": "Dialog", "text_preview": "Aha..."}, {"index_hex": "1EF", "snes_addr": "B8A2FA", "bank": "B8", "label": "Text_1EF_Sign_WhichDirectionBluebirdGoThink", "category": "Sign", "text_preview": "Which direction did the bluebird go? Well:I think I saw it flying up towards the mountain."}, {"index_hex": "1F0", "snes_addr": "B8A3B8", "bank": "B8", "label": "Text_1F0_Romance_EllenDependsLookAfter", "category": "Romance", "text_preview": "Ellen depends on you: doesn't she? Look after her."}, {"index_hex": "1F1", "snes_addr": "B8A448", "bank": "B8", "label": "Text_1F1_Romance_SorryNowWasAlwaysCheered", "category": "Romance", "text_preview": "I'm sorry...I'm OK now. I was ....always...cheered up and never thought of P-chan. She's free now...good bye: P-chan...take care...thank you for everything you've done for me."}, {"index_hex": "1F2", "snes_addr": "B8A5DA", "bank": "B8", "label": "Text_1F2_Dialog_ThankLookingMybird", "category": "Dialog", "text_preview": "Thank you for looking for mybird."}, {"index_hex": "1F3", "snes_addr": "B8A61E", "bank": "B8", "label": "Text_1F3_Dialog_RecentlyNothing", "category": "Dialog", "text_preview": "...You recently....no: nothing..."}, {"index_hex": "1F4", "snes_addr": "B8A66C", "bank": "B8", "label": "Text_1F4_Dialog_VeryBusy", "category": "Dialog", "text_preview": "...What? I'm very busy,"}, {"index_hex": "1F5", "snes_addr": "B8A69C", "bank": "B8", "label": "Text_1F5_Sign_GoodGodOldHunterLocked", "category": "Sign", "text_preview": "Good God, The old hunter is locked in the cave,"}, {"index_hex": "1F6", "snes_addr": "B8A6FC", "bank": "B8", "label": "Text_1F6_Dialog_HelpMyGrandpa", "category": "Dialog", "text_preview": "Please:help my grandpa,"}, {"index_hex": "1F7", "snes_addr": "B8A72C", "bank": "B8", "label": "Text_1F7_Diary_WeveGotSaveHimAs", "category": "Diary", "text_preview": "We've got to save him as soon as possible."}, {"index_hex": "1F8", "snes_addr": "B8A788", "bank": "B8", "label": "Text_1F8_Sign_GoForwardBecauseInsideCave", "category": "Sign", "text_preview": "We can't go forward because the inside of the cave has collapsed."}, {"index_hex": "1F9", "snes_addr": "B8A80E", "bank": "B8", "label": "Text_1F9_Dialog_GladMadeHesPromisingYoung", "category": "Dialog", "text_preview": "So glad:you made it, He's a promising young man."}, {"index_hex": "1FA", "snes_addr": "B8A870", "bank": "B8", "label": "Text_1FA_Manual_HaveGotHammerHammer", "category": "Manual", "text_preview": "Have you got a hammer? Hammer,?"}, {"index_hex": "1FB", "snes_addr": "B8A8BA", "bank": "B8", "label": "Text_1FB_Sign_WhoEveSayGrandfatherWas", "category": "Manual", "text_preview": "Who? Eve? They say your grandfather was in trouble in the mountain so they are still over there."}, {"index_hex": "1FC", "snes_addr": "B8A986", "bank": "B8", "label": "Text_1FC_Romance_GroanOuchPhewTooOld", "category": "Romance", "text_preview": "Groan...ouch... It's you... Phew:I'm too old now... If something happens to me: look after Eve."}, {"index_hex": "1FD", "snes_addr": "B8AA4E", "bank": "B8", "label": "Text_1FD_Dialog_GrandpaGladToseeAlright", "category": "Dialog", "text_preview": "Grandpa, ...I am .So glad tosee that you are alright."}, {"index_hex": "1FE", "snes_addr": "B8AABA", "bank": "B8", "label": "Text_1FE_Dialog_HaveGottenOutMyself", "category": "Dialog", "text_preview": "I could have gotten out of there by myself."}, {"index_hex": "1FF", "snes_addr": "B8AB14", "bank": "B8", "label": "Text_1FF_Town_GrandpaScaredMeDeathUnreasonable", "category": "Town", "text_preview": "Grandpa...you scared me to death.....Please don't be unreasonable any more. ....Come down to the town."}, {"index_hex": "200", "snes_addr": "B8ABE8", "bank": "B8", "label": "Text_200_Dialog_Thank", "category": "Dialog", "text_preview": "Thank you."}, {"index_hex": "201", "snes_addr": "B8ABFE", "bank": "B8", "label": "Text_201_Festival_FlowerFestivalTomorrowWholeTown", "category": "Festival", "text_preview": "Well:the Flower Festival is tomorrow.The whole town is covered with the good smell of flowers. Everybody:let's get together at the public square at <CTRL_B5> o'clock."}, {"index_hex": "202", "snes_addr": "B8AD42", "bank": "B8", "label": "Text_202_Festival_FlowerFestivalOnceUponTime", "category": "Festival", "text_preview": "The flower festival is... once upon a time... The Goddess of Land was trying to cheer up a girl who had lost her boyfriend She made the flowers bloom for the first time. And Before that: there was no flowers at all."}, {"index_hex": "203", "snes_addr": "B8AF26", "bank": "B8", "label": "Text_203_Shipping_SellingWonderfulThingsFestivalTomorrow", "category": "Shipping", "text_preview": "We'll be selling wonderful things at the festival tomorrow so look forward to it."}, {"index_hex": "204", "snes_addr": "B8AFD6", "bank": "B8", "label": "Text_204_Dialog_GivingPresentYear", "category": "Dialog", "text_preview": "I'm really giving her a present this year."}, {"index_hex": "205", "snes_addr": "B8B034", "bank": "B8", "label": "Text_205_Manual_GodHasTaughtUsHeart", "category": "Manual", "text_preview": "God has taught us that the heart is for appreciating flowers and to being open and relaxed."}, {"index_hex": "206", "snes_addr": "B8B0F2", "bank": "B8", "label": "Text_206_Festival_FlowerFestivalTomorrowAlsoCelebrate", "category": "Festival", "text_preview": "It's the Flower Festival tomorrow. It also celebrate the spring to come."}, {"index_hex": "207", "snes_addr": "B8B18A", "bank": "B8", "label": "Text_207_Festival_FlowerFestivalTomorrowGoodRelax", "category": "Festival", "text_preview": "It's the Flower Festival tomorrow.It's good to relax once in a while."}, {"index_hex": "208", "snes_addr": "B8B21C", "bank": "B8", "label": "Text_208_Festival_FlowerFestivalTomorrowLoveBest", "category": "Festival", "text_preview": "It's the Flower Festival tomorrow.I love it the best of all the festivals."}, {"index_hex": "209", "snes_addr": "B8B2B8", "bank": "B8", "label": "Text_209_Shop_BuyAllUnusualStuffFestival", "category": "Sign", "text_preview": "Don't buy all that unusual stuff at the festival."}, {"index_hex": "20A", "snes_addr": "B8B31E", "bank": "B8", "label": "Text_20A_Festival_HehLoveFestivalsLookingForward", "category": "Festival", "text_preview": "Heh:I love festivals.I am Looking forward to it."}, {"index_hex": "20B", "snes_addr": "B8B384", "bank": "B8", "label": "Text_20B_Festival_OneHasGoFestivalBut", "category": "Festival", "text_preview": "No one has to go to the festival but please join us tomorrow."}, {"index_hex": "20C", "snes_addr": "B8B408", "bank": "B8", "label": "Text_20C_Shipping_SellingBottlesSomeWonderfulPerfume", "category": "Shipping", "text_preview": "We are selling bottles of some wonderful perfume toda"}, {"index_hex": "20D", "snes_addr": "B8B4CA", "bank": "B8", "label": "Text_20D_Town_MadeRoseFlowersSmellsSweet", "category": "Town", "text_preview": "That's made of \"Rose\" flowers.Smells sweet and romantic:doesn't it? It costs <CTRL_B3><CTRL_B2><CTRL_B2><CTRL_B2>G Do you want it? Yes No Money <CTRL_FFFC>hp<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "20E", "snes_addr": "B8B63C", "bank": "B8", "label": "Text_20E_Shop_MadeLilacFlowersFragranceMild", "category": "Sign", "text_preview": "It's made of \"Lilac\" flowers. Its fragrance is mild and elegant: isn't it? It costs <CTRL_B3><CTRL_B2><CTRL_B2><CTRL_B2>G. Do you want to buy it? Yes No Money <CTRL_FFFC>hq<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "20F", "snes_addr": "B8B7C0", "bank": "B8", "label": "Text_20F_Shop_MadeVioletFlowersFragranceMakes", "category": "Sign", "text_preview": "It's made of \"Violet\" flowers.Its fragrance makes you feel refreshed. It's <CTRL_B3><CTRL_B2><CTRL_B2><CTRL_B2>G. Do you want to buy it? Yes No Money <CTRL_FFFC>hr<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "210", "snes_addr": "B8B92E", "bank": "B8", "label": "Text_210_Dialog_ThankVeryMuchCarefulDrop", "category": "Dialog", "text_preview": "Thank you very much. Please be careful not to drop and break it."}, {"index_hex": "211", "snes_addr": "B8B9C4", "bank": "B8", "label": "Text_211_Dialog_SeeLittleDisappointed", "category": "Dialog", "text_preview": "I see.I'm a little disappointed."}, {"index_hex": "212", "snes_addr": "B8BA18", "bank": "B8", "label": "Text_212_Dialog_WowThanksLotMmmmSmells", "category": "Dialog", "text_preview": "Wow:thanks a lot. Mmmm:it smells so good."}, {"index_hex": "213", "snes_addr": "B8BA70", "bank": "B8", "label": "Text_213_Dialog_MisterHaveEnoughMoney", "category": "Dialog", "text_preview": "Oh no:Mister:you don't have enough money."}, {"index_hex": "214", "snes_addr": "B8BACE", "bank": "B8", "label": "Text_214_Weather_HaveVeryRareProductTime", "category": "Weather", "text_preview": "I have a very rare product this time. It's said to be truly the only one of its kind in the world...It's called \"seed ofsnow flower.\" It costs <CTRL_B4><CTRL_B2><CTRL_B2><CTRL_B2>G. Do you want to buy it? Buy it Not this"}, {"index_hex": "215", "snes_addr": "B8BCDC", "bank": "B8", "label": "Text_215_Sign_DeliverShedUseWinterMountain", "category": "Sign", "text_preview": "Well:I'll deliver it to your shed.Use it in winter at the mountain top."}, {"index_hex": "216", "snes_addr": "B8BD76", "bank": "B8", "label": "Text_216_Dialog_BitDisappointedGuaranteeHaveNext", "category": "Dialog", "text_preview": "I'm a bit disappointed. I can't guarantee I'll have it next time though."}, {"index_hex": "217", "snes_addr": "B8BE10", "bank": "B8", "label": "Text_217_Manual_FragranceMakesPeopleFeelCalm", "category": "Manual", "text_preview": "Fragrance makes people feel calm and relaxed."}, {"index_hex": "218", "snes_addr": "B8BE6C", "bank": "B8", "label": "Text_218_Animal_ComesDownBuy", "category": "Animal", "text_preview": "When it comes down to it: I can't buy it."}, {"index_hex": "219", "snes_addr": "B8BEC4", "bank": "B8", "label": "Text_219_Animal_FeelCalmSeeFlowersMean", "category": "Animal", "text_preview": "I feel calm when I see flowers. I mean it."}, {"index_hex": "21A", "snes_addr": "B8BF24", "bank": "B8", "label": "Text_21A_Shop_WantBuyBottlePerfumeMy", "category": "Sign", "text_preview": "I want to buy a bottle of perfume for my sister."}, {"index_hex": "21B", "snes_addr": "B8BF8A", "bank": "B8", "label": "Text_21B_Romance_FragranceSoapBestGirls", "category": "Romance", "text_preview": "The fragrance of soap is the best for girls."}, {"index_hex": "21C", "snes_addr": "B8BFEA", "bank": "B8", "label": "Text_21C_Church_SayStatueGoddessLand", "category": "Church", "text_preview": "They say it's the statue of the Goddess of Land."}, {"index_hex": "21D", "snes_addr": "B8C04C", "bank": "B8", "label": "Text_21D_Sign_GoddessLandLivesThemountainVery", "category": "Sign", "text_preview": "Goddess of Land lives in themountain.And she is very friendly. Grandma told me so..... but I wonder if it's true."}, {"index_hex": "21E", "snes_addr": "B8C136", "bank": "B8", "label": "Text_21E_Church_SayGoddessOflandLivesSmall", "category": "Church", "text_preview": "They say that the Goddess ofLand lives in a small spring."}, {"index_hex": "21F", "snes_addr": "B8C1B6", "bank": "B8", "label": "Text_21F_Romance_ThinkCarefullyAboutGirlsTastes", "category": "Romance", "text_preview": "Think carefully about the girls' tastes and choose a present."}, {"index_hex": "220", "snes_addr": "B8C238", "bank": "B8", "label": "Text_220_Animal_MyHeartWarmsUpJoys", "category": "Animal", "text_preview": "My heart warms up with the joys of spring when it's filled with the smell of flowers."}, {"index_hex": "221", "snes_addr": "B8C2EC", "bank": "B8", "label": "Text_221_Romance_FlowersSoftenPeoplesMindsMay", "category": "Romance", "text_preview": "Flowers soften people's minds.May everybody be with the gentle mind."}, {"index_hex": "222", "snes_addr": "B8C37E", "bank": "B8", "label": "Text_222_Church_FlowersOneMostWonderfulGifts", "category": "Church", "text_preview": "Flowers are one of the most wonderful gifts from God."}, {"index_hex": "223", "snes_addr": "B8C3EA", "bank": "B8", "label": "Text_223_Festival_LetsDanceLaterDarling", "category": "Festival", "text_preview": "Let's dance later: darling."}, {"index_hex": "224", "snes_addr": "B8C422", "bank": "B8", "label": "Text_224_Romance_DadWandersLikeEveryYear", "category": "Romance", "text_preview": "Dad wanders like that every year."}, {"index_hex": "225", "snes_addr": "B8C466", "bank": "B8", "label": "Text_225_Town_LetSeeHaveCharacterFit", "category": "Town", "text_preview": "Let see...I don't have a character to fit the flowers."}, {"index_hex": "226", "snes_addr": "B8C4E8", "bank": "B8", "label": "Text_226_Romance_ProbablyLikesTypeGirlWho", "category": "Romance", "text_preview": "He probably likes the type of girl who is fond of flowers."}, {"index_hex": "227", "snes_addr": "B8C56A", "bank": "B8", "label": "Text_227_Dialog_SureButMightBeneatWork", "category": "Dialog", "text_preview": "I'm not sure but it might beneat to work on a machine tomake perfume."}, {"index_hex": "228", "snes_addr": "B8C5F6", "bank": "B8", "label": "Text_228_Town_FlowersCoverWholeTownHappy", "category": "Town", "text_preview": "Flowers cover the whole town.I am so happy, Hey:are you happy?"}, {"index_hex": "229", "snes_addr": "B8C67C", "bank": "B8", "label": "Text_229_Dialog_SayHappyComeVeGot", "category": "Romance", "text_preview": "Say:happy? Come on, You' ve got to be cheerier?"}, {"index_hex": "22A", "snes_addr": "B8C700", "bank": "B8", "label": "Text_22A_Romance_HeavenSupposeBloomingFlowersEverywhere", "category": "Romance", "text_preview": "In Heaven:I suppose there are blooming flowers everywhere such as on the water:and in the wind."}, {"index_hex": "22B", "snes_addr": "B8C7D2", "bank": "B8", "label": "Text_22B_Festival_DanceMuchBetterNow", "category": "Festival", "text_preview": "Hey:I can dance much better now."}, {"index_hex": "22C", "snes_addr": "B8C814", "bank": "B8", "label": "Text_22C_Dialog_TooMuchPerfumeMakesMe", "category": "Dialog", "text_preview": "Too much perfume.It makes me dizzy."}, {"index_hex": "22D", "snes_addr": "B8C860", "bank": "B8", "label": "Text_22D_Church_BelieveStoryGoddessMadeFlowers", "category": "Church", "text_preview": "Do you believe the story of the Goddess that made flowers bloom? Isn't it romantic?"}, {"index_hex": "22E", "snes_addr": "B8C914", "bank": "B8", "label": "Text_22E_Festival_WonderIfMenVeryinterestedKind", "category": "Festival", "text_preview": "I wonder if men are not veryinterested in this kind of festival?"}, {"index_hex": "22F", "snes_addr": "B8C998", "bank": "B8", "label": "Text_22F_Festival_GoodMerryFestivalSometimes", "category": "Festival", "text_preview": "It's good to be merry at a festival sometimes."}, {"index_hex": "230", "snes_addr": "B8C9F8", "bank": "B8", "label": "Text_230_Manual_HehHehGetRelaxedSmell", "category": "Manual", "text_preview": "Heh-heh:I could get relaxed with the smell of flowers."}, {"index_hex": "231", "snes_addr": "B8CA66", "bank": "B8", "label": "Text_231_Church_GodsGotLittleSenseHumor", "category": "Church", "text_preview": "God's got a little sense of humor.If it's supposed to cheer people up: wine would be much better. Don't you think?"}, {"index_hex": "232", "snes_addr": "B8CB52", "bank": "B8", "label": "Text_232_Town_SayMuchPrettierThanFlowers", "category": "Town", "text_preview": "What? You say I'm much prettier than flowers? You didn't say so? ...What?"}, {"index_hex": "233", "snes_addr": "B8CBFA", "bank": "B8", "label": "Text_233_Romance_ForgiveIfPickUpAnother", "category": "Romance", "text_preview": "You:I won't forgive you if you pick up another girl."}, {"index_hex": "234", "snes_addr": "B8CC66", "bank": "B8", "label": "Text_234_Festival_StartDancingNowIfHavent", "category": "Festival", "text_preview": "Can we start dancing now? If you haven't done all the thing you wanted to do: hurry up and do it right now. Let's dance Hold on<CHOICE_OR_WAIT>c"}, {"index_hex": "235", "snes_addr": "B8CD94", "bank": "B8", "label": "Text_235_Dialog_NowPickUpPartner", "category": "Dialog", "text_preview": "Now pick up your partner."}, {"index_hex": "236", "snes_addr": "B8CDC8", "bank": "B8", "label": "Text_236_Dialog_IfHaveSomeMoreHurry", "category": "Dialog", "text_preview": "If you have some more to do:hurry up."}, {"index_hex": "237", "snes_addr": "B8CE14", "bank": "B8", "label": "Text_237_Festival_NowComesYearsHarvestFestival", "category": "Festival", "text_preview": "Now here comes this year's harvest festival. Ladies andgentlemen:have you decided what to take to the festival? The festival is held at the public square tomorrow. It ends at <CTRL_B5>:<CTRL_B2><CTRL_B2>pm so don't be la"}, {"index_hex": "238", "snes_addr": "B8CFBA", "bank": "B8", "label": "Text_238_Festival_HarvestFestivalTomorrow", "category": "Festival", "text_preview": "It's the Harvest Festival tomorrow."}, {"index_hex": "239", "snes_addr": "B8D006", "bank": "B8", "label": "Text_239_Festival_HaveDecidedTakeFestivalWantto", "category": "Festival", "text_preview": "Have you decided what to take to the festival? I wantto complete my machine and present it in public."}, {"index_hex": "23A", "snes_addr": "B8D0D8", "bank": "B8", "label": "Text_23A_Dialog_WhatsGoodWonderIfherbsSpices", "category": "Dialog", "text_preview": "Well:what's good?I wonder ifherbs or spices will be OK."}, {"index_hex": "23B", "snes_addr": "B8D14A", "bank": "B8", "label": "Text_23B_Dialog_TakeSomethingVeryDeliciousTomorrow", "category": "Dialog", "text_preview": "I will take something very delicious tomorrow so pleaselook forward to it."}, {"index_hex": "23C", "snes_addr": "B8D1E2", "bank": "B8", "label": "Text_23C_Festival_HarvestFestivalTomorrowLoveSinging", "category": "Festival", "text_preview": "It's Harvest Festival tomorrow. I love singing anddancing.It's exciting."}, {"index_hex": "23D", "snes_addr": "B8D280", "bank": "B8", "label": "Text_23D_Festival_HaveHarvestFestivalTomorrowRight", "category": "Festival", "text_preview": "We'll have the harvest festival tomorrow: right? Autumn has already been here."}, {"index_hex": "23E", "snes_addr": "B8D32C", "bank": "B8", "label": "Text_23E_Festival_HarvestFestivalCelebratingYearsHarvest", "category": "Festival", "text_preview": "The harvest Festival is for celebrating the year's harvest."}, {"index_hex": "23F", "snes_addr": "B8D3AE", "bank": "B8", "label": "Text_23F_Dialog_BringFoodsEatGreatHarvest", "category": "Dialog", "text_preview": "Please bring foods to eat for the great harvest stew."}, {"index_hex": "240", "snes_addr": "B8D41E", "bank": "B8", "label": "Text_240_Animal_HarvestFestivalTomorrowStopWork", "category": "Animal", "text_preview": "The Harvest Festival is tomorrow.I'll stop work earlier and come to the public square at <CTRL_B5>:<CTRL_B2><CTRL_B2>pm. If you have is livestock: you should feed them before.. And I'll bring something to put in the stew"}, {"index_hex": "241", "snes_addr": "B8D5E6", "bank": "B8", "label": "Text_241_Dialog_WelcomePutBroughtStewNow", "category": "Dialog", "text_preview": "Welcome.Put what you brought in the stew now."}, {"index_hex": "242", "snes_addr": "B8D650", "bank": "B8", "label": "Text_242_Dialog_BringAnythingAlright", "category": "Dialog", "text_preview": "Oh no:you didn't bring anything. Alright."}, {"index_hex": "243", "snes_addr": "B8D6AE", "bank": "B8", "label": "Text_243_Dialog_NowWaitUntilDone", "category": "Dialog", "text_preview": "Now:wait until it's done."}, {"index_hex": "244", "snes_addr": "B8D6E2", "bank": "B8", "label": "Text_244_Dialog_StewEatGratitude", "category": "Dialog", "text_preview": "It's your stew. Eat it with gratitude."}, {"index_hex": "245", "snes_addr": "B8D748", "bank": "B8", "label": "Text_245_Town_MineWasFlowersWasFairly", "category": "Town", "text_preview": "Mine was flowers.It was fairly good."}, {"index_hex": "246", "snes_addr": "B8D79A", "bank": "B8", "label": "Text_246_Romance_WasDeliciousKnowHaveWife", "category": "Romance", "text_preview": "It was delicious.You know: I don't have a wife. No: I'm not saying Ann's dishes are bad. In fact: they taste pretty good once you get used to it."}, {"index_hex": "247", "snes_addr": "B8D8DE", "bank": "B8", "label": "Text_247_Animal_CuttingGrassCutAutumnTry", "category": "Animal", "text_preview": "Are you cutting grass? You can cut it by autumn so try to cut as much as you can. Otherwise:you will panic if you don't have feed to give to the cows andchickens."}, {"index_hex": "248", "snes_addr": "B8DA26", "bank": "B8", "label": "Text_248_Animal_HappyOnlyIfTasteEat", "category": "Animal", "text_preview": "I'm <CTRL_B3><CTRL_B2><CTRL_B2>& happy only if I could taste when I eat good stuff."}, {"index_hex": "249", "snes_addr": "B8DAA4", "bank": "B8", "label": "Text_249_Dialog_Stuffed", "category": "Dialog", "text_preview": "I'm stuffed,"}, {"index_hex": "24A", "snes_addr": "B8DABE", "bank": "B8", "label": "Text_24A_Shop_GoodDayTodaySomeFamous", "category": "Sign", "text_preview": "Good-day:today, Here are some famous dumpling from the North, Do you want some, It's <CTRL_B5><CTRL_B2><CTRL_B2>G. Buy Don't Buy Money <CTRL_FFFC>ht<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "24B", "snes_addr": "B8DC20", "bank": "B8", "label": "Text_24B_Shop_GoodDayTodaySomeRice", "category": "Sign", "text_preview": "Good-day:today, Here are some rice balls made from <CTRL_B3><CTRL_B2><CTRL_B2>& Starshine rice. They are fresh and warm. Do you want some? It's <CTRL_B4><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hu<CTRL_B2>G<CH"}, {"index_hex": "24C", "snes_addr": "B8DDD6", "bank": "B8", "label": "Text_24C_Dialog_ThankCarefulTogetAddicted", "category": "Dialog", "text_preview": "Thank you. Be careful not toget addicted."}, {"index_hex": "24D", "snes_addr": "B8DE2A", "bank": "B8", "label": "Text_24D_Dialog_SayOneBiteMakesHappy", "category": "Dialog", "text_preview": "Don't say no. Just one bite:it makes you <CTRL_B3><CTRL_B2><CTRL_B2>& happy."}, {"index_hex": "24E", "snes_addr": "B8DE94", "bank": "B8", "label": "Text_24E_Manual_BringAnythingYearSuchHard", "category": "Manual", "text_preview": "I can't bring anything this year. It's such hard work to find rare seeds."}, {"index_hex": "24F", "snes_addr": "B8DF36", "bank": "B8", "label": "Text_24F_Dialog_FruitsSouthernCountryTasteGood", "category": "Dialog", "text_preview": "The fruits of the Southern Country taste good:but they smell strong and I don't like that."}, {"index_hex": "250", "snes_addr": "B8DFEE", "bank": "B8", "label": "Text_250_Festival_DanceVeryYet", "category": "Festival", "text_preview": "I can't dance very well yet."}, {"index_hex": "251", "snes_addr": "B8E028", "bank": "B8", "label": "Text_251_Dialog_DancingStartPrettySoon", "category": "Dialog", "text_preview": "Dancing will start pretty soon."}, {"index_hex": "252", "snes_addr": "B8E06C", "bank": "B8", "label": "Text_252_Church_EvenIfBelieveIngodGood", "category": "Church", "text_preview": "Even if you don't believe inGod: it's good to keep gratitude in your mind. Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "253", "snes_addr": "B8E14E", "bank": "B8", "label": "Text_253_Church_EvenIfBelieveIngodGood", "category": "Church", "text_preview": "Even if you don't believe inGod:it's good to be grateful."}, {"index_hex": "254", "snes_addr": "B8E1D2", "bank": "B8", "label": "Text_254_Church_GoddessLandExistsSure", "category": "Church", "text_preview": "Yes:The Goddess of Land exists for sure."}, {"index_hex": "255", "snes_addr": "B8E22C", "bank": "B8", "label": "Text_255_Dialog_ThoughtTime", "category": "Dialog", "text_preview": "I thought it would be OK this time..."}, {"index_hex": "256", "snes_addr": "B8E27E", "bank": "B8", "label": "Text_256_Dialog_EatWantC", "category": "Dialog", "text_preview": "Hey: please, Eat this, OK I don't want it<CHOICE_OR_WAIT>c"}, {"index_hex": "257", "snes_addr": "B8E308", "bank": "B8", "label": "Text_257_Dialog_ThankNice", "category": "Dialog", "text_preview": "Thank you. You are so nice."}, {"index_hex": "258", "snes_addr": "B8E340", "bank": "B8", "label": "Text_258_Dialog_Waaa", "category": "Dialog", "text_preview": "Waaa,"}, {"index_hex": "259", "snes_addr": "B8E34C", "bank": "B8", "label": "Text_259_Dialog_MadePumpkinPieWantTry", "category": "Dialog", "text_preview": "I made this pumpkin pie. Do you want to try some? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "25A", "snes_addr": "B8E3F8", "bank": "B8", "label": "Text_25A_Dialog_YearsPumpkinsSweet", "category": "Dialog", "text_preview": "This year's pumpkins are sweet:aren't they?"}, {"index_hex": "25B", "snes_addr": "B8E456", "bank": "B8", "label": "Text_25B_Dialog_YeahPumpkinPieHasReceived", "category": "Dialog", "text_preview": "Oh yeah? This pumpkin pie has received praise though."}, {"index_hex": "25C", "snes_addr": "B8E4C8", "bank": "B8", "label": "Text_25C_Manual_GiveSpecialSouvenirClockFree", "category": "Manual", "text_preview": "I give you a special souvenir \"Clock\" for free. You can find the time with the select button."}, {"index_hex": "25D", "snes_addr": "B8E594", "bank": "B8", "label": "Text_25D_Dialog_ThinkImportantThankLandSun", "category": "Dialog", "text_preview": "I think it's important to thank the land and the sun as well as celebrate the harvest."}, {"index_hex": "25E", "snes_addr": "B8E648", "bank": "B8", "label": "Text_25E_Dialog_TaraahAutoHarvestingMachineSwitch", "category": "Dialog", "text_preview": "Taraah: it's an Auto Harvesting Machine, Switch it on. Push No<CHOICE_OR_WAIT>c"}, {"index_hex": "25F", "snes_addr": "B8E708", "bank": "B8", "label": "Text_25F_Dialog_SorryFailed", "category": "Dialog", "text_preview": "Sorry:failed."}, {"index_hex": "260", "snes_addr": "B8E724", "bank": "B8", "label": "Text_260_Dialog_Afraid", "category": "Dialog", "text_preview": "What are you afraid of?"}, {"index_hex": "261", "snes_addr": "B8E754", "bank": "B8", "label": "Text_261_Dialog_Right", "category": "Dialog", "text_preview": "...No:this isn't right."}, {"index_hex": "262", "snes_addr": "B8E784", "bank": "B8", "label": "Text_262_Dialog_TasteGoodHuhCalledFruit", "category": "Dialog", "text_preview": "Taste good:huh? It's called the fruit of the full-moon plant. It's moistured:soft:and melts in the mouth like ice cream.It's my favorite."}, {"index_hex": "263", "snes_addr": "B8E8A2", "bank": "B8", "label": "Text_263_Dialog_PickUpFirstThingMorning", "category": "Dialog", "text_preview": "I'll pick it up the first thing in the morning for you...."}, {"index_hex": "264", "snes_addr": "B8E922", "bank": "B8", "label": "Text_264_Dialog_SpecialMeatPieImadeWant", "category": "Dialog", "text_preview": "This is a special meat pie Imade.Want a bite? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "265", "snes_addr": "B8E9C0", "bank": "B8", "label": "Text_265_Romance_MakeEverythingEatSeemDelicious", "category": "Romance", "text_preview": "You make everything you eat seem delicious so it's worthcooking for you."}, {"index_hex": "266", "snes_addr": "B8EA52", "bank": "B8", "label": "Text_266_Dialog_AlrightPrettyGoodThough", "category": "Dialog", "text_preview": "Alright. It's pretty good though.."}, {"index_hex": "267", "snes_addr": "B8EA9C", "bank": "B8", "label": "Text_267_Mountain_BerryJuiceMadeLastYear", "category": "Sign", "text_preview": "It's the berry juice I made last year. It's one of the gifts from the earth. Want to try? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "268", "snes_addr": "B8EB94", "bank": "B8", "label": "Text_268_Dialog_IfThinkManDrinkUp", "category": "Dialog", "text_preview": "If you think you are a man: drink up,"}, {"index_hex": "269", "snes_addr": "B8EBE0", "bank": "B8", "label": "Text_269_Dialog_GoodThough", "category": "Dialog", "text_preview": "It's really good though..."}, {"index_hex": "26A", "snes_addr": "B8EC16", "bank": "B8", "label": "Text_26A_Romance_OofSorryFeelGoodHave", "category": "Romance", "text_preview": "....oof:sorry.I don't feel good...no:no:no... I have to eat it with gratitude even if there's something strange in it. Right?"}, {"index_hex": "26B", "snes_addr": "B8ED30", "bank": "B8", "label": "Text_26B_Dialog_TaraaaImprovedAutoHarvestingMachine", "category": "Dialog", "text_preview": "Taraaa,Improved Auto Harvesting Machine, Turn it on, OK No<CHOICE_OR_WAIT>c"}, {"index_hex": "26C", "snes_addr": "B8EDEA", "bank": "B8", "label": "Text_26C_Dialog_Weird", "category": "Dialog", "text_preview": "...Weird."}, {"index_hex": "26D", "snes_addr": "B8EDFE", "bank": "B8", "label": "Text_26D_Dialog_HaHaHaHaHa", "category": "Dialog", "text_preview": "....Ha-ha-ha-ha-ha,Yes:I hadjuice and now I can see butterflies flying."}, {"index_hex": "26E", "snes_addr": "B8EE96", "bank": "B8", "label": "Text_26E_Festival_StarNightFestivaltomorrowCoupleofPlaces", "category": "Festival", "text_preview": "It's the Star Night Festivaltomorrow. There are a coupleof places for it so you should ask the townsfolk to decide where to go."}, {"index_hex": "26F", "snes_addr": "B8EF96", "bank": "B8", "label": "Text_26F_Dialog_WildGrapeJuiceSweetGood", "category": "Dialog", "text_preview": "It's the wild grape juice. It's sweet and good. Want totry? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "270", "snes_addr": "B8F052", "bank": "B8", "label": "Text_270_Dialog_CheersGiftsEarth", "category": "Dialog", "text_preview": "Cheers for gifts from the earth,"}, {"index_hex": "271", "snes_addr": "B8F098", "bank": "B8", "label": "Text_271_Dialog_VerySociable", "category": "Dialog", "text_preview": "You are not very sociable: aren't you?"}, {"index_hex": "272", "snes_addr": "B8F0E8", "bank": "B8", "label": "Text_272_Animal_FlowerFestivalTomorrowStopWork", "category": "Animal", "text_preview": "It's the Flower Festival tomorrow. I'll stop work earlier and come to the public square at <CTRL_B5>:<CTRL_B2><CTRL_B2>. If you have livestock:you'd better feed them before the festival.I'll definitelypick up the shippin"}, {"index_hex": "273", "snes_addr": "B8F2FA", "bank": "B8", "label": "Text_273_Weather_InformationEventHaveAnnualeggFestival", "category": "Weather", "text_preview": "This is information of an event. We'll have the annualegg festival. The weather is very good. Ladies and gentlemen:you arecordially invited to take part."}, {"index_hex": "274", "snes_addr": "B8F436", "bank": "B8", "label": "Text_274_Animal_EggFestivalTomorrowStopWork", "category": "Animal", "text_preview": "It's Egg Festival tomorrow. I'll stop work earlier and come to the public square by <CTRL_B5>:<CTRL_B2><CTRL_B2>.If you have livestock:you'd better feed them before the festival. I'll definitely pick up the shipping good"}, {"index_hex": "275", "snes_addr": "B8F61C", "bank": "B8", "label": "Text_275_Dialog_KidneyPieProudTryC", "category": "Dialog", "text_preview": "It's the kidney pie I'm proud of. Won't you try it? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "276", "snes_addr": "B8F6D6", "bank": "B8", "label": "Text_276_Dialog_VeryNourishingThough", "category": "Dialog", "text_preview": "It's very nourishing though."}, {"index_hex": "277", "snes_addr": "B8F71E", "bank": "B8", "label": "Text_277_Mountain_YearOldBerryJuiceSmells", "category": "Sign", "text_preview": "It's the <CTRL_B5> year old berry juice.Smells good:huh? Do you want it? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "278", "snes_addr": "B8F7F0", "bank": "B8", "label": "Text_278_Dialog_MyGrandpasFavoriteJuice", "category": "Dialog", "text_preview": "It's my grandpa's favorite juice."}, {"index_hex": "279", "snes_addr": "B8F836", "bank": "B8", "label": "Text_279_Dialog_DrinkMyJuice", "category": "Dialog", "text_preview": "What? Can't you drink my juice,?"}, {"index_hex": "27A", "snes_addr": "B8F87E", "bank": "B8", "label": "Text_27A_Romance_MayAbleHavePleasantMoments", "category": "Romance", "text_preview": "May we be able to have pleasant moments for ever."}, {"index_hex": "27B", "snes_addr": "B8F8EC", "bank": "B8", "label": "Text_27B_Romance_UltraSpecialAutoHarvestingMachine", "category": "Romance", "text_preview": "This is it, Ultra Special Auto harvesting Machine,,, .....Hey:you don't seem to trust me.Don't say a word: just turn it on, On, Push I'd never push<CHOICE_OR_WAIT>c"}, {"index_hex": "27C", "snes_addr": "B8FA4E", "bank": "B8", "label": "Text_27C_Dialog_WhetherLikeItor", "category": "Dialog", "text_preview": "It's not whether you like itor not."}, {"index_hex": "27D", "snes_addr": "B8FA96", "bank": "B8", "label": "Text_27D_Dialog_FreshIngredientsAffectionNecessaryMake", "category": "Dialog", "text_preview": "Fresh ingredients and affection are necessary to make dishes delicious,"}, {"index_hex": "27E", "snes_addr": "B8FB34", "bank": "B8", "label": "Text_27E_Dialog_TastyRiceBallsDumplingsTry", "category": "Dialog", "text_preview": "Tasty rice balls and dumplings, Won't you try some? They are all delicious,"}, {"index_hex": "27F", "snes_addr": "B8FBF2", "bank": "B8", "label": "Text_27F_Dialog_Congratulations", "category": "Dialog", "text_preview": "Congratulations,"}, {"index_hex": "280", "snes_addr": "B8FC14", "bank": "B8", "label": "Text_280_Dialog_GoingHaveBabyprettySoon", "category": "Dialog", "text_preview": "You are going to have a babypretty soon."}, {"index_hex": "281", "snes_addr": "B8FC66", "bank": "B8", "label": "Text_281_Romance_HoHoLookBabyCute", "category": "Romance", "text_preview": "Ho-ho:look at this baby. It's a cute baby girl."}, {"index_hex": "282", "snes_addr": "B8FCCC", "bank": "B8", "label": "Text_282_Dialog_HaveMyPartnerYoudBetter", "category": "Dialog", "text_preview": "Oh:I have my partner. You'd better try to find one for you."}, {"index_hex": "283", "snes_addr": "B8FD46", "bank": "B8", "label": "Text_283_Festival_WantDanceSomeoneElse", "category": "Festival", "text_preview": "I...I want to dance with someone else."}, {"index_hex": "284", "snes_addr": "B8FD9A", "bank": "B8", "label": "Text_284_Festival_YoungManDanceYoungGirl", "category": "Festival", "text_preview": "A young man should dance with a young girl."}, {"index_hex": "285", "snes_addr": "B8FDF8", "bank": "B8", "label": "Text_285_Dialog_BringMeMoreJuice", "category": "Dialog", "text_preview": "Bring me more juice,"}, {"index_hex": "286", "snes_addr": "B8FE22", "bank": "B8", "label": "Text_286_Dialog_WasDelicious", "category": "Dialog", "text_preview": "Was it delicious?"}, {"index_hex": "287", "snes_addr": "B8FE46", "bank": "B8", "label": "Text_287_Festival_WantDanceSomeoneElse", "category": "Festival", "text_preview": "No:I want to dance with someone else:not you."}, {"index_hex": "288", "snes_addr": "B8FEAA", "bank": "B8", "label": "Text_288_Festival_YeahWantDanceMaria", "category": "Festival", "text_preview": "Yeah:I want to dance with Maria,"}, {"index_hex": "289", "snes_addr": "B8FEF0", "bank": "B8", "label": "Text_289_Festival_NewYearsFestivaltomorrowSayThelast", "category": "Festival", "text_preview": "It's the New Year's festivaltomorrow. You should say thelast hello of this year."}, {"index_hex": "28A", "snes_addr": "B98000", "bank": "B9", "label": "Text_28A_Festival_DanceButMeansMoreBecause", "category": "Festival", "text_preview": "It's just a dance but it means more because you choose your partner here."}, {"index_hex": "28B", "snes_addr": "B980A4", "bank": "B9", "label": "Text_28B_Festival_WhoGoingAskDanceGoing", "category": "Festival", "text_preview": "Who are you going to ask to dance? You are going to ....no:forget it."}, {"index_hex": "28C", "snes_addr": "B98138", "bank": "B9", "label": "Text_28C_Romance_NeverCancelChooseCarefullyRegret", "category": "Romance", "text_preview": "You can never cancel it. So choose carefully so you won't regret."}, {"index_hex": "28D", "snes_addr": "B981C4", "bank": "B9", "label": "Text_28D_Festival_ThanksgivingFestivalTomorrowNiceSmell", "category": "Festival", "text_preview": "It's the Thanksgiving Festival tomorrow. Nice smell of baking cakes fills the whole town. Dad:it'll be fun."}, {"index_hex": "28E", "snes_addr": "B982C8", "bank": "B9", "label": "Text_28E_Festival_ThanksgivingFestivalTomorrowAllHusbands", "category": "Festival", "text_preview": "It's the Thanksgiving Festival tomorrow. It's for all the husbands and fathers who are always working hard and women bake cakes for them to show thanks. I suggest you to come to town if possible."}, {"index_hex": "28F", "snes_addr": "B9846C", "bank": "B9", "label": "Text_28F_Romance_BecauseGirlsGiveCakesPeople", "category": "Romance", "text_preview": "because girls give cakes to people they like. If you have time: I suggest you come to town."}, {"index_hex": "290", "snes_addr": "B9852A", "bank": "B9", "label": "Text_290_Diary_GoingBedNowGoodNight", "category": "Diary", "text_preview": "I'm going to bed now. Good night."}, {"index_hex": "291", "snes_addr": "B9857A", "bank": "B9", "label": "Text_291_Dialog_HehHehVeryDeliciousWant", "category": "Dialog", "text_preview": "Heh-heh This is very delicious, Want to try some? Eat it I don't' want it<CHOICE_OR_WAIT>c"}, {"index_hex": "292", "snes_addr": "B98654", "bank": "B9", "label": "Text_292_Festival_ThanksgivingFestivalTodayDarlingThank", "category": "Festival", "text_preview": "It's Thanksgiving Festival today. Here you are: darling. Thank you for working hard for me every day."}, {"index_hex": "293", "snes_addr": "B98732", "bank": "B9", "label": "Text_293_Dialog_WorkNow", "category": "Dialog", "text_preview": "Please work well from now on."}, {"index_hex": "294", "snes_addr": "B9877A", "bank": "B9", "label": "Text_294_Dialog_Fidgety", "category": "Dialog", "text_preview": "Fidgety..."}, {"index_hex": "295", "snes_addr": "B98790", "bank": "B9", "label": "Text_295_Dialog_ThumpThumpThump", "category": "Dialog", "text_preview": "Thump:thump:thump..."}, {"index_hex": "296", "snes_addr": "B987BA", "bank": "B9", "label": "Text_296_Animal_EllenGoodCookAndtakesGood", "category": "Animal", "text_preview": "Yes:Ellen is a good cook andtakes good care of the livestock. She is a nice and steady girl. Don't you think so?"}, {"index_hex": "297", "snes_addr": "B988AC", "bank": "B9", "label": "Text_297_Romance_LoveMyWifesCakeBut", "category": "Romance", "text_preview": "I love my wife's cake but mydaughter's makes me so much happier."}, {"index_hex": "298", "snes_addr": "B9892E", "bank": "B9", "label": "Text_298_Dialog_ScorchedCakeAgain", "category": "Dialog", "text_preview": "I scorched the cake again."}, {"index_hex": "299", "snes_addr": "B98964", "bank": "B9", "label": "Text_299_Dialog_WhatShouldIDo", "category": "Dialog", "text_preview": "What should I do?"}, {"index_hex": "29A", "snes_addr": "B98988", "bank": "B9", "label": "Text_29A_Romance_AnnsHandMadeCakeExplode", "category": "Romance", "text_preview": "Ann's hand-made cake...it won't explode:will it?"}, {"index_hex": "29B", "snes_addr": "B989EE", "bank": "B9", "label": "Text_29B_Romance_GetCakeMariaEveryYear", "category": "Romance", "text_preview": "I get a cake from Maria every year."}, {"index_hex": "29C", "snes_addr": "B98A3E", "bank": "B9", "label": "Text_29C_Romance_YeahGotCakeMaria", "category": "Romance", "text_preview": "Yeah:I got a cake from Maria,"}, {"index_hex": "29D", "snes_addr": "B98A84", "bank": "B9", "label": "Text_29D_Animal_AbleBakePerfectlyDeliciousCake", "category": "Animal", "text_preview": "I'll be able to bake a perfectly delicious cake when I get older, Gee,"}, {"index_hex": "29E", "snes_addr": "B98B22", "bank": "B9", "label": "Text_29E_Dialog_HopeLike", "category": "Dialog", "text_preview": "Hi:well...it's for you.I hope you like it."}, {"index_hex": "29F", "snes_addr": "B98B7E", "bank": "B9", "label": "Text_29F_Romance_UummThankWorkingEveryDay", "category": "Romance", "text_preview": "uumm:thank you for working every day."}, {"index_hex": "2A0", "snes_addr": "B98BCC", "bank": "B9", "label": "Text_2A0_Dialog_Hello", "category": "Dialog", "text_preview": "Hello."}, {"index_hex": "2A1", "snes_addr": "B98BDA", "bank": "B9", "la
