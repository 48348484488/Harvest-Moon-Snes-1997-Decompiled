on. The hurricane is becoming stronger and is getting nearer. Please don't forget to keep all thelivestock inside,"}, {"index_hex": "009", "snes_addr": "B6870C", "bank": "B6", "label": "Text_LogBook", "category": "Animal", "text_preview": "Latest funds <CTRL_FFFC>hb<CTRL_B2>G Cow <CTRL_FFFC>cc Chicken <CTRL_FFFC>cd Dog <CTRL_FFFD>eb Horse <CTRL_FFFD>ec"}, {"index_hex": "00A", "snes_addr": "B68802", "bank": "B6", "label": "Text_Diary", "category": "Diary", "text_preview": "Shall I write in my diary before I go to bed? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "00B", "snes_addr": "B688A4", "bank": "B6", "label": "Text_00B_Diary_WorkHardAgainTomorrow", "category": "Diary", "text_preview": "I'll work hard again tomorrow."}, {"index_hex": "00C", "snes_addr": "B688F0", "bank": "B6", "label": "Text_Diary2", "category": "Diary", "text_preview": "I'm going to bed. Oh: I've got something to do.<CHOICE_OR_WAIT>c"}, {"index_hex": "00D", "snes_addr": "B68972", "bank": "B6", "label": "Text_00D_Diary_GoodNight", "category": "Diary", "text_preview": "Good night."}, {"index_hex": "00E", "snes_addr": "B6898A", "bank": "B6", "label": "Text_Sign_House_Expansion", "category": "Sign", "text_preview": "\"Allocated land for the annex of the house\" Necessary Materials <CTRL_FFFC>depiece"}, {"index_hex": "00F", "snes_addr": "B68A46", "bank": "B6", "label": "Text_Manual_Sickle", "category": "Manual", "text_preview": "\"Sickle\" Cut the grass to make feed, It's the feed for cows and chickens. I would be thrown into a pinch if it's gone."}, {"index_hex": "010", "snes_addr": "B68B5E", "bank": "B6", "label": "Text_Manual_Hoe", "category": "Manual", "text_preview": "\"Hoe\" Plow the ground to make a field. Raise vegetables in the field. Try various ways to make thefield."}, {"index_hex": "011", "snes_addr": "B68C68", "bank": "B6", "label": "Text_Manual_Axe", "category": "Manual", "text_preview": "\"Axe\" Split logs to make lumber. Lumber is useful. Focus on one point and hit. Don't enter the control pad."}, {"index_hex": "012", "snes_addr": "B68D6E", "bank": "B6", "label": "Text_Manual_Hammer", "category": "Manual", "text_preview": "\"Hammer\" Breaks rocks and breaks fences down. Big rocks can be knocked down when focusing on one spot. Don't ever enter the control pad."}, {"index_hex": "013", "snes_addr": "B68EC6", "bank": "B6", "label": "Text_Manual_Can", "category": "Weather", "text_preview": "\"Watering can\" Water the crops. Once a day.No watering is necessary on rainy days. Dip up water at a well or a pond when it runs out."}, {"index_hex": "014", "snes_addr": "B69006", "bank": "B6", "label": "Text_Manual_Milker", "category": "Manual", "text_preview": "\"Milker\" Milk cows and ship the milk."}, {"index_hex": "015", "snes_addr": "B69078", "bank": "B6", "label": "Text_Manual_Brush", "category": "Manual", "text_preview": "\"Brush\" Brushing raises the cows' level of affection. A cow with High affection gives a lot of milk."}, {"index_hex": "016", "snes_addr": "B69172", "bank": "B6", "label": "Text_Manual_Bell", "category": "Manual", "text_preview": "\"Bell\" A tool used to herd cows. Look at the cows carefully and move them properly."}, {"index_hex": "017", "snes_addr": "B69248", "bank": "B6", "label": "Text_Manual_CropSeeds", "category": "Manual", "text_preview": "\"Vegetable seeds\" Sowing season is different. Ask the florist for the proper season. Seeds must be sown in the field. They won't bud without watering."}, {"index_hex": "018", "snes_addr": "B693A8", "bank": "B6", "label": "Text_Manual_GrassSeeds", "category": "Manual", "text_preview": "\"Grass seeds\" Sow the field from spring tosummer. It grows without watering. The Meadow must be ready forraising cows and chickens. Grass is ready for mowing when it turns a deep green."}, {"index_hex": "019", "snes_addr": "B6953E", "bank": "B6", "label": "Text_Manual_Paint", "category": "Dialog", "text_preview": "\"Paint\" Paint the house right."}, {"index_hex": "01A", "snes_addr": "B695A4", "bank": "B6", "label": "Text_01A_Festival_TellMeWorkingNewYears", "category": "Festival", "text_preview": "No: don't tell me you are working on New Years' Day. Just relax today."}, {"index_hex": "01B", "snes_addr": "B69638", "bank": "B6", "label": "Text_Sign_Wood", "category": "Sign", "text_preview": "Latest materials <CTRL_FFFC>dfpiece Split logs and collect them."}, {"index_hex": "01C", "snes_addr": "B696E2", "bank": "B6", "label": "Text_Sign_Fodder", "category": "Sign", "text_preview": "Feed <CTRL_FFFC>dgpiece Mow grass to make more feed."}, {"index_hex": "01D", "snes_addr": "B6978C", "bank": "B6", "label": "Text_01D_Weather_NailedDownThedoorPrepareHurricane", "category": "Weather", "text_preview": "Oh yes: I've nailed down thedoor to prepare for the hurricane."}, {"index_hex": "01E", "snes_addr": "B69812", "bank": "B6", "label": "Text_Sign_Fork", "category": "Sign", "text_preview": "Neighbor town Back hill"}, {"index_hex": "01F", "snes_addr": "B69860", "bank": "B6", "label": "Text_Sign_Mountain_Top", "category": "Sign", "text_preview": "to the top"}, {"index_hex": "020", "snes_addr": "B69878", "bank": "B6", "label": "Text_Sign_Hotspring", "category": "Sign", "text_preview": "Get undressed here."}, {"index_hex": "021", "snes_addr": "B698A0", "bank": "B6", "label": "Text_Sign_Cave", "category": "Sign", "text_preview": "Dangerous, Easy to collapse,"}, {"index_hex": "022", "snes_addr": "B698DA", "bank": "B6", "label": "Text_Sign_Workmans", "category": "Sign", "text_preview": "workman's House Call us for annex <$0040> extension Closed on weekends and holidays."}, {"index_hex": "023", "snes_addr": "B69982", "bank": "B6", "label": "Text_Bachellorete_Diary", "category": "Diary", "text_preview": "Found the diary, Read Not read<CHOICE_OR_WAIT>c"}, {"index_hex": "024", "snes_addr": "B699F2", "bank": "B6", "label": "Text_Mayor_House_Bookcase1", "category": "Church", "text_preview": "\"Myths of Gods\" There are lots of difficult books."}, {"index_hex": "025", "snes_addr": "B69A70", "bank": "B6", "label": "Text_Mayor_House_Bookcase2", "category": "Town", "text_preview": "\"History <$0040> Myths\" There's a lot others too."}, {"index_hex": "026", "snes_addr": "B69ADC", "bank": "B6", "label": "Text_Mayor_House_Bookcase3", "category": "Church", "text_preview": "\"Simple lessons from God\" \"Happiness lies in life\""}, {"index_hex": "027", "snes_addr": "B69B46", "bank": "B6", "label": "Text_Flowershop_Rooms_Bookcase", "category": "Sign", "text_preview": "\"Plants\" \"Artistic Flowers\""}, {"index_hex": "028", "snes_addr": "B69BA4", "bank": "B6", "label": "Text_Bar_Bookcase", "category": "Shop", "text_preview": "\"Cocktails: Best <CTRL_B3><CTRL_B2><CTRL_B2>\" \"How to make berry juice\""}, {"index_hex": "029", "snes_addr": "B69C10", "bank": "B6", "label": "Text_Restaurant_Bookcase", "category": "Shop", "text_preview": "\"Tasty Cakes\" \"Dishes for today\""}, {"index_hex": "02A", "snes_addr": "B69C6E", "bank": "B6", "label": "Text_GeneralStore_Rooms_Bookcase", "category": "Shop", "text_preview": "\"Get into invention\" \"Daily life and groceries\""}, {"index_hex": "02B", "snes_addr": "B69CDC", "bank": "B6", "label": "Text_WitchHouse_Bookcase", "category": "Town", "text_preview": "\"Encyclopedia of fortune telling \" \"Heart pounding compatibility of partner\""}, {"index_hex": "02C", "snes_addr": "B69D94", "bank": "B6", "label": "Text_Carpenters_Bookcase", "category": "Town", "text_preview": "\"House and living\" \"We are carpenters\""}, {"index_hex": "02D", "snes_addr": "B69DF4", "bank": "B6", "label": "Text_Shop_Closed", "category": "Sign", "text_preview": "\"We're closed\""}, {"index_hex": "02E", "snes_addr": "B69E12", "bank": "B6", "label": "Text_Bar_Closed", "category": "Sign", "text_preview": "\"We're preparing\""}, {"index_hex": "02F", "snes_addr": "B69E36", "bank": "B6", "label": "Text_Cow_Talk", "category": "Animal", "text_preview": "Yes:<CTRL_FFFD>ed: good girl You look fine today."}, {"index_hex": "030", "snes_addr": "B69E96", "bank": "B6", "label": "Text_Cow_Talk_Cranky", "category": "Animal", "text_preview": "<CTRL_FFFD>ee looks cranky."}, {"index_hex": "031", "snes_addr": "B69EBA", "bank": "B6", "label": "Text_Cow_Talk_Sick", "category": "Animal", "text_preview": "<CTRL_FFFD>ef is sick, I've got to give .... medicine right away,"}, {"index_hex": "032", "snes_addr": "B69F52", "bank": "B6", "label": "Text_Cow_Talk_Pregnant", "category": "Animal", "text_preview": "<CTRL_FFFC>ch more days for delivery. Come on <CTRL_FFFD>eg."}, {"index_hex": "033", "snes_addr": "B69FA6", "bank": "B6", "label": "Text_Elf_Cave_Door_Closed", "category": "Sign", "text_preview": "I can't open it.It's locked."}, {"index_hex": "034", "snes_addr": "B69FE0", "bank": "B6", "label": "Text_034_Dialog_OpenSomethingsStuck", "category": "Dialog", "text_preview": "I can't open it. something's stuck."}, {"index_hex": "035", "snes_addr": "B6A03E", "bank": "B6", "label": "Text_035_Dialog_HowsGoingWorkTooHard", "category": "Dialog", "text_preview": "Hey: how's it going? Don't work too hard. Just take time."}, {"index_hex": "036", "snes_addr": "B6A0CE", "bank": "B6", "label": "Text_036_Animal_AskFloristFlowersAskLivestock", "category": "Animal", "text_preview": "Ask the florist for flowers and ask the livestock delaerfor livestock. Better ask Mrs. Fortune-teller for girls."}, {"index_hex": "037", "snes_addr": "B6A1C8", "bank": "B6", "label": "Text_037_Church_HangAroundListenPriest", "category": "Church", "text_preview": "Don't hang around. Listen to the priest."}, {"index_hex": "038", "snes_addr": "B6A22C", "bank": "B6", "label": "Text_038_Dialog_OffTodayKeepUpAll", "category": "Dialog", "text_preview": "You are off today: aren't you? We can't keep it up all the time."}, {"index_hex": "039", "snes_addr": "B6A2C0", "bank": "B6", "label": "Text_039_Weather_PeopleTownTalkDifferentlyAccording", "category": "Weather", "text_preview": "People in town talk differently according to theweather: day: and season."}, {"index_hex": "03A", "snes_addr": "B6A364", "bank": "B6", "label": "Text_03A_Animal_EverybodyHasDifferentIdeasHappiness", "category": "Animal", "text_preview": "Everybody has different ideas on what happiness means:right? I guess the best thing is to do what you want to do. But it's probably not real happiness when you annoy someone or are blamed."}, {"index_hex": "03B", "snes_addr": "B6A4FC", "bank": "B6", "label": "Text_03B_Sign_WorkingHardHaveChatFriends", "category": "Sign", "text_preview": "You are working so hard. You should have a chat with your friends or go to mountains... to relax once in a while."}, {"index_hex": "03C", "snes_addr": "B6A604", "bank": "B6", "label": "Text_03C_Church_ChurchDedicatedGodCropsSuggest", "category": "Church", "text_preview": "This church is dedicated to the God of the crops. I suggest you pray faithfully."}, {"index_hex": "03D", "snes_addr": "B6A6B2", "bank": "B6", "label": "Text_03D_Dialog_LikeTakingMyTimeReading", "category": "Dialog", "text_preview": "I like taking my time reading books.That's one of my happiest times."}, {"index_hex": "03E", "snes_addr": "B6A748", "bank": "B6", "label": "Text_03E_Sign_HaveHeardWaterImpSomeone", "category": "Sign", "text_preview": "Have you heard of the water imp? Someone has seen it in the pond of the mountain."}, {"index_hex": "03F", "snes_addr": "B6A7EC", "bank": "B6", "label": "Text_03F_Dialog_ThinkBadThingsIfDiscovered", "category": "Dialog", "text_preview": "Don't think it's OK to do bad things if it's not discovered. No one is perfect. We all make mistakes. That's the way we are. But it's wrong to not feel guilty about what you've done wrong."}, {"index_hex": "040", "snes_addr": "B6A99A", "bank": "B6", "label": "Text_040_Romance_WonderIfDaughterAnncanGet", "category": "Romance", "text_preview": "I wonder if our daughter Anncan get married living like that."}, {"index_hex": "041", "snes_addr": "B6AA16", "bank": "B6", "label": "Text_041_Animal_HowsWorkGoingSomeWild", "category": "Animal", "text_preview": "Hi: how's your work going? There are some wild dogs: so you should fix the fence."}, {"index_hex": "042", "snes_addr": "B6AAC0", "bank": "B6", "label": "Text_042_Church_BelieveGodExistsBelieve", "category": "Church", "text_preview": "I believe God exists. You believe it: don't you?"}, {"index_hex": "043", "snes_addr": "B6AB2E", "bank": "B6", "label": "Text_043_Dialog_StrangeAlwaysNowNothingAll", "category": "Weather", "text_preview": "Hey: it's strange. She is always here by now. .....oh no: it's nothing at all."}, {"index_hex": "044", "snes_addr": "B6ABF0", "bank": "B6", "label": "Text_044_Dialog_TakingWalkTooImportantGet", "category": "Dialog", "text_preview": "Hi. Are you taking a walk too? It's important to get afew days off. Working hard till late at night will drive you crazy: mentally and physically."}, {"index_hex": "045", "snes_addr": "B6AD1E", "bank": "B6", "label": "Text_045_Romance_HelpMyselfWorryingAboutAnn", "category": "Romance", "text_preview": "I just can't help myself worrying about Ann so much. Mr. <CTRL_FFFD>eh: you are of the same generation as Ann. What do you think of her? ....oh: sorry. Maybe I'm a little confused."}, {"index_hex": "046", "snes_addr": "B6AE86", "bank": "B6", "label": "Text_046_Shop_AlwaysLookFineBagSeed", "category": "Sign", "text_preview": "Hello. You always look fine.The bag of seed for sowing. It's convenient to buy a few bags at once."}, {"index_hex": "047", "snes_addr": "B6AF4C", "bank": "B6", "label": "Text_047_Dialog_GrassGrowsAutumnYoudontHave", "category": "Dialog", "text_preview": "Grass grows in Autumn so youdon't have to mow much before Winter."}, {"index_hex": "048", "snes_addr": "B6AFDA", "bank": "B6", "label": "Text_048_Romance_MayEveryoneGiveKindnessEveryone", "category": "Romance", "text_preview": "May everyone give kindness to everyone else...."}, {"index_hex": "049", "snes_addr": "B6B03C", "bank": "B6", "label": "Text_049_Dialog_Entry", "category": "Dialog", "text_preview": "...."}, {"index_hex": "04A", "snes_addr": "B6B046", "bank": "B6", "label": "Text_04A_Sign_ShopClosedSaturdaysBathingInthe", "category": "Sign", "text_preview": "What? The shop is closed on Saturdays. So I'm bathing inthe sun. Nice:huh?"}, {"index_hex": "04B", "snes_addr": "B6B0DC", "bank": "B6", "label": "Text_04B_Weather_KindDarkRainyDaysFeels", "category": "Weather", "text_preview": "It's kind of dark on rainy days....feels slightly lonely:doesn't it? But the rain is good when itcomes to producing crops."}, {"index_hex": "04C", "snes_addr": "B6B1DE", "bank": "B6", "label": "Text_04C_Dialog_CoincidenceHavingMealToday", "category": "Dialog", "text_preview": "What a coincidence. Are you having a meal here today?"}, {"index_hex": "04D", "snes_addr": "B6B24A", "bank": "B6", "label": "Text_04D_Dialog_EasyWorkSteadilyButWorthwhile", "category": "Dialog", "text_preview": "It's not easy to work steadily but it's worthwhile."}, {"index_hex": "04E", "snes_addr": "B6B2D2", "bank": "B6", "label": "Text_04E_Church_HopeBusinessBetterBetterGod", "category": "Church", "text_preview": "Hope business will be better:it will be better .... What? Isn't it the God of business? Oh:well."}, {"index_hex": "04F", "snes_addr": "B6B3A8", "bank": "B6", "label": "Text_04F_Diary_GoodBatheSunEatWork", "category": "Diary", "text_preview": "It's good to bathe in the sun. Eat well and work hard.Good health is the foundation of happiness."}, {"index_hex": "050", "snes_addr": "B6B470", "bank": "B6", "label": "Text_050_Animal_EatSomethingTiredCakesBest", "category": "Animal", "text_preview": "Eat something when you are tired. Our cakes are the best to get more energy."}, {"index_hex": "051", "snes_addr": "B6B512", "bank": "B6", "label": "Text_051_Dialog_HowdyYoungBoysWhatsUp", "category": "Dialog", "text_preview": "Howdy:young boys, What's up?....hic."}, {"index_hex": "052", "snes_addr": "B6B55C", "bank": "B6", "label": "Text_052_Animal_HicWorkingLikeDogOnly", "category": "Animal", "text_preview": "...hic:working like a dog is not the only way to live."}, {"index_hex": "053", "snes_addr": "B6B5CE", "bank": "B6", "label": "Text_053_Dialog_MyRoutineTakeWalkSundays", "category": "Dialog", "text_preview": "It's my routine to take a walk on Sundays so it's OK with me."}, {"index_hex": "054", "snes_addr": "B6B650", "bank": "B6", "label": "Text_054_Weather_StartedRainingNowGeeWas", "category": "Weather", "text_preview": "Oh no:it started raining now...gee: I was going to work. Well:I can do nothing but stay home today."}, {"index_hex": "055", "snes_addr": "B6B726", "bank": "B6", "label": "Text_055_Weather_SayingMatterIfRainsWork", "category": "Weather", "text_preview": "What are you saying? It doesn't matter if It rains to do our work here,"}, {"index_hex": "056", "snes_addr": "B6B7CC", "bank": "B6", "label": "Text_056_Dialog_UlpSooooGreatShesOut", "category": "Dialog", "text_preview": "ulp...soooo...great, She's out.I can relax as much as I want:yeah."}, {"index_hex": "057", "snes_addr": "B6B866", "bank": "B6", "label": "Text_057_Church_CalmInsideChurchManyPeople", "category": "Church", "text_preview": "You can be calm inside the church.Not many people here:you know. It's crowded on holidays though."}, {"index_hex": "058", "snes_addr": "B6B932", "bank": "B6", "label": "Text_058_Animal_FeltTimeWentSlowlyWas", "category": "Animal", "text_preview": "I felt time went by slowly when I was young. Now time goes by too fast and one year seems short. It's strange:really."}, {"index_hex": "059", "snes_addr": "B6BA38", "bank": "B6", "label": "Text_059_Animal_HaveSympathyPeopleKindPeople", "category": "Animal", "text_preview": "Have sympathy for people. When you are kind to people:they give you kindness in return. Animals are the same as us for sure."}, {"index_hex": "05A", "snes_addr": "B6BB48", "bank": "B6", "label": "Text_05A_Dialog_NecessarilyRightWrongDailyIncidents", "category": "Dialog", "text_preview": "It's not necessarily right or wrong. Daily incidents are neither. It's up to you:really."}, {"index_hex": "05B", "snes_addr": "B6BC00", "bank": "B6", "label": "Text_05B_Weather_KnowConsumeYourstaminaRainyDay", "category": "Weather", "text_preview": "I know it won't consume yourstamina on a rainy day but you should be off. Really."}, {"index_hex": "05C", "snes_addr": "B6BCA6", "bank": "B6", "label": "Text_05C_Animal_ToughTakeCareCowsTake", "category": "Animal", "text_preview": "It's tough to take care of cows.Take good care of them so that they do not get sick.My note is right there so read it carefully so you can avoid any diseases."}, {"index_hex": "05D", "snes_addr": "B6BDEC", "bank": "B6", "label": "Text_05D_Animal_HensLayEggsPutCage", "category": "Animal", "text_preview": "Hey:do your hens lay eggs? Put them in the cage. And feed them every day. They won't lay eggs for <CTRL_B5>days after you miss a feeding."}, {"index_hex": "05E", "snes_addr": "B6BF10", "bank": "B6", "label": "Text_05E_Weather_YoungBoyPutLivestockInside", "category": "Weather", "text_preview": "Hey:young boy, Put your livestock inside the pen before the weather gets worse,"}, {"index_hex": "05F", "snes_addr": "B6BFBE", "bank": "B6", "label": "Text_05F_Animal_KnowCowsGiveMoreMilk", "category": "Animal", "text_preview": "You know:cows give you more milk when you take good careof them with love. ..hey:are you listening to me? They will like you and good calves will be born ...listen to me:boy,"}, {"index_hex": "060", "snes_addr": "B6C120", "bank": "B6", "label": "Text_060_Dialog_RedoLifeMightHaveSecond", "category": "Dialog", "text_preview": "You can't redo your life. You might not have the second chance. Think before you act."}, {"index_hex": "061", "snes_addr": "B6C1DA", "bank": "B6", "label": "Text_061_Church_AskingIfGotoChurchGod", "category": "Church", "text_preview": "Are you asking if I don't goto church? God is everywhereand He is nowhere: you know. Hee-hee-hee."}, {"index_hex": "062", "snes_addr": "B6C2C2", "bank": "B6", "label": "Text_062_Romance_TheresUsefulBookOverAbout", "category": "Romance", "text_preview": "There's a useful book over there: about girls:I wrote it.Better read it."}, {"index_hex": "063", "snes_addr": "B6C358", "bank": "B6", "label": "Text_063_Sign_AlsoMidwifeKnowMayorsDaughter", "category": "Sign", "text_preview": "I'm also a midwife.You know:the mayor's daughter Maria and the grocery shop owner's daughter Ann I delivered them all."}, {"index_hex": "064", "snes_addr": "B6C456", "bank": "B6", "label": "Text_064_Dialog_GrownUpsAlwaysMakeRule", "category": "Dialog", "text_preview": "Grown-ups always make rule telling us to do this:do that:don't do this: don't do that.What hard workit is being a child."}, {"index_hex": "065", "snes_addr": "B6C550", "bank": "B6", "label": "Text_065_Romance_HmmmLoveMariasSisterCantbe", "category": "Romance", "text_preview": "Hmmm...is he in love with Maria's sister? ....it can'tbe."}, {"index_hex": "066", "snes_addr": "B6C5C8", "bank": "B6", "label": "Text_066_Sign_GatherManyThingsIntheMountain", "category": "Sign", "text_preview": "We can gather many things inthe mountain.I want to sell them but they won't allow a little kid to go to the mountains alone."}, {"index_hex": "067", "snes_addr": "B6C6C6", "bank": "B6", "label": "Text_067_Dialog_GotDate", "category": "Dialog", "text_preview": "Please:please, I've got a date."}, {"index_hex": "068", "snes_addr": "B6C720", "bank": "B6", "label": "Text_068_Romance_YoudBetterReadBookWritten", "category": "Romance", "text_preview": "You'd better read the book written by Mrs. Fortune-teller many times. It's pretty hard to capture a girl's heart."}, {"index_hex": "069", "snes_addr": "B6C81E", "bank": "B6", "label": "Text_069_Dialog_YeahWelcomeMakeYourselfatHome", "category": "Dialog", "text_preview": "Yeah: welcome. Make yourselfat home."}, {"index_hex": "06A", "snes_addr": "B6C868", "bank": "B6", "label": "Text_06A_Shop_ThingsGirlsLikeFlowersSweets", "category": "Sign", "text_preview": "Things girls like are flowers and sweets:right? I'm saving money to buy a present for Maria."}, {"index_hex": "06B", "snes_addr": "B6C932", "bank": "B6", "label": "Text_06B_Romance_LoveMariaWishMyBride", "category": "Romance", "text_preview": "I love Maria.I wish she would be my bride in the future."}, {"index_hex": "06C", "snes_addr": "B6C9B2", "bank": "B6", "label": "Text_06C_Church_AlwaysPrayGrownUpVery", "category": "Church", "text_preview": "I always pray that I can be a grown-up very quickly."}, {"index_hex": "06D", "snes_addr": "B6CA1C", "bank": "B6", "label": "Text_06D_Dialog_DateDateWalkAll", "category": "Dialog", "text_preview": "It's not a date, It's not a date, Just a walk:that's all,"}, {"index_hex": "06E", "snes_addr": "B6CA96", "bank": "B6", "label": "Text_06E_Shipping_PutCropsShippingBoxCollect", "category": "Shipping", "text_preview": "Oh yes:put crops in the shipping box so I can collect them."}, {"index_hex": "06F", "snes_addr": "B6CB22", "bank": "B6", "label": "Text_06F_Animal_UseToolLoseStaminaBut", "category": "Animal", "text_preview": "You can't use the tool when you lose your stamina but you can carry things a round."}, {"index_hex": "070", "snes_addr": "B6CBCE", "bank": "B6", "label": "Text_070_Dialog_DrinkAfterWorkBest", "category": "Dialog", "text_preview": "Well: a drink after work is the best."}, {"index_hex": "071", "snes_addr": "B6CC1A", "bank": "B6", "label": "Text_071_Shipping_ThingsShipFlowersAnimalsPerishables", "category": "Shipping", "text_preview": "Things you can't ship are flowers:animals:and perishables like cakes. Don't put those things in the box."}, {"index_hex": "072", "snes_addr": "B6CD04", "bank": "B6", "label": "Text_072_Shipping_EvenIfPutShippingGoods", "category": "Shipping", "text_preview": "Even if you put shipping goods in the box at night: they won't last till the morning.So wasteful."}, {"index_hex": "073", "snes_addr": "B6CDD0", "bank": "B6", "label": "Text_073_Shipping_CollectShippingGoodsEvenShed", "category": "Shipping", "text_preview": "I collect shipping goods even in the shed so please don't worry."}, {"index_hex": "074", "snes_addr": "B6CE5A", "bank": "B6", "label": "Text_074_Weather_ShallWatchWeatherForecastYoud", "category": "Weather", "text_preview": "Shall we watch the weather forecast? You'd better put the livestock inside right after you find out it's raining."}, {"index_hex": "075", "snes_addr": "B6CF4A", "bank": "B6", "label": "Text_075_Church_MuchEasierLiveIfWas", "category": "Church", "text_preview": "It would be much easier to live if it was true that Godbrings you happiness."}, {"index_hex": "076", "snes_addr": "B6CFE6", "bank": "B6", "label": "Text_076_Diary_AnythingHappenLivesCaseYoud", "category": "Diary", "text_preview": "Anything can happen in our lives. Just in case:you'd better save money."}, {"index_hex": "077", "snes_addr": "B6D07C", "bank": "B6", "label": "Text_077_Romance_KnowMoneyImportantButMost", "category": "Romance", "text_preview": "I know money is important but the most important thingis love:you know: LOVE, Don't you think so?"}, {"index_hex": "078", "snes_addr": "B6D144", "bank": "B6", "label": "Text_078_Shipping_WanderingPeddlerButOftenSell", "category": "Shipping", "text_preview": "I'm a wandering peddler. But I don't often sell anything to anyone. If there's anything you wantto sell: just put them on that table over there."}, {"index_hex": "079", "snes_addr": "B6D27A", "bank": "B6", "label": "Text_079_Weather_FencesEasyBreakAfterRain", "category": "Weather", "text_preview": "Fences are easy to break after rain and snow. Please make new fences afterknocking the broken fences down."}, {"index_hex": "07A", "snes_addr": "B6D358", "bank": "B6", "label": "Text_07A_Sign_LiveMountainsHuntingAnimalsEve", "category": "Sign", "text_preview": "I live in the mountains hunting animals. Eve always tells me to come down to the town but I won'tchange my life style."}, {"index_hex": "07B", "snes_addr": "B6D44E", "bank": "B6", "label": "Text_07B_Mountain_HaveHeardPowerBerryEat", "category": "Sign", "text_preview": "Have you heard of \"Power Berry\"? Eat it and you'll gain a little energy."}, {"index_hex": "07C", "snes_addr": "B6D4F8", "bank": "B6", "label": "Text_07C_Weather_RainsMustKeepoffTopMountain", "category": "Weather", "text_preview": "When it rains: you must keepoff the top of the mountain:because it is dangerous."}, {"index_hex": "07D", "snes_addr": "B6D59A", "bank": "B6", "label": "Text_07D_Mountain_SomeMushroomsPoisonousCareful", "category": "Sign", "text_preview": "Some mushrooms are poisonous:so be careful."}, {"index_hex": "07E", "snes_addr": "B6D604", "bank": "B6", "label": "Text_07E_Mountain_WantFishC", "category": "Sign", "text_preview": "Hey:do you want to fish? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "07F", "snes_addr": "B6D678", "bank": "B6", "label": "Text_07F_Manual_UseMyFishingRodUse", "category": "Manual", "text_preview": "OK:you can use my fishing rod. Use Y button."}, {"index_hex": "080", "snes_addr": "B6D6D6", "bank": "B6", "label": "Text_080_Shipping_PrettyGoodTastesGoodSells", "category": "Shipping", "text_preview": "No:this is pretty good. It tastes good and sells at a high price."}, {"index_hex": "081", "snes_addr": "B6D75E", "bank": "B6", "label": "Text_081_Dialog_VisitUsAgain", "category": "Dialog", "text_preview": "Visit us again."}, {"index_hex": "082", "snes_addr": "B6D77E", "bank": "B6", "label": "Text_082_Dialog_FineDayToday", "category": "Dialog", "text_preview": "Hello.It's a fine day today."}, {"index_hex": "083", "snes_addr": "B6D7B8", "bank": "B6", "label": "Text_083_Romance_HotEveryDayButDoing", "category": "Romance", "text_preview": "It's been hot every day but how are you doing?"}, {"index_hex": "084", "snes_addr": "B6D816", "bank": "B6", "label": "Text_084_Romance_SomehowLoveAutumnScenery", "category": "Romance", "text_preview": "I somehow love the autumn scenery."}, {"index_hex": "085", "snes_addr": "B6D860", "bank": "B6", "label": "Text_085_Dialog_HopeItllSpringSoon", "category": "Dialog", "text_preview": "Hope it'll be spring soon."}, {"index_hex": "086", "snes_addr": "B6D896", "bank": "B6", "label": "Text_086_Church_BelieveGodC", "category": "Church", "text_preview": "Do you believe in God? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "087", "snes_addr": "B6D906", "bank": "B6", "label": "Text_087_Church_UnusualTheseDaysComeChurch", "category": "Church", "text_preview": "Really? It's unusual these days. Please come to the church on Sunday."}, {"index_hex": "088", "snes_addr": "B6D99A", "bank": "B6", "label": "Text_088_Church_WhetherGodExistsMoreBelief", "category": "Church", "text_preview": "It's not whether God exists or not:it's more a \"belief\" that counts:I think."}, {"index_hex": "089", "snes_addr": "B6DA34", "bank": "B6", "label": "Text_089_Dialog_TakeCareYourselfnotWornDown", "category": "Dialog", "text_preview": "Please take care of yourselfnot to be worn down by the summer heat."}, {"index_hex": "08A", "snes_addr": "B6DABE", "bank": "B6", "label": "Text_08A_Romance_ExcuseMeLoveKidsLove", "category": "Romance", "text_preview": "....Excuse me: do you love kids? I love kids. Not really.<CHOICE_OR_WAIT>c"}, {"index_hex": "08B", "snes_addr": "B6DB56", "bank": "B6", "label": "Text_08B_Romance_LoveKidsTooMyDream", "category": "Romance", "text_preview": "I love kids too. My dream isto live with a lot of kids around me."}, {"index_hex": "08C", "snes_addr": "B6DBDC", "bank": "B6", "label": "Text_08C_Dialog_Oh", "category": "Dialog", "text_preview": "...Oh."}, {"index_hex": "08D", "snes_addr": "B6DBEA", "bank": "B6", "label": "Text_08D_Dialog_PrettyColdTakeCareYourself", "category": "Dialog", "text_preview": "It's pretty cold so please take care of yourself not tocatch a cold."}, {"index_hex": "08E", "snes_addr": "B6DC76", "bank": "B6", "label": "Text_08E_Church_HaveComeListenPriestC", "category": "Church", "text_preview": "Oh:you have come to listen to the priest. Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "08F", "snes_addr": "B6DD0E", "bank": "B6", "label": "Text_08F_Dialog_Devout", "category": "Dialog", "text_preview": "You are devout."}, {"index_hex": "090", "snes_addr": "B6DD2E", "bank": "B6", "label": "Text_090_Animal_ThenPray", "category": "Animal", "text_preview": "No? then:why are you here? Oh:to pray?"}, {"index_hex": "091", "snes_addr": "B6DD7E", "bank": "B6", "label": "Text_091_Weather_WelcomeRainHaveaLotRain", "category": "Weather", "text_preview": "It's a welcome rain. We havea lot of rain here in spring."}, {"index_hex": "092", "snes_addr": "B6DDFE", "bank": "B6", "label": "Text_092_Dialog_UumComeOvertoRanchSome", "category": "Dialog", "text_preview": "Uum...well...can I come overto your ranch some day soon?"}, {"index_hex": "093", "snes_addr": "B6DE70", "bank": "B6", "label": "Text_093_Dialog_LonelyLivingBigPlaceLittle", "category": "Dialog", "text_preview": "Aren't you lonely living in that big place? A little lonely No:not at all<CHOICE_OR_WAIT>c"}, {"index_hex": "094", "snes_addr": "B6DF20", "bank": "B6", "label": "Text_094_Dialog_UumIfNothingGGood", "category": "Dialog", "text_preview": "Uum..well...yes: if...no: nothing....g-good-by."}, {"index_hex": "095", "snes_addr": "B6DF84", "bank": "B6", "label": "Text_095_Dialog_SeeSorryMeanAskAnything", "category": "Dialog", "text_preview": "I..see...sorry:I didn't mean to ask you anything personal."}, {"index_hex": "096", "snes_addr": "B6E008", "bank": "B6", "label": "Text_096_Dialog_GoingMakeGreatToolsLike", "category": "Dialog", "text_preview": "I'm going to make great tools like my dad,"}, {"index_hex": "097", "snes_addr": "B6E066", "bank": "B6", "label": "Text_097_Sign_ItllShowcasedShopOneThese", "category": "Sign", "text_preview": "It'll be showcased at the shop one of these days so please try it. Hum I don't want it<CHOICE_OR_WAIT>c"}, {"index_hex": "098", "snes_addr": "B6E150", "bank": "B6", "label": "Text_098_Dialog_TrustMe", "category": "Dialog", "text_preview": "Trust me."}, {"index_hex": "099", "snes_addr": "B6E164", "bank": "B6", "label": "Text_099_Dialog_TrustMe", "category": "Dialog", "text_preview": "You don't trust me: do you?"}, {"index_hex": "09A", "snes_addr": "B6E19C", "bank": "B6", "label": "Text_09A_Dialog_SeemsLittleDifferentPlanHad", "category": "Dialog", "text_preview": "It seems a little different from the plan I had but...nobig deal."}, {"index_hex": "09B", "snes_addr": "B6E220", "bank": "B6", "label": "Text_09B_Romance_ActingLikeGirlAllBad", "category": "Romance", "text_preview": "Aren't I acting like a girl? No:not at all Not that bad<CHOICE_OR_WAIT>c"}, {"index_hex": "09C", "snes_addr": "B6E2AE", "bank": "B6", "label": "Text_09C_Dialog_Outspoken", "category": "Dialog", "text_preview": "How outspoken you are,"}, {"index_hex": "09D", "snes_addr": "B6E2DC", "bank": "B6", "label": "Text_09D_Romance_MyDadAlwaysTellsMe", "category": "Romance", "text_preview": "My dad always tells me to act like a girl but I wonderexactly what acting like a girl means."}, {"index_hex": "09E", "snes_addr": "B6E39A", "bank": "B6", "label": "Text_09E_Dialog_KnowButFeelsGoodSpring", "category": "Dialog", "text_preview": "Well...I don't know why but...it feels good in spring. I go like \"OK:it's show time,\""}, {"index_hex": "09F", "snes_addr": "B6E460", "bank": "B6", "label": "Text_09F_Romance_LoveSummerThoughHot", "category": "Romance", "text_preview": "I love summer though it's hot."}, {"index_hex": "0A0", "snes_addr": "B6E4A2", "bank": "B6", "label": "Text_0A0_Dialog_ConstantEffortImportantKnowSaysuccess", "category": "Dialog", "text_preview": "well:constant effort is important:you know. They saysuccess comes from failure."}, {"index_hex": "0A1", "snes_addr": "B6E54A", "bank": "B6", "label": "Text_0A1_Animal_LooksColdOutsideTurnsWhite", "category": "Animal", "text_preview": "It looks cold outside.It turns white when you breatheout:doesn't it?"}, {"index_hex": "0A2", "snes_addr": "B6E5DA", "bank": "B6", "label": "Text_0A2_Dialog_HoHumBoringC", "category": "Dialog", "text_preview": "Ho hum...it's boring: isn't it? Yes Not really<CHOICE_OR_WAIT>c"}, {"index_hex": "0A3", "snes_addr": "B6E678", "bank": "B6", "label": "Text_0A3_Diary_HumSleepyHoHum", "category": "Diary", "text_preview": "It is:hum? I'm so sleepy... ho hum..."}, {"index_hex": "0A4", "snes_addr": "B6E6C4", "bank": "B6", "label": "Text_0A4_Dialog_GeeSerious", "category": "Dialog", "text_preview": "Gee:you are so serious."}, {"index_hex": "0A5", "snes_addr": "B6E6F4", "bank": "B6", "label": "Text_0A5_Manual_FeelRelaxedOutsideHaventOutfor", "category": "Manual", "text_preview": "Yes:I feel relaxed outside...I haven't been outfor a while."}, {"index_hex": "0A6", "snes_addr": "B6E77E", "bank": "B6", "label": "Text_0A6_Dialog_IdeaComesOutUnderThisheat", "category": "Dialog", "text_preview": "No idea comes out under thisheat,"}, {"index_hex": "0A7", "snes_addr": "B6E7C2", "bank": "B6", "label": "Text_0A7_Dialog_LetsBestShall", "category": "Dialog", "text_preview": "Let's do our best:shall we?"}, {"index_hex": "0A8", "snes_addr": "B6E7FC", "bank": "B6", "label": "Text_0A8_Weather_MountainCoveredWithsnowNow", "category": "Weather", "text_preview": "The mountain is covered withsnow by now."}, {"index_hex": "0A9", "snes_addr": "B6E84E", "bank": "B6", "label": "Text_0A9_Weather_HateRainFeelsDepressingLike", "category": "Weather", "text_preview": "I hate rain.It feels depressing.I like when it pours."}, {"index_hex": "0AA", "snes_addr": "B6E8CC", "bank": "B6", "label": "Text_0AA_Romance_MyDadTellsMeGet", "category": "Romance", "text_preview": "...My dad tells me to get married so often.... He would be all by himself if I got married to someone... Doesn't he realize that?"}, {"index_hex": "0AB", "snes_addr": "B6EA14", "bank": "B6", "label": "Text_0AB_Animal_LookAutomaticPuddingMakerPut", "category": "Animal", "text_preview": "Hello, Hey: look at this, This is the automatic pudding maker, I've put eggs and milk in here. Now all you have to dois turn it on.Do it, Push I don't want to do<CHOICE_OR_WAIT>c"}, {"index_hex": "0AC", "snes_addr": "B6EB9E", "bank": "B6", "label": "Text_0AC_Dialog_SmellsWonderful", "category": "Dialog", "text_preview": "It smells wonderful:doesn't it?"}, {"index_hex": "0AD", "snes_addr": "B6EBDE", "bank": "B6", "label": "Text_0AD_Dialog_SayMuchQuickerTomakePudding", "category": "Dialog", "text_preview": "You say it's much quicker tomake pudding without the machine? Oh no...don' t you have a dream?"}, {"index_hex": "0AE", "snes_addr": "B6ECA2", "bank": "B6", "label": "Text_0AE_Animal_LoveSpringAllFlowersStart", "category": "Animal", "text_preview": "I love Spring when all the flowers start to bloom."}, {"index_hex": "0AF", "snes_addr": "B6ED0A", "bank": "B6", "label": "Text_0AF_Town_LikeFlowersC", "category": "Town", "text_preview": "Hello. Do you like flowers? Yes Not really<CHOICE_OR_WAIT>c"}, {"index_hex": "0B0", "snes_addr": "B6ED94", "bank": "B6", "label": "Text_0B0_Romance_YeahNinaLovesToo", "category": "Romance", "text_preview": "Yeah:Nina loves them too,"}, {"index_hex": "0B1", "snes_addr": "B6EDC8", "bank": "B6", "label": "Text_0B1_Dialog_Ugh", "category": "Dialog", "text_preview": "ugh..."}, {"index_hex": "0B2", "snes_addr": "B6EDD6", "bank": "B6", "label": "Text_0B2_Shipping_AutumnWinterOffSeasonUs", "category": "Shipping", "text_preview": "Autumn to Winter is an off season for us because there's nothing to sell."}, {"index_hex": "0B3", "snes_addr": "B6EE78", "bank": "B6", "label": "Text_0B3_Romance_BelieveFlowerWhichBloomsWinter", "category": "Romance", "text_preview": "Do you believe that there is a flower which blooms in Winter? Yes You're kidding?<CHOICE_OR_WAIT>c"}, {"index_hex": "0B4", "snes_addr": "B6EF5A", "bank": "B6", "label": "Text_0B4_Dialog_MustBeautiful", "category": "Dialog", "text_preview": "It must be beautiful."}, {"index_hex": "0B5", "snes_addr": "B6EF86", "bank": "B6", "label": "Text_0B5_Sign_LetMeTellCodeForthe", "category": "Sign", "text_preview": "Let me tell you the code forthe flower in our shop. It is \"I like you a lot,\""}, {"index_hex": "0B6", "snes_addr": "B6F02A", "bank": "B6", "label": "Text_0B6_Romance_GuessHappyIfGaveFlowerto", "category": "Romance", "text_preview": "Hey:I guess she would be happy if you gave the flowerto the girl you like."}, {"index_hex": "0B7", "snes_addr": "B6F0C6", "bank": "B6", "label": "Text_0B7_Sign_MountainsSeasonBeautifulManyFruits", "category": "Sign", "text_preview": "The mountains this season are beautiful. There are many fruits and nuts:too..."}, {"index_hex": "0B8", "snes_addr": "B6F16E", "bank": "B6", "label": "Text_0B8_Dialog_DesertedWinterButExperienceJoysof", "category": "Dialog", "text_preview": "It's deserted in Winter.But we can't experience the joysof Spring without Winter."}, {"index_hex": "0B9", "snes_addr": "B6F212", "bank": "B6", "label": "Text_0B9_Sign_HerbInnerPartCaveWorks", "category": "Sign", "text_preview": "The herb in the inner part of the cave works well for fever and headache when you boil it."}, {"index_hex": "0BA", "snes_addr": "B6F2CC", "bank": "B6", "label": "Text_0BA_Sign_FlowerSoldShopRaise", "category": "Sign", "text_preview": "The flower sold at the shop is what we raise here."}, {"index_hex": "0BB", "snes_addr": "B6F332", "bank": "B6", "label": "Text_0BB_Shipping_CollectingFallenLeavestoMakeManure", "category": "Shipping", "text_preview": "I'm collecting fallen leavesto make manure for the flowers."}, {"index_hex": "0BC", "snes_addr": "B6F3B4", "bank": "B6", "label": "Text_0BC_Weather_PlantsAliveUnderSnowWonderful", "category": "Weather", "text_preview": "Plants are alive under the snow.Isn't it wonderful? Wonderful So?<CHOICE_OR_WAIT>c"}, {"index_hex": "0BD", "snes_addr": "B6F462", "bank": "B6", "label": "Text_0BD_Dialog_HumanAnimalsPlantsAllAlive", "category": "Dialog", "text_preview": "Human:animals:and plants are all alive."}, {"index_hex": "0BE", "snes_addr": "B6F4B8", "bank": "B6", "label": "Text_0BE_Dialog_Great", "category": "Dialog", "text_preview": "So great,"}, {"index_hex": "0BF", "snes_addr": "B6F4CC", "bank": "B6", "label": "Text_0BF_Festival_KnowBusyWorkingButTry", "category": "Festival", "text_preview": "I know you are busy working but please try to come to the festival."}, {"index_hex": "0C0", "snes_addr": "B6F558", "bank": "B6", "label": "Text_0C0_Weather_KindLikeRainyDaysLeaves", "category": "Weather", "text_preview": "I kind of like rainy days. Leaves look happy when it rains."}, {"index_hex": "0C1", "snes_addr": "B6F5D6", "bank": "B6", "label": "Text_0C1_Animal_FlowersEdibleUsedMedicinalPurposes", "category": "Animal", "text_preview": "Flowers can be edible and used for medicinal purposes as well as making us feel comfortable.But I don't pickthem when I don't need them. I believe they want to live too."}, {"index_hex": "0C2", "snes_addr": "B6F72E", "bank": "B6", "label": "Text_0C2_Dialog_HeardWasSecretGardenRanch", "category": "Dialog", "text_preview": "I heard there was the \"Secret Garden\" in the ranch. Is it so? I want to go see it. OK I don't want to go.<CHOICE_OR_WAIT>c"}, {"index_hex": "0C3", "snes_addr": "B6F84E", "bank": "B6", "label": "Text_0C3_Dialog_WowHardlyWait", "category": "Dialog", "text_preview": "Wow:I can hardly wait."}, {"index_hex": "0C4", "snes_addr": "B6F87C", "bank": "B6", "label": "Text_0C4_Dialog_MeanForget", "category": "Dialog", "text_preview": "How mean, Forget it,"}, {"index_hex": "0C5", "snes_addr": "B6F8CA", "bank": "B6", "label": "Text_0C5_Dialog_AlwaysLookFine", "category": "Dialog", "text_preview": "Hello:you always look fine."}, {"index_hex": "0C6", "snes_addr": "B6F904", "bank": "B6", "label": "Text_0C6_Dialog_HaveLittleBirdNameP", "category": "Dialog", "text_preview": "I have a little bird. Her name is P-chan. She sings beautifully."}, {"index_hex": "0C7", "snes_addr": "B6F98E", "bank": "B6", "label": "Text_0C7_Romance_LikeSweetsLoveC", "category": "Romance", "text_preview": "Hey:do you like sweets? I love them Not really<CHOICE_OR_WAIT>c"}, {"index_hex": "0C8", "snes_addr": "B6FA10", "bank": "B6", "label": "Text_0C8_Dialog_GoodMakingSweetsHopeCook", "category": "Sign", "text_preview": "Really? I'm good at making sweets.I hope I can cook you something someday."}, {"index_hex": "0C9", "snes_addr": "B6FAAE", "bank": "B6", "label": "Text_0C9_Dialog_Sorry", "category": "Dialog", "text_preview": "I'm sorry."}, {"index_hex": "0CA", "snes_addr": "B6FAC4", "bank": "B6", "label": "Text_0CA_Romance_StillnessWinterMakesMeCalm", "category": "Romance", "text_preview": "The stillness of Winter makes me calm down so I love it."}, {"index_hex": "0CB", "snes_addr": "B6FB4A", "bank": "B6", "label": "Text_0CB_Romance_LikeAnimalsLoveLikeC", "category": "Romance", "text_preview": "Hey:do you like animals? I love them I don't like them<CHOICE_OR_WAIT>c"}, {"index_hex": "0CC", "snes_addr": "B6FBDC", "bank": "B6", "label": "Text_0CC_Romance_LoveAnimalsToo", "category": "Romance", "text_preview": "Yes? I love animals too."}, {"index_hex": "0CD", "snes_addr": "B6FC0E", "bank": "B6", "label": "Text_0CD_Town_LyingAnimalsTakePeopleWho", "category": "Town", "text_preview": "You are lying. animals dont take to people who don't like them."}, {"index_hex": "0CE", "snes_addr": "B6FC94", "bank": "B6", "label": "Text_0CE_Animal_EiBarkWildDogswhenCome", "category": "Animal", "text_preview": "<CTRL_FFFD>ei would bark at wild dogswhen they come here. Check if the fence is broken."}, {"index_hex": "0CF", "snes_addr": "B6FD32", "bank": "B6", "label": "Text_0CF_Dialog_HardLookAfterAnimalsAlways", "category": "Dialog", "text_preview": "It's hard to look after animals.We always must be careful so they dont get sick.... I feel just like a mother who is taking care of her children."}, {"index_hex": "0D0", "snes_addr": "B6FE84", "bank": "B6", "label": "Text_0D0_Romance_AlwaysRunningAroundLookFine", "category": "Romance", "text_preview": "You are always running around:aren't you? You look fine even if it's cold outside."}, {"index_hex": "0D1", "snes_addr": "B6FF34", "bank": "B6", "label": "Text_0D1_Dialog_HopeMyDadStaysHealthy", "category": "Dialog", "text_preview": "I hope my dad stays healthy at all times."}, {"index_hex": "0D2", "snes_addr": "B78000", "bank": "B7", "label": "Text_0D2_Dialog_MyUncleLikedMakeFriends", "category": "Dialog", "text_preview": "My uncle liked you. Please make friends with him.OK? OK No<CHOICE_OR_WAIT>c"}, {"index_hex": "0D3", "snes_addr": "B780AE", "bank": "B7", "label": "Text_0D3_Dialog_GladExcuseHimBeingMeddlesome", "category": "Dialog", "text_preview": "Really? I'm glad. Please excuse him for being meddlesome. I guess he gets that from my mother."}, {"index_hex": "0D4", "snes_addr": "B78184", "bank": "B7", "label": "Text_0D4_Dialog_HesStrictButBasicallyGood", "category": "Dialog", "text_preview": "He's strict but basically a good person."}, {"index_hex": "0D5", "snes_addr": "B781D6", "bank": "B7", "label": "Text_0D5_Dialog_TooSoakedMightCatchCold", "category": "Dialog", "text_preview": "Oh no: you are too soaked. You might catch a cold unless you dry yourself soon."}, {"index_hex": "0D6", "snes_addr": "B78282", "bank": "B7", "label": "Text_0D6_Dialog_ComeDadLetsGoHomenow", "category": "Dialog", "text_preview": "Oh:come on:Dad.Let's go homenow."}, {"index_hex": "0D7", "snes_addr": "B782C4", "bank": "B7", "label": "Text_0D7_Dialog_OtherwiseMomGetMad", "category": "Dialog", "text_preview": "Otherwise Mom will get really mad at you."}, {"index_hex": "0D8", "snes_addr": "B78322", "bank": "B7", "label": "Text_0D8_Animal_TasteMyNewCakeBaked", "category": "Animal", "text_preview": "Will you taste my new cake when it's baked?"}, {"index_hex": "0D9", "snes_addr": "B7837C", "bank": "B7", "label": "Text_0D9_Dialog_BakedNewCakeHaveBite", "category": "Dialog", "text_preview": "Hey:I baked a new cake. Will you have a bite? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "0DA", "snes_addr": "B78422", "bank": "B7", "label": "Text_0DA_Sign_GoodCheesecakeThinkGoodEnough", "category": "Sign", "text_preview": "Is it good? It's a cheesecake. Do you think it's good enough to sell at the shop?"}, {"index_hex": "0DB", "snes_addr": "B784DE", "bank": "B7", "label": "Text_0DB_Romance_LookPrettyBusyHopeEverythings", "category": "Romance", "text_preview": "You look pretty busy. I hope everything's well with you."}, {"index_hex": "0DC", "snes_addr": "B78562", "bank": "B7", "label": "Text_0DC_Dialog_CoincidenceMeetC", "category": "Dialog", "text_preview": "Oh:what a coincidence to meet you here. Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "0DD", "snes_addr": "B785FA", "bank": "B7", "label": "Text_0DD_Dialog_TeeHee", "category": "Dialog", "text_preview": "Tee-hee..."}, {"index_hex": "0DE", "snes_addr": "B78610", "bank": "B7", "label": "Text_0DE_Shop_WowCoincidenceWereWaitingMe", "category": "Sign", "text_preview": "Wow:what a coincidence. Hey:were you waiting for me here? Titter...I'm waiting for youat the bar."}, {"index_hex": "0DF", "snes_addr": "B786E2", "bank": "B7", "label": "Text_0DF_Sign_CameShopSorryButToo", "category": "Sign", "text_preview": "Hi.I just came to shop. Sorry:but I'm in too much ofa hurry to see you."}, {"index_hex": "0E0", "snes_addr": "B7877A", "bank": "B7", "label": "Text_0E0_Weather_CameRainGlad", "category": "Weather", "text_preview": "You came here in this rain? I'm so glad."}, {"index_hex": "0E1", "snes_addr": "B787CC", "bank": "B7", "label": "Text_0E1_Dialog_GrandPaStrict", "category": "Dialog", "text_preview": "Grand-pa is so strict..."}, {"index_hex": "0E2", "snes_addr": "B787FE", "bank": "B7", "label": "Text_0E2_Dialog_PrettyDaringShallWashBack", "category": "Dialog", "text_preview": "You are pretty daring: aren't you? Shall I wash your back? Yes N..N..No<CHOICE_OR_WAIT>c"}, {"index_hex": "0E3", "snes_addr": "B788D2", "bank": "B7", "label": "Text_0E3_Dialog_Kidding", "category": "Dialog", "text_preview": "Hey: I'm just kidding."}, {"index_hex": "0E4", "snes_addr": "B78900", "bank": "B7", "label": "Text_0E4_Dialog_HeeHee", "category": "Dialog", "text_preview": "Hee-hee: I won't do it."}, {"index_hex": "0E5", "snes_addr": "B78930", "bank": "B7", "label": "Text_0E5_Dialog_LookFineToday", "category": "Dialog", "text_preview": "Hi. You look fine today."}, {"index_hex": "0E6", "snes_addr": "B78962", "bank": "B7", "label": "Text_0E6_Dialog_MyHomeMadeFruitJuice", "category": "Dialog", "text_preview": "It's my home made fruit juice. Do you want it? Yes No thank you<CHOICE_OR_WAIT>c"}, {"index_hex": "0E7", "snes_addr": "B78A1E", "bank": "B7", "label": "Text_0E7_Dialog_TeeHeeKissIfDrink", "category": "Dialog", "text_preview": "Tee-hee...I'll kiss you if you can drink it."}, {"index_hex": "0E8", "snes_addr": "B78A7C", "bank": "B7", "label": "Text_0E8_Shop_BarAhaWantSeeMe", "category": "Sign", "text_preview": "Why are you here at this bar? ...Aha: you want to see me."}, {"index_hex": "0E9", "snes_addr": "B78AFC", "bank": "B7", "label": "Text_0E9_Dialog_GetCoolNight", "category": "Dialog", "text_preview": "It doesn't get cool at night."}, {"index_hex": "0EA", "snes_addr": "B78B42", "bank": "B7", "label": "Text_0EA_Dialog_ThanksLotToday", "category": "Dialog", "text_preview": "Thanks a lot for today."}, {"index_hex": "0EB", "snes_addr": "B78B72", "bank": "B7", "label": "Text_0EB_Dialog_LikeAlone", "category": "Dialog", "text_preview": "I don't like to be alone."}, {"index_hex": "0EC", "snes_addr": "B78BA6", "bank": "B7", "label": "Text_0EC_Sign_SometimesGoMountainsGatherSome", "category": "Sign", "text_preview": "I sometimes go to the mountains to gather some berries."}, {"index_hex": "0ED", "snes_addr": "B78C28", "bank": "B7", "label": "Text_0ED_Animal_WasntColdOutsideColdBetter", "category": "Animal", "text_preview": "Wasn't it cold outside? When it's cold: you better drink and warm you body from the inside."}, {"index_hex": "0EE", "snes_addr": "B78CEA", "bank": "B7", "label": "Text_0EE_Dialog_SawRanchOtherDayNoticeme", "category": "Dialog", "text_preview": "I saw you at the ranch the other day. You didn't noticeme because you were working."}, {"index_hex": "0EF", "snes_addr": "B78D94", "bank": "B7", "label": "Text_0EF_Dialog_StandAloneinHugePlaceFeel", "category": "Dialog", "text_preview": "I couldn't stand to be alonein that huge place. Don't you feel lonely there? Sometimes Not at all<CHOICE_OR_WAIT>c"}, {"index_hex": "0F0", "snes_addr": "B78E84", "bank": "B7", "label": "Text_0F0_Weather_MuchBetterHaveSomeoneAround", "category": "Weather", "text_preview": "It's much better to have someone around me and say \"yeah:\" when I say \" the weather is fine.\" Feel secure: don't you ? I think it's better than being alone. Right?"}, {"index_hex": "0F1", "snes_addr": "B78FE8", "bank": "B7", "label": "Text_0F1_Dialog_SureLiveAloneButitsLike", "category": "Dialog", "text_preview": "Sure: you can live alone butit's just like breathing: you know? It's lonely..."}, {"index_hex": "0F2", "snes_addr": "B7908A", "bank": "B7", "label": "Text_0F2_Dialog_OneWhoSupposedWorkRanch", "category": "Dialog", "text_preview": "Hello. You are the one who is supposed to work at this ranch today. What's your name?"}, {"index_hex": "0F3", "snes_addr": "B79138", "bank": "B7", "label": "Text_0F3_Shipping_MrEjChargeShippingCome", "category": "Shipping", "text_preview": "Mr.<CTRL_FFFD>ej:I'm in charge of shipping here. I come here every evening to pick up stuff you put in the shipping box. Nice to meet you. Oh yeah: ask anything you want to people in town. It will help you."}, {"index_hex": "0F4", "snes_addr": "B792E6", "bank": "B7", "label": "Text_0F4_Dialog_ManagingTheranchAloneSeparatelyParents", "category": "Dialog", "text_preview": "Hello. Where are you from?...You are managing theranch alone: separately from your parents? Great, There's nothing here in the ranch: is there?...for practice? You have wonderfulparents."}, {"index_hex": "0F5", "snes_addr": "B7946E", "bank": "B7", "label": "Text_0F5_Town_MayorTownPleasureMeetSome", "category": "Town", "text_preview": "Hi: How do you do? I'm the mayor of this town. It's a pleasure to meet you. There are some tools left inthe shed that your grandfather used to use. And a book on how to use them:too."}, {"index_hex": "0F6", "snes_addr": "B795F8", "bank": "B7", "label": "Text_0F6_Animal_GrandfatherHelpedMeThoseDays", "category": "Animal", "text_preview": "Your grandfather helped me in those days. If you have any problems: don't hesitate to talk to me. Well:you should get some rest when you get back home."}, {"index_hex": "0F7", "snes_addr": "B7973C", "bank": "B7", "label": "Text_0F7_Church_HardButGiveUpYeah", "category": "Church", "text_preview": "How do you do? Hard:isn't it? But don't give up..................Oh:yeah I have a daughter....she maybe at the church."}, {"index_hex": "0F8", "snes_addr": "B7982E", "bank": "B7", "label": "Text_0F8_Romance_CuteGirlLonghair", "category": "Romance", "text_preview": "She is a cute girl with longhair."}, {"index_hex": "0F9", "snes_addr": "B79872", "bank": "B7", "label": "Text_0F9_Romance_HaventSeenBeforeComeRanch", "category": "Romance", "text_preview": "I haven't seen you before. Did you come to that ranch? I'm Maria. Nice meeting you."}, {"index_hex": "0FA", "snes_addr": "B7991C", "bank": "B7", "label": "Text_0FA_Dialog_MayHardFirstButGive", "category": "Dialog", "text_preview": "It may be hard at first but don't give up."}, {"index_hex": "0FB", "snes_addr": "B79972", "bank": "B7", "label": "Text_0FB_Town_HeardSomethingHeardFaintSound", "category": "Town", "text_preview": "I've heard something, I've heard a faint sound of laughter behind the trees in the ranch. And some people talking:too, ...What was that?"}, {"index_hex": "0FC", "snes_addr": "B79AAA", "bank": "B7", "label": "Text_0FC_Dialog_HeHello", "category": "Dialog", "text_preview": "He..Hello."}, {"index_hex": "0FD", "snes_addr": "B79AC0", "bank": "B7", "label": "Text_0FD_Sign_PriestChurchAskQuestionsPeople", "category": "Sign", "text_preview": "How do you do? I'm the priest of this church. Ask questions to people at the shop. They know many things. And for the rest: check the signboards."}, {"index_hex": "0FE", "snes_addr": "B79C02", "bank": "B7", "label": "Text_0FE_Dialog_YoullHavePlentyChallengesBut", "category": "Dialog", "text_preview": "You'll have a plenty of challenges but things will be better for sure. Please stick to it."}, {"index_hex": "0FF", "snes_addr": "B79CC2", "bank": "B7", "label": "Text_0FF_Town_YearOverTodayWasYear", "category": "Town", "text_preview": "This year is over today. What was your year like? Well:this town will be in a festive mood tomorrow because lots of people are going to the top to see the sun rise."}, {"index_hex": "100", "snes_addr": "B79E1E", "bank": "B7", "label": "Text_100_Sign_ShippingBoxLivestockAfterTalking", "category": "Sign", "text_preview": "\"Shipping box for livestock\"After talking at the shop: put livestock in here. Livestock Dealer"}, {"index_hex": "101", "snes_addr": "B79EDE", "bank": "B7", "label": "Text_101_Manual_ToolsShedPenPickUp", "category": "Manual", "text_preview": "Tools are in the shed and the pen. Pick them up with A button to get equipped. To use them: push Y button."}, {"index_hex": "102", "snes_addr": "B79FBA", "bank": "B7", "label": "Text_102_Dialog_UnfortunatelyTheresNothingSaleBut", "category": "Dialog", "text_preview": "Unfortunately: there's nothing for sale here but there will be soon. So please drop by in a while."}, {"index_hex": "103", "snes_addr": "B7A098", "bank": "B7", "label": "Text_103_Romance_HehOwnerRanchAnnNice", "category": "Romance", "text_preview": "Heh: you are the owner of the ranch. I'm Ann. Nice to meet you."}, {"index_hex": "104", "snes_addr": "B7A12C", "bank": "B7", "label": "Text_104_Diary_StaminaDecreasesUseToolsEat", "category": "Diary", "text_preview": "Stamina decreases when you use tools. Eat food or sleep in the bed to recover."}, {"index_hex": "105", "snes_addr": "B7A1D6", "bank": "B7", "label": "Text_105_Manual_WentRanchIfGoingRaise", "category": "Manual", "text_preview": "You went to the ranch: didn't you? If you are going to raise crops there: I'll give this to you. It's a watering can. It's for getting water from the pond. I'll bring itto your shed."}, {"index_hex": "106", "snes_addr": "B7A370", "bank": "B7", "label": "Text_106_Manual_VegetableSeedsSoonComeAgain", "category": "Manual", "text_preview": "Vegetable seeds will be in soon so come again soon."}, {"index_hex": "107", "snes_addr": "B7A3DA", "bank": "B7", "label": "Text_107_Romance_NinaTheseCropsMustSowed", "category": "Romance", "text_preview": "How do you do? I'm Nina. These crops must be sowed during a certain season. They won't germinate unless you sow them in the proper season."}, {"index_hex": "108", "snes_addr": "B7A4FC", "bank": "B7", "label": "Text_108_Dialog_HavePlowGroundMakeField", "category": "Dialog", "text_preview": "And you have to plow the ground well to make it a field."}, {"index_hex": "109", "snes_addr": "B7A57A", "bank": "B7", "label": "Text_109_Romance_WelcomeYoudBetterEatEveryday", "category": "Romance", "text_preview": "Welcome. You'd better eat everyday: you know. Stamina is key."}, {"index_hex": "10A", "snes_addr": "B7A5FA", "bank": "B7", "label": "Text_10A_Dialog_MustHardKnowButtryBest", "category": "Dialog", "text_preview": "It must be hard: I know: buttry your best."}, {"index_hex": "10B", "snes_addr": "B7A650", "bank": "B7", "label": "Text_10B_Dialog_PuffHicHaveSeenBefore", "category": "Dialog", "text_preview": "Puff...hic..Have I seen you before?"}, {"index_hex": "10C", "snes_addr": "B7A698", "bank": "B7", "label": "Text_10C_Animal_SonHaveHaveMeadowBuy", "category": "Animal", "text_preview": "Hey:son, You have to have a meadow to buy livestock. Not only for cows but also for chickens. I have some grass left so use it to raise them. I'll bring it to your shed. Talk to me over the counter when you want to buy l"}, {"index_hex": "10D", "snes_addr": "B7A878", "bank": "B7", "label": "Text_10D_Animal_FirstMustHavePlentyGrass", "category": "Animal", "text_preview": "First:you must have a plenty of grass when you raise livestock. Beginners should start off with chickens."}, {"index_hex": "10E", "snes_addr": "B7A960", "bank": "B7", "label": "Text_10E_Manual_HowdyPutThoseCowsPen", "category": "Manual", "text_preview": "Howdy, I put those cows in the pen and gave those bellsfor free. Well:first thing to do is toname them with affection.Take good care of them,"}, {"index_hex": "10F", "snes_addr": "B7AA7E", "bank": "B7", "label": "Text_10F_Shipping_WanderingPeddlerHaveAnythingSell", "category": "Shipping", "text_preview": "Hello. I'm a wandering peddler.I don't have anything to sell right now though. If you want to sell something: bring it to me so I can buy it."}, {"index_hex": "110", "snes_addr": "B7ABB4", "bank": "B7", "label": "Text_110_Romance_GirlsTownAllCuteGood", "category": "Romance", "text_preview": "Girls in this town are all cute and good-natured so it may be fun to be here."}, {"index_hex": "111", "snes_addr": "B7AC52", "bank": "B7", "label": "Text_111_Animal_HohohoMisterKnowBeginFirst", "category": "Animal", "text_preview": "Hohoho...Mister: you don't know what to begin with:do you? First:you must learn how to use those tools with the book in the shed. The rest: ask the florist about the crops and the livestock dealer about livestock."}, {"index_hex": "112", "snes_addr": "B7AE14", "bank": "B7", "label": "Text_112_Animal_OverextendYourselfTiredGoBed", "category": "Animal", "text_preview": "Don't overextend yourself. When you are tired: just go to bed earlier. The healthy body is your precious asset. Try your best to become an independent rancher."}, {"index_hex": "113", "snes_addr": "B7AF62", "bank": "B7", "label": "Text_113_Weather_MrsFortuneTellersWordsAlways", "category": "Weather", "text_preview": "Mrs.Fortune-teller's words always prove right. Just like the weather fore cast on TV."}, {"index_hex": "114", "snes_addr": "B7B016", "bank": "B7", "label": "Text_114_Romance_EllenNiceMeeting", "category": "Romance", "text_preview": "Oh:hi:I'm Ellen. Nice meeting you."}, {"index_hex": "115", "snes_addr": "B7B068", "bank": "B7", "label": "Text_115_Dialog_HeirRanchWonderIfManage", "category": "Dialog", "text_preview": "What? Are you the heir of the ranch? I wonder if you can manage it. Young men these days have little guts."}, {"index_hex": "116", "snes_addr": "B7B148", "bank": "B7", "label": "Text_116_Sign_BarClosedTodayUsuallyOpen", "category": "Sign", "text_preview": "Hello. The bar is closed today. It's usually open except Sunday though."}, {"index_hex": "117", "snes_addr": "B7B1E4", "bank": "B7", "label": "Text_117_Dialog_GoingBackRanchYetC", "category": "Dialog", "text_preview": "Are you going back to the ranch? Yes Not yet<CHOICE_OR_WAIT>c"}, {"index_hex": "118", "snes_addr": "B7B276", "bank": "B7", "label": "Text_118_Weather_ThenGiveLiftTraineeShipping", "category": "Weather", "text_preview": "Then:I'll give you a lift. I'm a trainee of shipping too. Let's do our best to achieveeach other's goal. With grit,"}, {"index_hex": "119", "snes_addr": "B7B376", "bank": "B7", "label": "Text_119_Animal_LetMeKnowGoHome", "category": "Animal", "text_preview": "OK.Let me know when you go home."}, {"index_hex": "11A", "snes_addr": "B7B3BA", "bank": "B7", "label": "Text_11A_Dialog_SuggestListenVillagersLittleMore", "category": "Dialog", "text_preview": "I suggest you listen to the villagers a little more."}, {"index_hex": "11B", "snes_addr": "B7B42C", "bank": "B7", "label": "Text_11B_Romance_YouveComeHauntedRanchTee", "category": "Romance", "text_preview": "You've come to that haunted ranch? Tee:hee...good luck. I'm Eve:nice to meet you. Here you are: it's from me."}, {"index_hex": "11C", "snes_addr": "B7B508", "bank": "B7", "label": "Text_11C_Dialog_BestThingRecoverFatigueRelax", "category": "Dialog", "text_preview": "The best thing to recover from fatigue is to relax."}, {"index_hex": "11D", "snes_addr": "B7B574", "bank": "B7", "label": "Text_11D_Dialog_WelcomeMakeYourselfHome", "category": "Dialog", "text_preview": "Welcome.Make yourself at home."}, {"index_hex": "11E", "snes_addr": "B7B5B8", "bank": "B7", "label": "Text_11E_Shop_EveDrawingCardBarPretty", "category": "Sign", "text_preview": "That's Eve:the drawing card of this bar. Isn't she pretty? That's because she is my niece."}, {"index_hex": "11F", "snes_addr": "B7B67E", "bank": "B7", "label": "Text_11F_Dialog_StillFine", "category": "Dialog", "text_preview": "No...I'm still fine."}, {"index_hex": "120", "snes_addr": "B7B6A8", "bank": "B7", "label": "Text_120_Romance_GoodEveningFanEvesKnow", "category": "Romance", "text_preview": "Good evening. I'm a fan of Eve's:you know."}, {"index_hex": "121", "snes_addr": "B7B700", "bank": "B7", "label": "Text_121_Romance_EveWorksNightSupposeKinda", "category": "Romance", "text_preview": "Eve works at night so I suppose she kinda misses people her age. Mr.<CTRL_FFFD>ek:right? Will you comehere as much as you can?"}, {"index_hex": "122", "snes_addr": "B7B7F8", "bank": "B7", "label": "Text_122_Sign_EveLostParentsHergrandfatherWho", "category": "Sign", "text_preview": "Eve lost her parents and hergrandfather who is a hunter brought her up. Her grandfather locks himself in the mountain and hardly comes down to the town."}, {"index_hex": "123", "snes_addr": "B7B936", "bank": "B7", "label": "Text_123_Romance_MayMissHimTooBut", "category": "Romance", "text_preview": "She may miss him too...but she's always cheerful. Such a nice girl."}, {"index_hex": "124", "snes_addr": "B7B9CA", "bank": "B7", "label": "Text_124_Dialog_KoroWait", "category": "Dialog", "text_preview": "Koro, Wait,"}, {"index_hex": "125", "snes_addr": "B7B9E2", "bank": "B7", "label": "Text_125_Animal_PuffPuffRunSuddenlyMr", "category": "Animal", "text_preview": "Puff-puff...Don't run suddenly.Oh:you.You are the Mr. Rancher everybody's talking about. Well:excuse me:..will you please keep this dog for me? My house is a grocery store so my mom doesn't allow me to keep this dog...so"}, {"index_hex": "126", "snes_addr": "B7BBD2", "bank": "B7", "label": "Text_126_Dialog_ThankVeryMuchHaveNew", "category": "Dialog", "text_preview": "Thank you very much, You have a new house:<CTRL_FFFD>el You've got to be a good boy. Take care."}, {"index_hex": "127", "snes_addr": "B7BC90", "bank": "B7", "label": "Text_127_Dialog_NewcomerRancherSomethingYoungBoy", "category": "Dialog", "text_preview": "Hey:you are a newcomer here. Really:a rancher? That's something. For a young boy like you."}, {"index_hex": "128", "snes_addr": "B7BD58", "bank": "B7", "label": "Text_128_Animal_CarpentersComeUsWantEnlarge", "category": "Animal", "text_preview": "We are carpenters. Please come to us when you want to enlarge your house."}, {"index_hex": "129", "snes_addr": "B7BDF0", "bank": "B7", "label": "Text_129_Sign_ExtensionHouseCallUsHave", "category": "Sign", "text_preview": "For the extension of your house:please call us when you have enough wood for it. See: there's a sign by the house.Check it out."}, {"index_hex": "12A", "snes_addr": "B7BEF8", "bank": "B7", "label": "Text_12A_Dialog_NowExtensionCampaignIfEnlargeyour", "category": "Dialog", "text_preview": "Now it's an extension campaign. If you can enlargeyour house by the end of summer: you will get a special gift for free."}, {"index_hex": "12B", "snes_addr": "B7C000", "bank": "B7", "label": "Text_12B_Mountain_AnglerLivePerfectFreedomBetter", "category": "Sign", "text_preview": "I'm an angler. I live in perfect freedom. You' better forget your work and spend some quiet time: once in a while: enjoying things like fishing."}, {"index_hex": "12C", "snes_addr": "B7C14C", "bank": "B7", "label": "Text_12C_Mountain_PrepareFishingRodNextTime", "category": "Sign", "text_preview": "I'll prepare a fishing rod for you next time."}, {"index_hex": "12D", "snes_addr": "B7C1AA", "bank": "B7", "label": "Text_12D_Dialog_WhatsUpHowsWorkGoing", "category": "Dialog", "text_preview": "Hi:what's up?. How's your work going?"}, {"index_hex": "12E", "snes_addr": "B7C1FA", "bank": "B7", "label": "Text_12E_Sign_GatherMaterialsChoppingLogsMountain", "category": "Sign", "text_preview": "You can gather materials by chopping logs in the mountain."}, {"index_hex": "12F", "snes_addr": "B7C27E", "bank": "B7", "label": "Text_12F_Dialog_AlsoUseMaterialsFenceAlways", "category": "Dialog", "text_preview": "You can also use materials for the fence so you should always gather them."}, {"index_hex": "130", "snes_addr": "B7C316", "bank": "B7", "label": "Text_130_Dialog_WantEnlargeHouseC", "category": "Dialog", "text_preview": "Do you want to enlarge your house? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "131", "snes_addr": "B7C39E", "bank": "B7", "label": "Text_131_Dialog_RanchTomorrow", "category": "Dialog", "text_preview": "OK.I'll be at the ranch tomorrow."}, {"index_hex": "132", "snes_addr": "B7C3EA", "bank": "B7", "label": "Text_132_Animal_LetMeKnowWheneverWant", "category": "Animal", "text_preview": "Let me know whenever you want to do it."}, {"index_hex": "133", "snes_addr": "B7C440", "bank": "B7", "label": "Text_133_Dialog_LikeLivingSuperDeluxeGreat", "category": "Dialog", "text_preview": "How do you like living in the \"Super Deluxe Great Log House\"? Isn't it great?"}, {"index_hex": "134", "snes_addr": "B7C4E0", "bank": "B7", "label": "Text_134_Dialog_CostsGEnlargeHouseTake", "category": "Dialog", "text_preview": "It costs <$00B7><CTRL_B2><CTRL_B2><CTRL_B2>G to enlarge your house. Take it? Yes No Money <CTRL_FFFC>hi<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "135", "snes_addr": "B7C5D0", "bank": "B7", "label": "Text_135_Dialog_AlrightStartOffTomorrow", "category": "Dialog", "text_preview": "Alright.We'll start off tomorrow."}, {"index_hex": "136", "snes_addr": "B7C61C", "bank": "B7", "label": "Text_136_Dialog_CallMeAgainAnyTime", "category": "Dialog", "text_preview": "Oh...OK.Call me again any time."}, {"index_hex": "137", "snes_addr": "B7C660", "bank": "B7", "label": "Text_137_Sign_MyGodTheresEnoughMaterials", "category": "Sign", "text_preview": "Oh my God, There's not enough materials. Hey:listento me very carefully, We don't want to do half-finished work, We can't start without enough materials. You'll see what you need on that sign there so getting them is the"}, {"index_hex": "138", "snes_addr": "B7C88E", "bank": "B7", "label": "Text_138_Manual_ChopStumpsAxeMakeMaterials", "category": "Manual", "text_preview": "Chop stumps with an axe to make them materials.It takes you about <$00B8> hits to chop them down."}, {"index_hex": "139", "snes_addr": "B7C952", "bank": "B7", "label": "Text_139_Dialog_HeeHeeLookForward", "category": "Dialog", "text_preview": "Hee-hee:look forward to it."}, {"index_hex": "13A", "snes_addr": "B7C98C", "bank": "B7", "label": "Text_13A_Dialog_BuildTerrificOneLookForward", "category": "Dialog", "text_preview": "I'll build a terrific one, Look forward to it."}, {"index_hex": "13B", "snes_addr": "B7C9EC", "bank": "B7", "label": "Text_13B_Dialog_CostsGEnlargeHouseTake", "category": "Dialog", "text_preview": "It costs <CTRL_B3><CTRL_B2><CTRL_B2><CTRL_B2><CTRL_B2>G to enlarge your house. Take it? Yes No Money <CTRL_FFFC>hj<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "13C", "snes_addr": "B7CADC", "bank": "B7", "label": "Text_13C_Dialog_Have", "category": "Dialog", "text_preview": "Oh no:just do what you have to do.OK?"}, {"index_hex": "13D", "snes_addr": "B7CB28", "bank": "B7", "label": "Text_13D_Romance_LookExcellentHouseCalledSuper", "category": "Romance", "text_preview": "Look:isn't it an excellent house? It's called \"Super Log House.\""}, {"index_hex": "13E", "snes_addr": "B7CBB0", "bank": "B7", "label": "Text_13E_Romance_WhatsHappenedEveTonight", "category": "Romance", "text_preview": "What's happened to Eve tonight?"}, {"index_hex": "13F", "snes_addr": "B7CBFA", "bank": "B7", "label": "Text_13F_Shipping_NinasMotherCollapsedFromfeverSell", "category": "Shipping", "text_preview": "Nina's mother collapsed fromfever. I can't sell tools while Dad is out nursing her."}, {"index_hex": "140", "snes_addr": "B7CCA6", "bank": "B7", "label": "Text_140_Romance_FinishedLookSuperDeluxeGreat", "category": "Romance", "text_preview": "It's finished, Look at this the \"Super Deluxe Great Log House\",, Even if I do fall in love with it.See you."}, {"index_hex": "141", "snes_addr": "B7CD82", "bank": "B7", "label": "Text_141_Dialog_SayHeardRareSeedGrows", "category": "Dialog", "text_preview": "Say:I've heard of a rare seed.It grows to be a tall bean tree that reaches all the way to the sky. I want to see it."}, {"index_hex": "142", "snes_addr": "B7CE7C", "bank": "B7", "label": "Text_142_Sign_WasScaredEarthquakeMorningCome", "category": "Sign", "text_preview": "Hi,I was scared by the earthquake this morning. Come up to the mountain after checking out the ranch."}, {"index_hex": "143", "snes_addr": "B7CF62", "bank": "B7", "label": "Text_143_Romance_LikeNina", "category": "Romance", "text_preview": ".....Do you like...Nina?"}, {"index_hex": "144", "snes_addr": "B7CF94", "bank": "B7", "label": "Text_144_Dialog_TodayLastDayYearSeems", "category": "Dialog", "text_preview": "Today is the last day of this year. It seems long enough but at the same time:it flies by quickly too."}, {"index_hex": "145", "snes_addr": "B7D074", "bank": "B7", "label": "Text_145_Dialog_ScheduledDateHasAlreadyPassed", "category": "Dialog", "text_preview": "Scheduled date has already passed now. I have to let them in the shed right away."}, {"index_hex": "146", "snes_addr": "B7D11E", "bank": "B7", "label": "Text_146_Animal_LongWinterFinallyOverAnimals", "category": "Animal", "text_preview": "Hey:the long winter is finally over. Animals looks so happy when springs comes too."}, {"index_hex": "147", "snes_addr": "B7D1D0", "bank": "B7", "label": "Text_147_Dialog_YeahFeltDizzy", "category": "Dialog", "text_preview": "...yeah:I'm OK.I just felt dizzy..."}, {"index_hex": "148", "snes_addr": "B7D21A", "bank": "B7", "label": "Text_148_Animal_WanderingHawkerTodayHaveVery", "category": "Animal", "text_preview": "I'm a wandering hawker. Today:I have very rare berries. Take one bite:and you'll be full of vitality.This is a special offer: I can exchange some for a chicken over there. Exchange Not exchange<CHOICE_OR_WAIT>c"}, {"index_hex": "149", "snes_addr": "B7D3E0", "bank": "B7", "label": "Text_149_Animal_WanderingHawkerTodayHaveVery", "category": "Animal", "text_preview": "I'm a wandering hawker. Today:I have a very rare bean seed. You'll see the wonder when you plant it in the soil. I can exchange it with one of your cows. It's a bargain. Exchange Not exchange<CHOICE_OR_WAIT>c"}, {"index_hex": "14A", "snes_addr": "B7D5BA", "bank": "B7", "label": "Text_14A_Animal_ThenCowNowMineHawker", "category": "Animal", "text_preview": "Well then:this cow is now mine. The hawker is glad. See you."}, {"index_hex": "14B", "snes_addr": "B7D63C", "bank": "B7", "label": "Text_14B_Sign_CowMineNowPutSeed", "category": "Sign", "text_preview": "OK:this cow is mine now. I've put the seed in you shed. Plant it on the top of the mountain. Something good will definitely happen. See you."}, {"index_hex": "14C", "snes_addr": "B7D76A", "bank": "B7", "label": "Text_14C_Dialog_HardheartedCustomerWanderingHawkerHawker", "category": "Dialog", "text_preview": "You are a hardhearted customer.I'm a wandering hawker. This hawker is very sad. Good-bye."}, {"index_hex": "14D", "snes_addr": "B7D836", "bank": "B7", "label": "Text_14D_Shop_PeddlerWindSeedTreeGrows", "category": "Sign", "text_preview": "I'm a peddler of the wind. This is the seed of a tree that grows money. Plant it in the ground: you'll be surprised.Mister: you're buying something good. It's only <CTRL_B4><CTRL_B2><CTRL_B2><CTRL_B2><CTRL_B2>G. Buy it N"}, {"index_hex": "14E", "snes_addr": "B7DA28", "bank": "B7", "label": "Text_14E_Dialog_NowPlantedMisterLookForward", "category": "Dialog", "text_preview": "Now:I've planted it. Mister:look forward to today."}, {"index_hex": "14F", "snes_addr": "B7DAA6", "bank": "B7", "label": "Text_14F_Dialog_SureGuaranteeRegretRestLife", "category": "Dialog", "text_preview": "Are you sure? I guarantee that you will regret this for the rest of your life."}, {"index_hex": "150", "snes_addr": "B7DB4C", "bank": "B7", "label": "Text_150_Weather_ToughWeatherGloomy", "category": "Weather", "text_preview": "Hey: it's tough when the weather is gloomy."}, {"index_hex": "151", "snes_addr": "B7DBAA", "bank": "B7", "label": "Text_151_Dialog_BusyBusy", "category": "Dialog", "text_preview": "I'm busy: busy."}, {"index_hex": "152", "snes_addr": "B7DBCA", "bank": "B7", "label": "Text_152_Dialog_WayBackConnectedWorldBelow", "category": "Dialog", "text_preview": "It's the way back. It's connected to the world here below."}, {"index_hex": "153", "snes_addr": "B7DC48", "bank": "B7", "label": "Text_153_Dialog_GoodLordWhatsHappeningPlace", "category": "Dialog", "text_preview": "Good Lord: what's happening here? Hey: Is your place alright?"}, {"index_hex": "154", "snes_addr": "B7DCCA", "bank": "B7", "label": "Text_154_Weather_SayHurricaneComingTomorrow", "category": "Weather", "text_preview": "They say a hurricane is coming here tomorrow."}, {"index_hex": "155", "snes_addr": "B7DD2E", "bank": "B7", "label": "Text_155_Dialog_WindBlowingHarderMakesMe", "category": "Dialog", "text_preview": "The wind is blowing harder and that makes me scared."}, {"index_hex": "156", "snes_addr": "B7DD9A", "bank": "B7", "label": "Text_156_Weather_SkyLooksThreateningProbablyHave", "category": "Weather", "text_preview": "Oh well: the sky looks threatening. We'll probably have a hurricane tomorrow."}, {"index_hex": "157", "snes_addr": "B7DE40", "bank": "B7", "label": "Text_157_Weather_KnowButGetExcitedSomething", "category": "Weather", "text_preview": "I don't know why but I get excited when something like a hurricane comes.Don't you?"}, {"index_hex": "158", "snes_addr": "B7DEEA", "bank": "B7", "label": "Text_158_Weather_WindBlowingHarderNowLike", "category": "Weather", "text_preview": "The wind is blowing harder now. I don't like hurricanes."}, {"index_hex": "159", "snes_addr": "B7DF72", "bank": "B7", "label": "Text_159_Weather_RainButHurricaneBecauseBlows", "category": "Weather", "text_preview": "Rain is OK but not hurricane. Because it blows flowers away."}, {"index_hex": "15A", "snes_addr": "B7DFFE", "bank": "B7", "label": "Text_15A_Weather_YoudBetterPrayGodDamage", "category": "Weather", "text_preview": "You'd better pray to God that there is no damage fromthe hurricane. Trust me."}, {"index_hex": "15B", "snes_addr": "B7E0A0", "bank": "B7", "label": "Text_15B_Weather_SonHurricaneGettingNearHave", "category": "Weather", "text_preview": "Hey:son:the hurricane is getting near. Have you put your livestock in the pen? Sure I Forgot<CHOICE_OR_WAIT>c"}, {"index_hex": "15C", "snes_addr": "B7E194", "bank": "B7", "label": "Text_15C_Romance_KnowEvenIfYoung", "category": "Romance", "text_preview": "You know what to do even if you are young."}, {"index_hex": "15D", "snes_addr": "B7E1EA", "bank": "B7", "label": "Text_15D_Dialog_IdiotDoingGoHomePut", "category": "Dialog", "text_preview": "Are you an idiot? What are you doing here? Go home and put them in the penright now."}, {"index_hex": "15E", "snes_addr": "B7E296", "bank": "B7", "label": "Text_15E_Weather_HangingAroundKnowHurricaneComing", "category": "Weather", "text_preview": "What are you hanging around here for? Don't you know a hurricane is coming?"}, {"index_hex": "15F", "snes_addr": "B7E330", "bank": "B7", "label": "Text_15F_Animal_HavePutLivestockPenLets", "category": "Animal", "text_preview": "Have you put the livestock in the pen? Let's lock the doors later and go to bed."}, {"index_hex": "160", "snes_addr": "B7E3D6", "bank": "B7", "label": "Text_160_Dialog_ImpossibleGoOutToday", "category": "Dialog", "text_preview": "It's impossible to go out today."}, {"index_hex": "161", "snes_addr": "B7E41C", "bank": "B7", "label": "Text_161_Weather_ThankGodWasOnlySlight", "category": "Weather", "text_preview": "Thank God that there was only slight damage from the hurricane."}, {"index_hex": "162", "snes_addr": "B7E4A2", "bank": "B7", "label": "Text_162_Weather_ThinkPreciousWeatherCockWas", "category": "Weather", "text_preview": "I think the precious weather-cock was blown away."}, {"index_hex": "163", "snes_addr": "B7E514", "bank": "B7", "label": "Text_163_Romance_GladEverybodyFine", "category": "Romance", "text_preview": "I'm glad everybody is fine."}, {"index_hex": "164", "snes_addr": "B7E54C", "bank": "B7", "label": "Text_164_Dialog_RanchAlright", "category": "Dialog", "text_preview": "Is your ranch alright?"}, {"index_hex": "165", "snes_addr": "B7E57A", "bank": "B7", "label": "Text_165_Dialog_WasAwfulOursAlright", "category": "Dialog", "text_preview": "That was awful. Yes: ours is alright."}, {"index_hex": "166", "snes_addr": "B7E5CA", "bank": "B7", "label": "Text_166_Dialog_LetsLookAroundRanchTrouble", "category": "Dialog", "text_preview": "Let's look around the ranch.There will be trouble if thefences are broken."}, {"index_hex": "167", "snes_addr": "B7E660", "bank": "B7", "label": "Text_167_Dialog_EarthquakeLastNightRegisteredRichter", "category": "Dialog", "text_preview": "The earthquake last night registered <$00B6> on the richter scale. The damage is not serious."}, {"index_hex": "168", "snes_addr": "B7E714", "bank": "B7", "label": "Text_168_Dialog_YoudBetterInspect", "category": "Dialog", "text_preview": "You'd better inspect here and there."}, {"index_hex": "169", "snes_addr": "B7E762", "bank": "B7", "label": "Text_169_Dialog_EarthquakeNotice", "category": "Dialog", "text_preview": "What? An earthquake? I didn't notice it."}, {"index_hex": "16A", "snes_addr": "B7E7C2", "bank": "B7", "label": "Text_16A_Sign_WonderMyGrandpaDoingLot", "category": "Sign", "text_preview": "I wonder how my grandpa is doing. There are a lot of areas to collapse spots in the mountain so I'm worried about him."}, {"index_hex": "16B", "snes_addr": "B7E8C0", "bank": "B7", "label": "Text_16B_Dialog_WasSurprisedRanchAlright", "category": "Dialog", "text_preview": "I was surprised.Is your ranch alright?"}, {"index_hex": "16C", "snes_addr": "B7E916", "bank
