B99014", "bank": "B9", "label": "Text_2AB_Dialog_HopeLike", "category": "Dialog", "text_preview": "I hope you like it."}, {"index_hex": "2AC", "snes_addr": "B9903C", "bank": "B9", "label": "Text_2AC_Festival_NowStarNightFestivalTomorrow", "category": "Festival", "text_preview": "Now it's the Star Night Festival tomorrow. It'll be nice with the clear blue sky so you'll see the beautiful star at night."}, {"index_hex": "2AD", "snes_addr": "B99148", "bank": "B9", "label": "Text_2AD_Animal_StarNightFestivalSupposedPray", "category": "Animal", "text_preview": "On the Star Night Festival you are supposed to pray forthe night when you can see the most beautiful stars of the year."}, {"index_hex": "2AE", "snes_addr": "B99248", "bank": "B9", "label": "Text_2AE_Dialog_LookSkyItllBeautifulTomorrow", "category": "Dialog", "text_preview": "Look at the sky. It'll be really beautiful tomorrow night."}, {"index_hex": "2AF", "snes_addr": "B992C6", "bank": "B9", "label": "Text_2AF_Church_GoingPlayOrganChurch", "category": "Church", "text_preview": "I'm going to play organ at the church."}, {"index_hex": "2B0", "snes_addr": "B99316", "bank": "B9", "label": "Text_2B0_Dialog_TomorrowHehHehGoingWonderful", "category": "Dialog", "text_preview": "Tomorrow? Heh-heh:I'm going to a wonderful place."}, {"index_hex": "2B1", "snes_addr": "B9937A", "bank": "B9", "label": "Text_2B1_Dialog_SayGoingNearestplaceStars", "category": "Dialog", "text_preview": "Say:I'm going to the nearestplace to the stars."}, {"index_hex": "2B2", "snes_addr": "B993DA", "bank": "B9", "label": "Text_2B2_Church_PrayPublicSquareRomantic", "category": "Church", "text_preview": "We'll pray at the public square. So romantic."}, {"index_hex": "2B3", "snes_addr": "B9943C", "bank": "B9", "label": "Text_2B3_Dialog_LetsHaveBallTomorrowWaiting", "category": "Dialog", "text_preview": "Let's have a ball tomorrow. I'm waiting for you."}, {"index_hex": "2B4", "snes_addr": "B9949E", "bank": "B9", "label": "Text_2B4_Festival_StarNightFestivaltomorrowGoingPlace", "category": "Festival", "text_preview": "It's the Star Night Festivaltomorrow. I'm going to the place I always go."}, {"index_hex": "2B5", "snes_addr": "B99534", "bank": "B9", "label": "Text_2B5_Festival_StarNightFestivaltomorrowGoingPlace", "category": "Festival", "text_preview": "It's the Star Night Festivaltomorrow, I'm going to the place I always go so please come see me there."}, {"index_hex": "2B6", "snes_addr": "B99602", "bank": "B9", "label": "Text_2B6_Sign_StarNightFestivaltodayGoPublic", "category": "Sign", "text_preview": "It's the Star Night Festivaltoday, Where should I go? Public square Mountain top Church Spa Bar<CHOICE_OR_WAIT>f"}, {"index_hex": "2B7", "snes_addr": "B996EA", "bank": "B9", "label": "Text_2B7_Church_LadiesGentlemenLetsPrayStars", "category": "Church", "text_preview": "Well: ladies and gentlemen. Let's pray for the stars."}, {"index_hex": "2B8", "snes_addr": "B99756", "bank": "B9", "label": "Text_2B8_Animal_LightStarsSeeingNowMillions", "category": "Animal", "text_preview": "The light of the stars we are seeing now is that of millions of years ago. It's mysterious when I thinkof it."}, {"index_hex": "2B9", "snes_addr": "B9983A", "bank": "B9", "label": "Text_2B9_Dialog_MayMyBusinessGetBetter", "category": "Dialog", "text_preview": "...May my business get better."}, {"index_hex": "2BA", "snes_addr": "B99882", "bank": "B9", "label": "Text_2BA_Dialog_WantMeReadHoroscopeSure", "category": "Dialog", "text_preview": "Do you want me to read your horoscope? Sure No thanks<CHOICE_OR_WAIT>c"}, {"index_hex": "2BB", "snes_addr": "B99920", "bank": "B9", "label": "Text_2BB_Romance_GirlWhoGetsAlongWellwith", "category": "Romance", "text_preview": "The girl who gets along wellwith you is no one but <CTRL_FFFD>fw,"}, {"index_hex": "2BC", "snes_addr": "B9999A", "bank": "B9", "label": "Text_2BC_Dialog_WantKnow", "category": "Dialog", "text_preview": "Really? Don't you want to know?"}, {"index_hex": "2BD", "snes_addr": "B999DE", "bank": "B9", "label": "Text_2BD_Animal_CloseMyEyesFeellikeFloating", "category": "Animal", "text_preview": "When I close my eyes: I feellike I'm floating in the night sky."}, {"index_hex": "2BE", "snes_addr": "B99A64", "bank": "B9", "label": "Text_2BE_Church_PrayEverybodysGoodHealthSecret", "category": "Church", "text_preview": "What did I pray for? Everybody's good health. ....And.. It's a secret."}, {"index_hex": "2BF", "snes_addr": "B99B06", "bank": "B9", "label": "Text_2BF_Romance_StarsShinningAllTimeSeethem", "category": "Romance", "text_preview": "The stars are shinning all the time. You just can't seethem because of those lights and stuff on the earth. And same as the stars:the truth and love always exist. You just don'tsee. Yes:it's true."}, {"index_hex": "2C0", "snes_addr": "B99CA4", "bank": "B9", "label": "Text_2C0_Church_SometimesWorkEvenifMuchLove", "category": "Church", "text_preview": "It sometimes won't work evenif we are so much in love: will it? In that case: all you have to do is pray: I guess."}, {"index_hex": "2C1", "snes_addr": "B99D8E", "bank": "B9", "label": "Text_2C1_Diary_FeelSleepyNow", "category": "Diary", "text_preview": "...I feel sleepy now."}, {"index_hex": "2C2", "snes_addr": "B99DBA", "bank": "B9", "label": "Text_2C2_Dialog_Zzzzzzz", "category": "Dialog", "text_preview": "Zzzzzzz....."}, {"index_hex": "2C3", "snes_addr": "B99DD4", "bank": "B9", "label": "Text_2C3_Dialog_ThinkHaveGoodDreamTonight", "category": "Dialog", "text_preview": "I think I'll have a good dream tonight."}, {"index_hex": "2C4", "snes_addr": "B99E2A", "bank": "B9", "label": "Text_2C4_Romance_GoodEveningUmmWishweAlso", "category": "Romance", "text_preview": "Good evening. ....Umm:I wishwe could also spend some time together nextyear."}, {"index_hex": "2C5", "snes_addr": "B99ECA", "bank": "B9", "label": "Text_2C5_Dialog_LetsSingSongEnjoyYourselves", "category": "Dialog", "text_preview": "Let's sing a song. Enjoy yourselves,"}, {"index_hex": "2C6", "snes_addr": "B99F26", "bank": "B9", "label": "Text_2C6_Dialog_NowSingSomething", "category": "Dialog", "text_preview": "Now:you sing something,"}, {"index_hex": "2C7", "snes_addr": "B99F56", "bank": "B9", "label": "Text_2C7_Dialog_HappenedTonightCoincidentHappensToo", "category": "Dialog", "text_preview": "I happened to be here tonight...well..it's coincident...and she happens to be here too."}, {"index_hex": "2C8", "snes_addr": "B9A020", "bank": "B9", "label": "Text_2C8_Romance_AhGoodEveningNinaAlways", "category": "Romance", "text_preview": "Ah:good evening. Nina? She always goes somewhere alone. I wonder where she's been?"}, {"index_hex": "2C9", "snes_addr": "B9A0D4", "bank": "B9", "label": "Text_2C9_Dialog_CheersBeautifulSkyinNight", "category": "Dialog", "text_preview": "Cheers for the beautiful skyin the night,"}, {"index_hex": "2CA", "snes_addr": "B9A128", "bank": "B9", "label": "Text_2CA_Dialog_HavingFunCheersFateStar", "category": "Dialog", "text_preview": "Hi, Are you having fun? cheers for the fate of the star of having met you,"}, {"index_hex": "2CB", "snes_addr": "B9A1C8", "bank": "B9", "label": "Text_2CB_Romance_SeeSeeShootingStarEvery", "category": "Romance", "text_preview": "Did you see it? I see a shooting star every year. Don't tell anybody about this place. It's a secret between us. OK?"}, {"index_hex": "2CC", "snes_addr": "B9A2C2", "bank": "B9", "label": "Text_2CC_Romance_MakeWishNinaWishedTitter", "category": "Romance", "text_preview": "Did you make a wish? Nina wished... ..titter.. it's a secret."}, {"index_hex": "2CD", "snes_addr": "B9A350", "bank": "B9", "label": "Text_2CD_Dialog_TakeHotSpringBathWatching", "category": "Sign", "text_preview": "I take a hot spring bath: watching stars like this. It's just like paradise: isn't it?"}, {"index_hex": "2CE", "snes_addr": "B9A406", "bank": "B9", "label": "Text_2CE_Church_MayEverybodyLiveHappilyNow", "category": "Church", "text_preview": "May everybody live happily. Now let's pray together."}, {"index_hex": "2CF", "snes_addr": "B9A470", "bank": "B9", "label": "Text_2CF_Church_HavePrayedAlreadyAlsoImportant", "category": "Church", "text_preview": "Have you prayed already? Also it's important to choose a goal at the beginning of the year."}, {"index_hex": "2D0", "snes_addr": "B9A538", "bank": "B9", "label": "Text_2D0_Dialog_MayEarthGiveUsGifts", "category": "Dialog", "text_preview": "May the earth give us gifts this year too."}, {"index_hex": "2D1", "snes_addr": "B9A58E", "bank": "B9", "label": "Text_2D1_Dialog_YearTell", "category": "Dialog", "text_preview": "This...this year: I'll tell her..."}, {"index_hex": "2D2", "snes_addr": "B9A5D4", "bank": "B9", "label": "Text_2D2_Dialog_MayMyBusinessGoThisyear", "category": "Dialog", "text_preview": "May my business go well thisyear too."}, {"index_hex": "2D3", "snes_addr": "B9A620", "bank": "B9", "label": "Text_2D3_Town_AlrightTellingFortuneC", "category": "Town", "text_preview": "Alright: I'm telling your fortune. Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "2D4", "snes_addr": "B9A6AC", "bank": "B9", "label": "Text_2D4_Dialog_PickUpAnyCardLike", "category": "Dialog", "text_preview": "Pick up any card you like. Top Middle Bottom<CHOICE_OR_WAIT>d"}, {"index_hex": "2D5", "snes_addr": "B9A764", "bank": "B9", "label": "Text_2D5_Romance_ExcellentLuckGreatHarvestEverything", "category": "Romance", "text_preview": "\"Excellent luck\" Great harvest, Everything goes well,"}, {"index_hex": "2D6", "snes_addr": "B9A800", "bank": "B9", "label": "Text_2D6_Dialog_LuckFairHarvestPersonWaiting", "category": "Dialog", "text_preview": "\"Luck\" Fair harvest. The person you are waiting for will come."}, {"index_hex": "2D7", "snes_addr": "B9A88E", "bank": "B9", "label": "Text_2D7_Town_MisfortuneNothingTurnOutGood", "category": "Town", "text_preview": "\"Misfortune\" Nothing will turn out good."}, {"index_hex": "2D8", "snes_addr": "B9A8FE", "bank": "B9", "label": "Text_2D8_Romance_SeeBetterDevelopMywayMyself", "category": "Romance", "text_preview": "I see. I'd better develop myway by myself."}, {"index_hex": "2D9", "snes_addr": "B9A954", "bank": "B9", "label": "Text_2D9_Dialog_WhmmmGoingGoodYear", "category": "Dialog", "text_preview": "Whmmm:it's going to be good this year."}, {"index_hex": "2DA", "snes_addr": "B9A9A2", "bank": "B9", "label": "Text_2DA_Dialog_MayYearGoodYearfor", "category": "Dialog", "text_preview": "May this year be a good yearfor you."}, {"index_hex": "2DB", "snes_addr": "B9A9EC", "bank": "B9", "label": "Text_2DB_Dialog_SeeFirstSunriseBeginningYear", "category": "Dialog", "text_preview": "We should see the first sunrise at the beginning of the year."}, {"index_hex": "2DC", "snes_addr": "B9AA70", "bank": "B9", "label": "Text_2DC_Dialog_Best", "category": "Dialog", "text_preview": "well:do your best."}, {"index_hex": "2DD", "snes_addr": "B9AA96", "bank": "B9", "label": "Text_2DD_Animal_NowAnnualEggSearchinggameAutumn", "category": "Animal", "text_preview": "Now:the annual egg searchinggame in autumn, The rule is simple. The first person that finds the same colored egg as the one I show wins the game. May I begin now? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "2DE", "snes_addr": "B9AC36", "bank": "B9", "label": "Text_2DE_Dialog_GoFirstOne", "category": "Dialog", "text_preview": "Here we go, First one is this,"}, {"index_hex": "2DF", "snes_addr": "B9AC7A", "bank": "B9", "label": "Text_2DF_Dialog_ComeHurryUpTimeRunning", "category": "Dialog", "text_preview": "Come on, Hurry up, The time is running out."}, {"index_hex": "2E0", "snes_addr": "B9ACD2", "bank": "B9", "label": "Text_2E0_Dialog_BeatenThoseYoungKids", "category": "Dialog", "text_preview": "I won't be beaten by those young kids."}, {"index_hex": "2E1", "snes_addr": "B9AD22", "bank": "B9", "label": "Text_2E1_Dialog_PrizeJuice", "category": "Dialog", "text_preview": "Is the prize juice?"}, {"index_hex": "2E2", "snes_addr": "B9AD4A", "bank": "B9", "label": "Text_2E2_Dialog_SayWinnerGettheGreatPrize", "category": "Dialog", "text_preview": "They say the winner will getthe great prize."}, {"index_hex": "2E3", "snes_addr": "B9ADA4", "bank": "B9", "label": "Text_2E3_Dialog_LittleKidsNeedHandicap", "category": "Dialog", "text_preview": "Little kids need handicap."}, {"index_hex": "2E4", "snes_addr": "B9ADDA", "bank": "B9", "label": "Text_2E4_Dialog_AlrightTryWinYear", "category": "Dialog", "text_preview": "Alright:I'll try to win this year."}, {"index_hex": "2E5", "snes_addr": "B9AE28", "bank": "B9", "label": "Text_2E5_Town_HearPrizeSeedRareFlower", "category": "Town", "text_preview": "I hear the prize is a seed of the rare flower."}, {"index_hex": "2E6", "snes_addr": "B9AE88", "bank": "B9", "label": "Text_2E6_Dialog_IfExWereFindVery", "category": "Dialog", "text_preview": "If <CTRL_FFFD>ex were here:he would find it very quickly."}, {"index_hex": "2E7", "snes_addr": "B9AEEA", "bank": "B9", "label": "Text_2E7_Dialog_SameColorGetPointNext", "category": "Dialog", "text_preview": "Yes:that's the same color. You get <CTRL_B3> point. Next is this one,"}, {"index_hex": "2E8", "snes_addr": "B9AF6E", "bank": "B9", "label": "Text_2E8_Romance_GameOverAnnouncingWinnerEverybody", "category": "Romance", "text_preview": "OK:the game is over. I'm announcing the winner. Everybody:come here:please."}, {"index_hex": "2E9", "snes_addr": "B9B016", "bank": "B9", "label": "Text_2E9_Dialog_BingoCorrectNextOne", "category": "Dialog", "text_preview": "Bingo, You are correct. Next is this one,"}, {"index_hex": "2EA", "snes_addr": "B9B072", "bank": "B9", "label": "Text_2EA_Animal_WinnerYearsEggFestivalMr", "category": "Animal", "text_preview": "The winner of this year's Egg Festival is Mr. <CTRL_FFFD>ey,"}, {"index_hex": "2EB", "snes_addr": "B9B0F4", "bank": "B9", "label": "Text_2EB_Sign_YearsPrizeFodderOneWhole", "category": "Sign", "text_preview": "This year's prize is the fodder for one whole month, I'll deliver it to your ranch."}, {"index_hex": "2EC", "snes_addr": "B9B1A2", "bank": "B9", "label": "Text_2EC_Dialog_CongratulationsDeliverPrizeHome", "category": "Dialog", "text_preview": "Congratulations, I'll deliver the prize to your home."}, {"index_hex": "2ED", "snes_addr": "B9B21E", "bank": "B9", "label": "Text_2ED_Romance_NowEverybodyLetsBestYear", "category": "Romance", "text_preview": "Now:everybody:let's do our best this year too,"}, {"index_hex": "2EE", "snes_addr": "B9B27E", "bank": "B9", "label": "Text_2EE_Dialog_HumiliatingYoungMen", "category": "Dialog", "text_preview": "How humiliating you are: young men."}, {"index_hex": "2EF", "snes_addr": "B9B2CC", "bank": "B9", "label": "Text_2EF_Dialog_PhewLikeUsually", "category": "Dialog", "text_preview": "Phew: I just couldn't do it like I usually do."}, {"index_hex": "2F0", "snes_addr": "B9B32A", "bank": "B9", "label": "Text_2F0_Dialog_HicHaveCome", "category": "Dialog", "text_preview": "Hic...shouldn't have come here."}, {"index_hex": "2F1", "snes_addr": "B9B36E", "bank": "B9", "label": "Text_2F1_Dialog_PuffPuff", "category": "Dialog", "text_preview": "Puff-puff."}, {"index_hex": "2F2", "snes_addr": "B9B384", "bank": "B9", "label": "Text_2F2_Dialog_PuffPuffSpeakMe", "category": "Dialog", "text_preview": "Puff-puff...don't...speak...to me...please?"}, {"index_hex": "2F3", "snes_addr": "B9B3DC", "bank": "B9", "label": "Text_2F3_Town_SeedFlowerWhoSaid", "category": "Town", "text_preview": "Hey:it's not a seed of a flower. Who said that?"}, {"index_hex": "2F4", "snes_addr": "B9B442", "bank": "B9", "label": "Text_2F4_Dialog_PhewGoodHealthyBodyExercise", "category": "Dialog", "text_preview": "Phew:it's good for healthy body to do exercise sometimes."}, {"index_hex": "2F5", "snes_addr": "B9B4C8", "bank": "B9", "label": "Text_2F5_Festival_NewYearsFestivalLetsGo", "category": "Festival", "text_preview": "New Year's Festival, Let's go see the first sunrise,"}, {"index_hex": "2F6", "snes_addr": "B9B534", "bank": "B9", "label": "Text_2F6_Manual_SeedGrassThisgrassGrowsWithout", "category": "Manual", "text_preview": "That's a seed of grass. Thisgrass grows without watering. It's <$00B7><CTRL_B2><CTRL_B2>G. Want it? Buy Not buy Money <CTRL_FFFC>hv<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "2F7", "snes_addr": "B9B66E", "bank": "B9", "label": "Text_2F7_Dialog_ThankDeliverShed", "category": "Dialog", "text_preview": "Thank you. I'll deliver it to your shed."}, {"index_hex": "2F8", "snes_addr": "B9B6C2", "bank": "B9", "label": "Text_2F8_Dialog_ThankVeryMuch", "category": "Dialog", "text_preview": "Thank you very much."}, {"index_hex": "2F9", "snes_addr": "B9B6EC", "bank": "B9", "label": "Text_2F9_Dialog_AhHaveEnoughMoney", "category": "Dialog", "text_preview": "Ah:you don't have enough money for it."}, {"index_hex": "2FA", "snes_addr": "B9B740", "bank": "B9", "label": "Text_2FA_Dialog_ThankComeVisitMeAgain", "category": "Dialog", "text_preview": "Thank you. Come visit me again."}, {"index_hex": "2FB", "snes_addr": "B9B786", "bank": "B9", "label": "Text_2FB_Manual_BuyingCowThenGiveBell", "category": "Manual", "text_preview": "Will you be buying a cow? Then I'll give you this bell. Cows gather when they hear the sound of this bell. But don't ring it so often. It makes you tired. Well: I'll deliver it with the cow."}, {"index_hex": "2FC", "snes_addr": "B9B924", "bank": "B9", "label": "Text_2FC_Shop_SpecialPaintHouseOnlyG", "category": "Sign", "text_preview": "It's the special paint for the house only. It's <CTRL_B3><$00B7><CTRL_B2><CTRL_B2>G but do you want to buy it? Yes No Money <CTRL_FFFC>hw<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "2FD", "snes_addr": "B9BA58", "bank": "B9", "label": "Text_2FD_Dialog_ThankDeliverShed", "category": "Dialog", "text_preview": "Thank you. I'll deliver it to your shed."}, {"index_hex": "2FE", "snes_addr": "B9BAAC", "bank": "B9", "label": "Text_2FE_Dialog_GoodStuffThough", "category": "Dialog", "text_preview": "It's good stuff though."}, {"index_hex": "2FF", "snes_addr": "B9BADC", "bank": "B9", "label": "Text_2FF_Dialog_HaveEnoughMoney", "category": "Dialog", "text_preview": "Oh:you don't have enough money for it."}, {"index_hex": "300", "snes_addr": "B9BB30", "bank": "B9", "label": "Text_300_Animal_HorseHasBecomeBigMade", "category": "Animal", "text_preview": "Oh:your horse has become big. I made saddle bags for your horse. Just put the shipping items in the saddle bags. It'll bevery convenient since your horse will carry them for you."}, {"index_hex": "301", "snes_addr": "B9BCA0", "bank": "B9", "label": "Text_301_Animal_MedicineCowsSickHealsOnly", "category": "Animal", "text_preview": "That's medicine for the cows. Are they sick? It heals only by using it for the cows. the price is...mmm...<CTRL_B3><CTRL_B2><CTRL_B2><CTRL_B2>G. You usually have to take good care of them. Buy Not buy Money <CTRL_FFFC>hx"}, {"index_hex": "302", "snes_addr": "B9BE94", "bank": "B9", "label": "Text_302_Dialog_DeliverShed", "category": "Dialog", "text_preview": "I'll deliver it to your shed."}, {"index_hex": "303", "snes_addr": "B9BED8", "bank": "B9", "label": "Text_303_Dialog_Aha", "category": "Dialog", "text_preview": "Aha,"}, {"index_hex": "304", "snes_addr": "B9BEE2", "bank": "B9", "label": "Text_304_Diary_HaveEnoughMoneyComeBack", "category": "Diary", "text_preview": "What? You don't have enough money. Come back again when you have saved enough money."}, {"index_hex": "305", "snes_addr": "B9BF8C", "bank": "B9", "label": "Text_305_Animal_WantTodayBuyCowSell", "category": "Animal", "text_preview": "Hi: what do you want today? Buy a cow Sell a cow Buy a chicken Sell a chicken<CHOICE_OR_WAIT>e"}, {"index_hex": "306", "snes_addr": "B9C056", "bank": "B9", "label": "Text_306_Animal_NeedHaveMoreGrassRaise", "category": "Animal", "text_preview": "You need to have more grass to raise livestock."}, {"index_hex": "307", "snes_addr": "B9C0B6", "bank": "B9", "label": "Text_307_Animal_CowCostsGBuyingOne", "category": "Animal", "text_preview": "A cow costs <$00B7><CTRL_B2><CTRL_B2><CTRL_B2>G so will you be buying one? Buy Not buy Money <CTRL_FFFC>hy<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "308", "snes_addr": "B9C1A2", "bank": "B9", "label": "Text_308_Dialog_DeliverPen", "category": "Dialog", "text_preview": "I'll deliver it to your pen."}, {"index_hex": "309", "snes_addr": "B9C1DC", "bank": "B9", "label": "Text_309_Animal_IfWantSellCowsAgain", "category": "Animal", "text_preview": "If you want to sell cows again:please contact me. Bye,"}, {"index_hex": "30A", "snes_addr": "B9C256", "bank": "B9", "label": "Text_30A_Animal_ChickenCostsGButWant", "category": "Animal", "text_preview": "A chicken costs <CTRL_B3><CTRL_B2><CTRL_B2><CTRL_B2>G but do you want one? Buy Not buy Money <CTRL_FFFC>hz<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "30B", "snes_addr": "B9C33E", "bank": "B9", "label": "Text_30B_Dialog_ComePickUpLaterLet", "category": "Dialog", "text_preview": "OK:I'll come pick it up later so let it be at the entrance of your ranch today."}, {"index_hex": "30C", "snes_addr": "B9C3EA", "bank": "B9", "label": "Text_30C_Animal_PutCowPenTakeGood", "category": "Animal", "text_preview": "Hey:I put the cow in the pen. Take good care. Alright:the first thing is to name it with affection. Bye,"}, {"index_hex": "30D", "snes_addr": "B9C4D2", "bank": "B9", "label": "Text_30D_Animal_EvenThinkSellingCowCondition", "category": "Animal", "text_preview": "Hey you:don't even think of selling a cow in this condition. Consider it again."}, {"index_hex": "30E", "snes_addr": "B9C57E", "bank": "B9", "label": "Text_30E_Shipping_CostsEaGWanttoSell", "category": "Shipping", "text_preview": "It costs <CTRL_FFFC>eA<CTRL_B2>G. Do you wantto sell it? Sell Not sell Money <CTRL_FFFC>hB<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "30F", "snes_addr": "B9C65A", "bank": "B9", "label": "Text_30F_Dialog_TakeMe", "category": "Dialog", "text_preview": "OK, I'll take it with me."}, {"index_hex": "310", "snes_addr": "B9C68E", "bank": "B9", "label": "Text_310_Dialog_AcceptUntilItsgrownMore", "category": "Dialog", "text_preview": "I can't accept it until it'sgrown more."}, {"index_hex": "311", "snes_addr": "B9C6DE", "bank": "B9", "label": "Text_311_Dialog_OutsideTakeWithyouItllEat", "category": "Dialog", "text_preview": "It's outside so take it withyou. It'll eat grass by himself so let it be outside. But once it's in the pen:feed it properly."}, {"index_hex": "312", "snes_addr": "B9C7E4", "bank": "B9", "label": "Text_312_Manual_MilkerMilkUsingTowardCow", "category": "Manual", "text_preview": "It's a milker. You can milk by using it toward a cow. It's <CTRL_B3><$00BA><CTRL_B2><CTRL_B2>G. Buy Not buy Money <CTRL_FFFC>hC<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "313", "snes_addr": "B9C8FA", "bank": "B9", "label": "Text_313_Dialog_SorryButAccept", "category": "Dialog", "text_preview": "Sorry but we can't accept that."}, {"index_hex": "314", "snes_addr": "B9C93E", "bank": "B9", "label": "Text_314_Manual_BrushCowsBecomeHappyBrush", "category": "Manual", "text_preview": "It's a brush for cows. They become happy when you brush them with affection. Once a day is enough. It's <$00BA><CTRL_B2><CTRL_B2>G. Buy Not buy Money <CTRL_FFFC>hD<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "315", "snes_addr": "B9CAB4", "bank": "B9", "label": "Text_315_Animal_FatherHeavenHelpPreciousCow", "category": "Animal", "text_preview": "Our Father in Heaven:please help his precious cow rest."}, {"index_hex": "316", "snes_addr": "B9CB24", "bank": "B9", "label": "Text_316_Animal_IdiotTellTakeCareCows", "category": "Animal", "text_preview": "...Are you an idiot? Didn't I tell you to take care of cows carefully? If they become sick next time:give them the medicine right away."}, {"index_hex": "317", "snes_addr": "B9CC3C", "bank": "B9", "label": "Text_317_Dialog_GreatCalfWasBornName", "category": "Dialog", "text_preview": "Great, A calf was born, OK: I'll name it."}, {"index_hex": "318", "snes_addr": "B9CC90", "bank": "B9", "label": "Text_318_Dialog_CalfAlrightName", "category": "Dialog", "text_preview": "What? .....a calf, Alright: I'll name it."}, {"index_hex": "319", "snes_addr": "B9CCE4", "bank": "B9", "label": "Text_319_Dialog_Name", "category": "Dialog", "text_preview": "Its name is ..... you do it."}, {"index_hex": "31A", "snes_addr": "B9CD1E", "bank": "B9", "label": "Text_31A_Shipping_AllShippingtodayCostsGIntotal", "category": "Shipping", "text_preview": "Is that all you are shippingtoday? It costs <CTRL_FFFC>hE<CTRL_B2>G intotal. I'll put money in the box tomorrow."}, {"index_hex": "31B", "snes_addr": "B9CDDC", "bank": "B9", "label": "Text_31B_Shipping_ShippingTodayBye", "category": "Shipping", "text_preview": "Is there no shipping today? OK:bye."}, {"index_hex": "31C", "snes_addr": "B9CE24", "bank": "B9", "label": "Text_31C_Sign_BusinessHoursWeekdayPmWeekend", "category": "Sign", "text_preview": "Business hours Weekday: <$00B9>:<CTRL_B2><CTRL_B2>am - <$00B7>:<CTRL_B2><CTRL_B2>pm Weekend <$0040> holiday: closed"}, {"index_hex": "31D", "snes_addr": "B9CEC8", "bank": "B9", "label": "Text_31D_Dialog_ThrowThingsSpring", "category": "Dialog", "text_preview": "Don't throw things in the spring."}, {"index_hex": "31E", "snes_addr": "B9CF10", "bank": "B9", "label": "Text_31E_Manual_GoddessSpringExpectMeCome", "category": "Manual", "text_preview": "Hi, How do you do? I'm Goddess of Spring. Did you expect me to come out? By the way:I have a question. Is this gold axe the one you dropped.? Yes No<CHOICE_OR_WAIT>c"}, {"index_hex": "31F", "snes_addr": "B9D08C", "bank": "B9", "label": "Text_31F_Church_LyingYoursThisoneGodKnows", "category": "Church", "text_preview": "You are lying. Yours is thisone. No:God knows everything. Bye."}, {"index_hex": "320", "snes_addr": "B9D11E", "bank": "B9", "label": "Text_320_Manual_FoundHonestPersonGivingThisgold", "category": "Manual", "text_preview": "Oh yes:I've found an honest person,, I'm giving you thisgold axe. ...No:you don't have to thank me. I'm so happy to meet someone honest like you. Bye now. Keep up with your work."}, {"index_hex": "321", "snes_addr": "B9D292", "bank": "B9", "label": "Text_321_Manual_ExcuseMeButBorrowHammer", "category": "Manual", "text_preview": "Excuse me but can I borrow your hammer? OK No<CHOICE_OR_WAIT>c"}, {"index_hex": "322", "snes_addr": "B9D326", "bank": "B9", "label": "Text_322_Animal_ThankPutMorePowerReturn", "category": "Animal", "text_preview": "Thank you. I'll put it more power when I return it."}, {"index_hex": "323", "snes_addr": "B9D38E", "bank": "B9", "label": "Text_323_Dialog_AskAnyMore", "category": "Dialog", "text_preview": "What? I won't ask you any more,"}, {"index_hex": "324", "snes_addr": "B9D3D2", "bank": "B9", "label": "Text_324_Animal_PlowFieldBeforeSpringBut", "category": "Animal", "text_preview": "You can plow the field before spring. But I hear it's a little damaged when it comes to spring."}, {"index_hex": "325", "snes_addr": "B9D4A0", "bank": "B9", "label": "Text_325_Dialog_HasRanchBecomeLively", "category": "Dialog", "text_preview": "How do you do? Has your ranch become lively?"}, {"index_hex": "326", "snes_addr": "B9D502", "bank": "B9", "label": "Text_326_Dialog_GoOut", "category": "Dialog", "text_preview": "You can go out from here."}, {"index_hex": "327", "snes_addr": "B9D536", "bank": "B9", "label": "Text_327_Manual_RanchUseSickleTheshedHows", "category": "Manual", "text_preview": "Hey:are you from the ranch? Do you use the sickle in theshed? How's it working? Very good Don't use it often<CHOICE_OR_WAIT>c"}, {"index_hex": "328", "snes_addr": "B9D614", "bank": "B9", "label": "Text_328_Dialog_WowMadeHappyMakeBetter", "category": "Dialog", "text_preview": "Wow, I made it.I'm so happy.I'll make it better. Look forward to it."}, {"index_hex": "329", "snes_addr": "B9D6AC", "bank": "B9", "label": "Text_329_Dialog_UseMadeAllMyEnergy", "category": "Dialog", "text_preview": "Really? Don't you use it? I made it with all my energy,"}, {"index_hex": "32A", "snes_addr": "B9D72C", "bank": "B9", "label": "Text_32A_Dialog_ByeBye", "category": "Dialog", "text_preview": "Bye-Bye."}, {"index_hex": "32B", "snes_addr": "B9D73E", "bank": "B9", "label": "Text_32B_Dialog_GiGiveMeSomethingEat", "category": "Dialog", "text_preview": "Gi....give me something to eat."}, {"index_hex": "32C", "snes_addr": "B9D780", "bank": "B9", "label": "Text_32C_Mountain_MushroomIfPossibleWantaMushroom", "category": "Sign", "text_preview": "Mushroom if possible. I wanta mushroom....."}, {"index_hex": "32D", "snes_addr": "B9D7D8", "bank": "B9", "label": "Text_32D_Dialog_PhewAliveNowThankVery", "category": "Dialog", "text_preview": "Phew:I'm alive now. Thank you very much. I didn't eat anything for <CTRL_B5> days. I need to give you something. Take a look in the shed tomorrow."}, {"index_hex": "32E", "snes_addr": "B9D908", "bank": "B9", "label": "Text_32E_Mountain_PoisonousMushroomKillKnow", "category": "Sign", "text_preview": "That's a poisonous mushroom,It will kill you:you know."}, {"index_hex": "32F", "snes_addr": "B9D976", "bank": "B9", "label": "Text_32F_Mountain_MashMushroomWantNothingBut", "category": "Sign", "text_preview": "mash..mushroom... I want nothing but a mushroom."}, {"index_hex": "330", "snes_addr": "B9D9DE", "bank": "B9", "label": "Text_330_Dialog_StopRabbitMineDoingLet", "category": "Dialog", "text_preview": "Stop that,, That rabbit is mine. What are you doing to it? Let it loose Just watching<CHOICE_OR_WAIT>c"}, {"index_hex": "331", "snes_addr": "B9DAB4", "bank": "B9", "label": "Text_331_Shop_IfBuyGWantPay", "category": "Sign", "text_preview": "If you buy it with <CTRL_B3><CTRL_B2><CTRL_B2><CTRL_B2>G: you can do what you want. Pay Not pay Money <CTRL_FFFC>gF<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "332", "snes_addr": "B9DBAE", "bank": "B9", "label": "Text_332_Dialog_LiveLikeBye", "category": "Dialog", "text_preview": "I live like this. Bye."}, {"index_hex": "333", "snes_addr": "B9DBDC", "bank": "B9", "label": "Text_333_Romance_SeeKindWantMoneyBut", "category": "Romance", "text_preview": "I see...you are kind. I don't want money. But Everybody lives differently. Please understand it. Bye."}, {" xpensive: huh? Buy Don't buy Money <CTRL_FFFC>hG<CTRL_B2>G<CHOICE_O"}, {"index_hex": "33C", "snes_addr": "B9E408", "bank": "B9", "label": "Text_33C_Manual_TomatoSeedEconomicalBecauseEven", "category": "Manual", "text_preview": "It's a tomato seed. It's economical because even after the harvest: you can have tomatoes if youkeep watering. It's <CTRL_B5><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hH<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "33D", "snes_addr": "B9E598", "bank": "B9", "label": "Text_33D_Animal_PotatoSeedHarvestLeavesBecome", "category": "Animal", "text_preview": "That's a potato seed. You can harvest it when the leaves become big. It's <CTRL_B4><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hI<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "33E", "snes_addr": "B9E6D2", "bank": "B9", "label": "Text_33E_Shipping_TurnipSeedTakeLongHarvest", "category": "Shipping", "text_preview": "That's a turnip seed. It doesn't take you long to harvest so it's very convenient. The price is <CTRL_B4><CTRL_B2><CTRL_B2>G: convenient too: huh? Buy Don't buy Money <CTRL_FFFC>hJ<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "33F", "snes_addr": "B9E868", "bank": "B9", "label": "Text_33F_Manual_CornSeedTakestheLongestTime", "category": "Manual", "text_preview": "That's a corn seed. It takesthe longest time to harvest but sells at a higher. Also you can have some corn if you keep watering them after the harvest. It's <CTRL_B5><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hK"}, {"index_hex": "340", "snes_addr": "B9EA40", "bank": "B9", "label": "Text_340_Shipping_FlowerBloomsOneDayBut", "category": "Shipping", "text_preview": "That's a flower. It just blooms one day but it's goodfor a present. OK: it's <CTRL_B5><CTRL_B2><CTRL_B2>G: the discounted price, Buy Don't buy Money <CTRL_FFFC>hL<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "341", "snes_addr": "B9EBAA", "bank": "B9", "label": "Text_341_Sign_FeedCowsFeedingsPerBag", "category": "Sign", "text_preview": "That's feed for cows. <CTRL_B3><CTRL_B4> feedings per bag but you better feed them fodder as much as possible. It costs <CTRL_B3><CTRL_B2><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hM<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "342", "snes_addr": "B9ED36", "bank": "B9", "label": "Text_342_Sign_FeedChickensFeedingsPerBag", "category": "Sign", "text_preview": "It's feed for chickens. <CTRL_B3><CTRL_B4> feedings per bag. Use it when you don't have enough fodder but generally you'd better feed them fodder. It costs <CTRL_B5><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hN<"}, {"index_hex": "343", "snes_addr": "B9EEF8", "bank": "B9", "label": "Text_343_Manual_SprinklerWaterVeryQuicklyCheap", "category": "Manual", "text_preview": "It's a sprinkler. You can water with it very quickly, It's really cheap. If you trade your watering can in: we can sell it for <CTRL_B4><CTRL_B2><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hO<CTRL_B2>G<CHOICE_OR_"}, {"index_hex": "344", "snes_addr": "B9F09A", "bank": "B9", "label": "Text_344_Manual_SuperSickleInventedIfTrade", "category": "Manual", "text_preview": "That's a super sickle. I invented it. If you trade your sickle in: we can sell it for <CTRL_B4><CTRL_B2><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hP<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "345", "snes_addr": "B9F1EC", "bank": "B9", "label": "Text_345_Manual_SuperHoeVeryPowerfulIf", "category": "Manual", "text_preview": "That's a super hoe. It's very powerful. If you trade your hoe in: we can sell it for <CTRL_B4><CTRL_B2><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hQ<CTRL_B2>G<CHOICE_OR_WAIT>c"}, {"index_hex": "346", "snes_addr": "B9F338", "bank": "B9", "label": "Text_346_Manual_SuperHammerKnockBigRock", "category": "Manual", "text_preview": "That's a super hammer. It can knock a big rock down. Don't you want it? If you trade your hammer in:we can sell it for <CTRL_B4><CTRL_B2><CTRL_B2><CTRL_B2>G. Buy Don't buy Money <CTRL_FFFC>hR<CTRL_B2>G<CHOIC r": "BAB02E", "bank": "BA", "label": "Text_3B5_Dialog_GladGivingMeNeatPresent", "category": "Dialog", "text_preview": "So glad. Are you giving me this neat present? Thank you."}, {"index_hex": "3B6", "snes_addr": "BAB0B4", "bank": "BA", "label": "Text_3B6_Shop_TakeCareIfBuyLot", "category": "Sign", "text_preview": "You can't take care of them if you buy a lot of them at a time. Drop by later again."}, {"index_hex": "3B7", "snes_addr": "BAB15E", "bank": "BA", "label": "Text_3B7_Animal_BeingCrowdedMakesLivestockStressed", "category": "Animal", "text_preview": "Being crowded makes livestock stressed. That's enough for now:you know."}, {"index_hex": "3B8", "snes_addr": "BAB200", "bank": "BA", "label": "Text_3B8_Dialog_Want", "category": "Dialog", "text_preview": "I don't want it."}, {"index_hex": "3B9", "snes_addr": "BAB222", "bank": "BA", "label": "Text_3B9_Dialog_Trouble", "category": "Dialog", "text_preview": "I could be in trouble."}, {"index_hex": "3BA", "snes_addr": "BAB250", "bank": "BA", "label": "Text_3BA_Dialog_WhatIsThis", "category": "Dialog", "text_preview": "What is this?"}, {"index_hex": "3BB", "snes_addr": "BAB26C", "bank": "BA", "label": "Text_3BB_Dialog_TakeKindofStuff", "category": "Dialog", "text_preview": "What? I can't take this kindof stuff."}, {"index_hex": "3BC", "snes_addr": "BAB2B8", "bank": "BA", "label": "Text_3BC_Dialog_GiveMe", "category": "Dialog", "text_preview": "What? Do you give it to me?"}, {"index_hex": "3BD", "snes_addr": "BAB2F0", "bank": "BA", "label": "Text_3BD_Shipping_PutThingsWantSellTable", "category": "Shipping", "text_preview": "Put things you want to sell on the table."}, {"index_hex": "3BE", "snes_addr": "BAB344", "bank": "BA", "label": "Text_3BE_Weather_GettingColderWhenitRainsWinter", "category": "Weather", "text_preview": "Hi. It's getting colder whenit rains. In winter:grass will freeze so you'd better weed them now."}, {"index_hex": "3BF", "snes_addr": "BAB40A", "bank": "BA", "label": "Text_3BF_Romance_AhMrEcWantMaria", "category": "Romance", "text_preview": "Ah:Mr. <CTRL_FFFD>eC You want to....well....to Maria...anyway:good luck."}, {"index_hex": "3C0", "snes_addr": "BAB4AC", "bank": "BA", "label": "Text_3C0_Romance_MariaDoingLetMeKnow", "category": "Romance", "text_preview": "Is Maria doing OK? Let me know if you are in trouble."}, {"index_hex": "3C1", "snes_addr": "BAB52E", "bank": "BA", "label": "Text_3C1_Romance_MariaOftenTalksaboutLately", "category": "Romance", "text_preview": "Oh: Hello. Maria often talksabout you lately."}, {"index_hex": "3C2", "snes_addr": "BAB58A", "bank": "BA", "label": "Text_3C2_Animal_AfterAllGirlHappiestwhenSomeone", "category": "Animal", "text_preview": "After all:a girl is happiestwhen she is with someone shelikes. Me? Of course:I'm happy."}, {"index_hex": "3C3", "snes_addr": "BAB63A", "bank": "BA", "label": "Text_3C3_Romance_MrComeOftenbutWantHave", "category": "Romance", "text_preview": "Mr. ...: you come here oftenbut you don't want to have achat with me:do you? I see... maybe it's Ann?"}, {"index_hex": "3C4", "snes_addr": "BAB706", "bank": "BA", "label": "Text_3C4_Romance_HowsAnnDoingWorkingAs", "category": "Romance", "text_preview": "How's Ann doing? Is she working well as a good wife?I'm so very worried about her..."}, {"index_hex": "3C5", "snes_addr": "BAB7B8", "bank": "BA", "label": "Text_3C5_Romance_NinaLikesSweetsSuchAs", "category": "Romance", "text_preview": "Nina likes sweets:such as cakes and berries of Fullmoon Plant. I like that one."}, {"index_hex": "3C6", "snes_addr": "BAB86A", "bank": "BA", "label": "Text_3C6_Mountain_HoHoHoHowsNina", "category": "Sign", "text_preview": "Ho-ho-ho:how's Nina doing? Doesn't she bother you by saying something selfish?"}, {"index_hex": "3C7", "snes_addr": "BAB90E", "bank": "BA", "label": "Text_3C7_Romance_IfWantWifeChooseGirl", "category": "Romance", "text_preview": "If you want a wife:choose a girl who likes children. Girls like that can have many children."}, {"index_hex": "3C8", "snes_addr": "BAB9CE", "bank": "BA", "label": "Text_3C8_Romance_LookLittleHeavierYoutEllen", "category": "Romance", "text_preview": "What? You look a little heavier:don't yout? Ellen is just like me: she is not only a pretty girl but also can cook very well."}, {"index_hex": "3C9", "snes_addr": "BABAE8", "bank": "BA", "label": "Text_3C9_Romance_LotThingsHappenWhileAlive", "category": "Romance", "text_preview": "Oh well:a lot of things happen while you are alive. You just couldn't go through your life if you gotmad at everything."}, {"index_hex": "3CA", "snes_addr": "BABBE0", "bank": "BA", "label": "Text_3CA_Dialog_CarryJokestoFar", "category": "Dialog", "text_preview": "Hey you:you carry your jokesto far."}, {"index_hex": "3CB", "snes_addr": "BABC28", "bank": "BA", "label": "Text_3CB_Animal_ThinkPeopleWhoCheatWho", "category": "Animal", "text_preview": "When I think of people who cheat and who are cheated: I suppose being cheated is kind of happier than cheating someone. I do think so."}, {"index_hex": "3CC", "snes_addr": "BABD56", "bank": "BA", "label": "Text_3CC_Romance_MostImportantThingLifeProbably", "category": "Romance", "text_preview": "The most important thing in life is probably having someone you love beside you."}, {"index_hex": "3CD", "snes_addr": "BABE00", "bank": "BA", "label": "Text_3CD_Romance_HaveHeardBlueFeatherGrandma", "category": "Romance", "text_preview": "Have you heard of Blue Feather? Grandma never tellsme what it is: saying kids don't need to know ."}, {"index_hex": "3CE", "snes_addr": "BABED4", "bank": "BA", "label": "Text_3CE_Dialog_FemalePsychologyComplicated", "category": "Dialog", "text_preview": "Female psychology is complicated."}, {"index_hex": "3CF", "snes_addr": "BABF26", "bank": "BA", "label": "Text_3CF_Manual_PrettyHardMoveCowsAs", "category": "Manual", "text_preview": "It's pretty hard to move cows as you intend. Well:it takes time and guts to do it properly. I'm now the cowmaster. I want to show you my bell skills"}, {"index_hex": "3D0", "snes_addr": "BAC05A", "bank": "BA", "label": "Text_3D0_Animal_DealingLivestocktodayBecomeSickOutside", "category": "Animal", "text_preview": "I won't be dealing livestocktoday. They could become sick outside on a day like today. Some other time."}, {"index_hex": "3D1", "snes_addr": "BAC130", "bank": "BA", "label": "Text_3D1_Sign_SeeSunsetTopMountainFeel", "category": "Sign", "text_preview": "When you see the sunset at the top of the mountain: don't you feel like it's saying something to you?"}, {"index_hex": "3D2", "snes_addr": "BAC204", "bank": "BA", "label": "Text_3D2_Romance_EveKindGirlComesOften", "category": "Romance", "text_preview": "Eve is a kind girl. She comes here often to be in mycompany. But she talks about nothing but you recently."}, {"index_hex": "3D3", "snes_addr": "BAC2E2", "bank": "BA", "label": "Text_3D3_Romance_HowsEveDoingSeeGood", "category": "Romance", "text_preview": "How's Eve doing? Oh:I see. That's good. She easily becomes lonely."}, {"index_hex": "3D4", "snes_addr": "BAC372", "bank": "BA", "label": "Text_3D4_Town_SisterPinkScoldIfPicked", "category": "Town", "text_preview": "Sister Pink would scold you if you picked too much flowers and plants."}, {"index_hex": "3D5", "snes_addr": "BAC40A", "bank": "BA", "label": "Text_3D5_Romance_BigHouseNecessaryIfWant", "category": "Romance", "text_preview": "A big house is necessary if you want to get married."}, {"index_hex": "3D6", "snes_addr": "BAC474", "bank": "BA", "label": "Text_3D6_Dialog_GatherLogsWinterToo", "category": "Dialog", "text_preview": "You can gather logs in winter too."}, {"index_hex": "3D7", "snes_addr": "BAC4C4", "bank": "BA", "label": "Text_3D7_Dialog_HowdyHaveJuicePartyHome", "category": "Dialog", "text_preview": "Howdy, Why don't you have a juice party at home sometimes?"}, {"index_hex": "3D8", "snes_addr": "BAC54A", "bank": "BA", "label": "Text_3D8_Animal_GotMarriedWorkHarderBad", "category": "Animal", "text_preview": "You got married and work harder. It's not a bad thingbut she gets in a bad mood when you come home late."}, {"index_hex": "3D9", "snes_addr": "BAC62A", "bank": "BA", "label": "Text_3D9_Dialog_HappyMan", "category": "Dialog", "text_preview": "Hey:happy man,,"}, {"index_hex": "3DA", "snes_addr": "BAC64A", "bank": "BA", "label": "Text_3DA_Romance_MarriedCuteWifeHuhIf", "category": "Romance", "text_preview": "You are married to a cute wife:huh? If you want kids: you have to move to a bigger house."}, {"index_hex": "3DB", "snes_addr": "BAC702", "bank": "BA", "label": "Text_3DB_Sign_HaveSeenRareBerrythatGrows", "category": "Sign", "text_preview": "Have you seen the rare berrythat grows at the top of themountain?"}, {"index_hex": "3DC", "snes_addr": "BAC786", "bank": "BA", "label": "Text_3DC_Animal_FestivalEndsSoyouMustGo", "category": "Animal", "text_preview": "The festival ends at <CTRL_B5>:<CTRL_B2><CTRL_B2> soyou must go by then. The sky is colored red by the sun at <CTRL_B5>:<CTRL_B2><CTRL_B2>."}, {"index_hex": "3DD", "snes_addr": "BAC84C", "bank": "BA", "label": "Text_3DD_Romance_CustomersDifferentMonthlySomePeople", "category": "Romance", "text_preview": "Our customers are different monthly. Some people have never been here."}, {"index_hex": "3DE", "snes_addr": "BAC8DE", "bank": "BA", "label": "Text_3DE_Romance_HowsEveDoingBusinessHas", "category": "Romance", "text_preview": "Hi:how's Eve doing? Business has been down sincewe lost our drawing card."}, {"index_hex": "3DF", "snes_addr": "BAC982", "bank": "BA", "label": "Text_3DF_Town_AdultsCryBecauseNothingCry", "category": "Town", "text_preview": "Why don't adults cry? Is it because there is nothing to cry about: or is it because people become stronger?"}, {"index_hex": "3E0", "snes_addr": "BACA62", "bank": "BA", "label": "Text_3E0_Romance_BoringBecauseMariasGone", "category": "Romance", "text_preview": "It's boring because Maria's gone."}, {"index_hex": "3E1", "snes_addr": "BACAA6", "bank": "BA", "label": "Text_3E1_Romance_HardestThingControlisLoveBetween", "category": "Romance", "text_preview": "The hardest thing to controlis love between man and woman."}, {"index_hex": "3E2", "snes_addr": "BACB24", "bank": "BA", "label": "Text_3E2_Dialog_MarriageWonderfulBravelyAskMarry", "category": "Dialog", "text_preview": "Yes:marriage is wonderful. Should I bravely ask her to marry me?"}, {"index_hex": "3E3", "snes_addr": "BACBA8", "bank": "BA", "label": "Text_3E3_Dialog_YoudBetterGoHomeYourwife", "category": "Dialog", "text_preview": "You'd better go home to yourwife."}, {"index_hex": "3E4", "snes_addr": "BACBEC", "bank": "BA", "label": "Text_3E4_Dialog_MakeWifeCryGoHome", "category": "Dialog", "text_preview": "Don't make your wife cry. Go home earlier."}, {"index_hex": "3E5", "snes_addr": "BACC46", "bank": "BA", "label": "Text_3E5_Romance_TellOnlyDadSecretlyWhich", "category": "Romance", "text_preview": "Will you tell it to only your dad secretly? Which girl are you most interes ted in now? Maria Ann Nina Ellen Eve<CHOICE_OR_WAIT>f"}, {"index_hex": "3E6", "snes_addr": "BACD7E", "bank": "BA", "label": "Text_3E6_Church_AhaMariaShesChurchSaturdays", "category": "Church", "text_preview": "aha:Maria. She's at church on Saturdays and Sundays. Flower is the best present. Man has to be active. Come on. Hee-hee-hee."}, {"index_hex": "3E7", "snes_addr": "BACE88", "bank": "BA", "label": "Text_3E7_Festival_AnnGoesAloneSpaStar", "category": "Festival", "text_preview": "Oh:Ann. She goes alone to the spa on Star Night Festival day. The Lucky day is Saturday. She likes any presents except mushrooms."}, {"index_hex": "3E8", "snes_addr": "BACFA8", "bank": "BA", "label": "Text_3E8_Sign_NinaGoesPickingHerbsSaturdays", "category": "Sign", "text_preview": "Hey:Nina. She goes picking herbs on Saturdays and to the mountains on Sunday. She likes sweets. Don't pickflowers for her."}, {"index_hex": "3E9", "snes_addr": "BAD0A4", "bank": "BA", "label": "Text_3E9_Dialog_FaceBecomingBetterLooking", "category": "Dialog", "text_preview": "Hey:your face is becoming better looking."}, {"index_hex": "3EA", "snes_addr": "BAD0FC", "bank": "BA", "label": "Text_3EA_Dialog_YoudBetterListenOldPreacher", "category": "Dialog", "text_preview": "You'd better listen to the old preacher."}, {"index_hex": "3EB", "snes_addr": "BAD150", "bank": "BA", "label": "Text_3EB_Dialog_ChildrenRelyMeasProblem", "category": "Dialog", "text_preview": "Your children can rely on meas well:no problem,"}, {"index_hex": "3EC", "snes_addr": "BAD1B0", "bank": "BA", "label": "Text_3EC_Dialog_YearComingClose", "category": "Dialog", "text_preview": "This year is coming to a close."}, {"index_hex": "3ED", "snes_addr": "BAD1F6", "bank": "BA", "label": "Text_3ED_Dialog_HappyLiveHealthWholeYear", "category": "Dialog", "text_preview": "We are happy to live in health this whole year."}, {"index_hex": "3EE", "snes_addr": "BAD25E", "bank": "BA", "label": "Text_3EE_Dialog_PickTargetFornextYear", "category": "Dialog", "text_preview": "You should pick a target fornext year."}, {"index_hex": "3EF", "snes_addr": "BAD2AC", "bank": "BA", "label": "Text_3EF_Manual_SpringFinallyReturningSellSeeds", "category": "Manual", "text_preview": "Spring is finally returning.We'll sell seeds again at the shop so dropby."}, {"index_hex": "3F0", "snes_addr": "BAD344", "bank": "BA", "label": "Text_3F0_Dialog_SpringNewYearAreaSt", "category": "Dialog", "text_preview": "Spring is New Year in this area. <CTRL_B3>st day of Spring is New Year's Day."}, {"index_hex": "3F1", "snes_addr": "BAD3D4", "bank": "BA", "label": "Text_3F1_Dialog_HopeGoodYearBothUs", "category": "Dialog", "text_preview": "I hope it will be a good year for both of us."}, {"index_hex": "3F2", "snes_addr": "BAD436", "bank": "BA", "label": "Text_3F2_Animal_PrizeEggFestivalDifferentEvery", "category": "Animal", "text_preview": "The prize of the Egg Festival is different every year. What will they give this year?"}, {"index_hex": "3F3", "snes_addr": "BAD4F6", "bank": "BA", "label": "Text_3F3_Animal_EggFestivalHeldPublicSquare", "category": "Animal", "text_preview": "The Egg Festival will be held at the public square tomorrow."}, {"index_hex": "3F4", "snes_addr": "BAD57A", "bank": "BA", "label": "Text_3F4_Animal_WinAgainEggFestivalTomorrow", "category": "Animal", "text_preview": "I will win again at the Egg Festival tomorrow."}, {"index_hex": "3F5", "snes_addr": "BAD5D8", "bank": "BA", "label": "Text_3F5_Romance_MyAnnualEventBeginningYear", "category": "Romance", "text_preview": "My annual event at the beginning of the year is to go see the first sunrise."}, {"index_hex": "3F6", "snes_addr": "BAD67C", "bank": "BA", "label": "Text_3F6_Dialog_WasGoodYearTryBest", "category": "Dialog", "text_preview": "Hello, Was it a good year for you? Try our best next year too."}, {"index_hex": "3F7", "snes_addr": "BAD700", "bank": "BA", "label": "Text_3F7_Mountain_FishermanBackSoonWarmPlace", "category": "Sign", "text_preview": "The fisherman will be back here soon from a warm place."}, {"index_hex": "3F8", "snes_addr": "BAD772", "bank": "BA", "label": "Text_3F8_Romance_YearClosingSoonWishBecome", "category": "Romance", "text_preview": "This year is closing soon. I wish to become better eachyear but... It's a hard thing to achieve."}, {"index_hex": "3F9", "snes_addr": "BAD844", "bank": "BA", "label": "Text_3F9_Romance_YearEndingDevelopCompleteGreat", "category": "Romance", "text_preview": ".....this year is ending. I'll develop and complete a great machine next year."}, {"index_hex": "3FA", "snes_addr": "BAD8E6", "bank": "BA", "label": "Text_3FA_Weather_SmellDirtGettingStrongerAs", "category": "Weather", "text_preview": "The smell of the dirt is getting stronger as snow melts. Spring is near."}, {"index_hex": "3FB", "snes_addr": "BAD984", "bank": "BA", "label": "Text_3FB_Weather_SnowGaveUsHardTime", "category": "Weather", "text_preview": "Snow gave us a hard time butwill miss seeing the snow."}, {"index_hex": "3FC", "snes_addr": "BAD9F2", "bank": "BA", "label": "Text_3FC_Dialog_NowTonightLastNightYear", "category": "Dialog", "text_preview": "Now tonight is the last night of the year. Let's have a party. Cheers,"}, {"index_hex": "3FD", "snes_addr": "BADA8E", "bank": "BA", "label": "Text_3FD_Weather_LastJuiceDrinkSeeingSnow", "category": "Weather", "text_preview": "This is the last juice to drink seeing snow this year.Well:we can drink juice again seeing flowers soon."}, {"index_hex": "3FE", "snes_addr": "BADB66", "bank": "BA", "label": "Text_3FE_Sign_BetterGoHomeRestNow", "category": "Sign", "text_preview": "I'd better go home and rest now. I'm going up to the mountain top to see the first sunrise."}, {"index_hex": "3FF", "snes_addr": "BADC24", "bank": "BA", "label": "Text_3FF_Romance_ThankVeryMuchEverythingYear", "category": "Romance", "text_preview": "Thank you very much for everything this year. I'll do my best next year too."}, {"index_hex": "400", "snes_addr": "BADCC8", "bank": "BA", "label": "Text_400_Dialog_AhMrEdFieldAndmeadow", "category": "Dialog", "text_preview": "Ah:Mr.<CTRL_FFFD>eD:is your field andmeadow all right?"}, {"index_hex": "401", "snes_addr": "BADD22", "bank": "BA", "label": "Text_401_Dialog_ImportantHumanOvercomeDifficulties", "category": "Dialog", "text_preview": "It's important for a human to overcome difficulties."}, {"index_hex": "402", "snes_addr": "BADD8E", "bank": "BA", "label": "Text_402_Dialog_SuchHardTimeHadBut", "category": "Dialog", "text_preview": "Such a hard time you had, But experience teaches you alot."}, {"index_hex": "403", "snes_addr": "BADE08", "bank": "BA", "label": "Text_403_Dialog_VitalityImportantMenWorkOutside", "category": "Dialog", "text_preview": "Vitality is important for men to work outside."}, {"index_hex": "404", "snes_addr": "BADE6A", "bank": "BA", "label": "Text_404_Sign_ShopOpenCome", "category": "Sign", "text_preview": "The shop is open at <$00B7>:<CTRL_B2><CTRL_B2> so please come."}, {"index_hex": "405", "snes_addr": "BADEBC", "bank": "BA", "label": "Text_405_Church_EverybodyComeChurchPrayTomorrow", "category": "Church", "text_preview": "Everybody will come to church to pray tomorrow."}, {"index_hex": "406", "snes_addr": "BADF26", "bank": "BA", "label": "Text_406_Sign_FirstFortuneTellingMountainTop", "category": "Sign", "text_preview": "I'll do the first fortune-telling at the mountain top."}, {"index_hex": "407", "snes_addr": "BADFB2", "bank": "BA", "label": "Text_407_Animal_WinterGoodTimeFriendsLivestock", "category": "Animal", "text_preview": "winter is a good time to be friends with livestock. Well:with girls too."}, {"index_hex": "408", "snes_addr": "BAE04C", "bank": "BA", "label": "Text_408_Sign_TheresLotThingEatMountains", "category": "Sign", "text_preview": "There's not a lot of thing to eat in the mountains in winter so all the animals are in desperate to survive."}, {"index_hex": "409", "snes_addr": "BAE12A", "bank": "BA", "label": "Text_409_Sign_NeedLotsWoodWinterChop", "category": "Sign", "text_preview": "You need lots of wood in winter. Chop plenty of wood before the winter."}, {"index_hex": "40A", "snes_addr": "BAE1C0", "bank": "BA", "label": "Text_40A_Animal_UmmGetOutCloseyouEyes", "category": "Animal", "text_preview": "Umm:I can't get out when you are there. ....You closeyou eyes so get out first? Liar. ??????"}, {"index_hex": "40B", "snes_addr": "BAE280", "bank": "BA", "label": "Text_40B_Town_ManyPeopleComeWonder", "category": "Town", "text_preview": "Not many people come here. I wonder why."}, {"index_hex": "40C", "snes_addr": "BAE2D4", "bank": "BA", "label": "Text_40C_Dialog_VeryLittleLightAboveReaches", "category": "Dialog", "text_preview": "A very little light from above reaches the ground. Those herbs over there lives only with it."}, {"index_hex": "40D", "snes_addr": "BAE39A", "bank": "BA", "label": "Text_40D_Romance_NinasDreamLiveSurroundedFlowers", "category": "Romance", "text_preview": "Nina's dream is to live surrounded by flowers."}, {"index_hex": "40E", "snes_addr": "BAE400", "bank": "BA", "label": "Text_40E_Romance_FlowersLoveThemallLikeWeeds", "category": "Romance", "text_preview": "Not just flowers:I love themall like weeds and vegetable. I want to do garden forever."}, {"index_hex": "40F", "snes_addr": "BAE4B6", "bank": "BA", "label": "Text_40F_Church_LoveChurchBecauseSeemsWash", "category": "Church", "text_preview": "I love church because it seems to wash my mind."}, {"index_hex": "410", "snes_addr": "BAE51C", "bank": "BA", "label": "Text_410_Dialog_BestWork", "category": "Dialog", "text_preview": "Please do your best work."}, {"index_hex": "411", "snes_addr": "BAE552", "bank": "BA", "label": "Text_411_Dialog_AllRightFeelEaseKnowing", "category": "Dialog", "text_preview": "Are you all right? I feel ease knowing no one was hurt. But... that makes us feel the fear of the nature."}, {"index_hex": "412", "snes_addr": "BAE636", "bank": "BA", "label": "Text_412_Dialog_SurpriseUsSayingSomethingDecent", "category": "Dialog", "text_preview": "Hey:why don't you surprise us by saying something decent."}, {"index_hex": "413", "snes_addr": "BAE6B6", "bank": "BA", "label": "Text_413_Dialog_WasTerrifiedWasMyFirst", "category": "Dialog", "text_preview": "I was terrified. It was my first earthquake."}, {"index_hex": "414", "snes_addr": "BAE712", "bank": "BA", "label": "Text_414_Dialog_SeeRockUpCollapsed", "category": "Dialog", "text_preview": "Did you see the rock up there collapsed?"}, {"index_hex": "415", "snes_addr": "BAE76C", "bank": "BA", "label": "Text_415_Sign_HeardMysteriousSpringMountainRemember", "category": "Sign", "text_preview": "I've heard that there is a mysterious spring in this mountain. It is......I don't remember the place."}, {"index_hex": "416", "snes_addr": "BAE83E", "bank": "BA", "label": "Text_416_Dialog_LikeWinterBecauseFeelsKind", "category": "Dialog", "text_preview": "I don't like winter because it feels kind of lonely."}, {"index_hex": "417", "snes_addr": "BAE8A8", "bank": "BA", "label": "Text_417_Weather_BecauseHurricaneTheresLeakRoof", "category": "Weather", "text_preview": "Because of the hurricane: there's a leak in the roof. They are fixing it now."}, {"index_hex": "418", "snes_addr": "BAE948", "bank": "BA", "label": "Text_418_Animal_UumWantEgg", "category": "Animal", "text_preview": "Uum:I want an egg."}, {"index_hex": "419", "snes_addr": "BAE96E", "bank": "BA", "label": "Text_419_Dialog_SobAskAnyMoreIdiot", "category": "Dialog", "text_preview": "sob...I won't ask you any more. You idiot,"}, {"index_hex": "41A", "snes_addr": "BAE9C8", "bank": "BA", "label": "Text_41A_Diary_ThankMoneySavedBye", "category": "Diary", "text_preview": "Thank you. This is...the money I saved. Bye."}, {"index_hex": "41B", "snes_addr": "BAEA28", "bank": "BA", "label": "Text_41B_Animal_WantEggWantOneEgg", "category": "Animal", "text_preview": "I want an egg. I want just one egg.:so please,"}, {"index_hex": "41C", "snes_addr": "BAEA88", "bank": "BA", "label": "Text_41C_Dialog_Stable", "category": "Dialog", "text_preview": "\"Stable\""}, {"index_hex": "41D", "snes_addr": "BAEA9A", "bank": "BA", "label": "Text_41D_Dialog_CelebrationEesBirthdayYearNow", "category": "Dialog", "text_preview": "Celebration of <CTRL_FFFD>eE's birthday. It's been a year now. Time goes too fast."}, {"index_hex": "41E", "snes_addr": "BAEB3A", "bank": "BA", "label": "Text_41E_Dialog_WowCakeEfsBirthday", "category": "Dialog", "text_preview": "Wow:cake <CTRL_FFFD>eF's birthday:isn't it?"}, {"index_hex": "41F", "snes_addr": "BAEBA2", "bank": "BA", "label": "Text_41F_Dialog_WarmEnoughNowAniceDay", "category": "Dialog", "text_preview": "It's warm enough now. What anice day."}, {"index_hex": "420", "snes_addr": "BAEBEE", "bank": "BA", "label": "Text_420_Weather_VariousDisastersHappeninSummerBetter", "category": "Weather", "text_preview": "Various disasters can happenin summer so you better watch the weather forecast every day."}, {"index_hex": "421", "snes_addr": "BAECAA", "bank": "BA", "label": "Text_421_Dialog_AutumnSkyHigh", "category": "Dialog", "text_preview": "It's autumn...the sky is high."}, {"index_hex": "422", "snes_addr": "BAECEE", "bank": "BA", "label": "Text_422_Dialog_HopeAbleCookBetterStep", "category": "Dialog", "text_preview": "I hope I'll be able to cook better step by step. ......please be patient."}, {"index_hex": "423", "snes_addr": "BAED90", "bank": "BA", "label": "Text_423_Weather_WishHadHadTrainedLittle", "category": "Weather", "text_preview": "I wish I had had trained a little to be a wife."}, {"index_hex": "424", "snes_addr": "BAEDF2", "bank": "BA", "label": "Text_424_Manual_SpringSpringLetsPlantSeeds", "category": "Manual", "text_preview": "It's spring, Spring, Let's plant seeds,"}, {"index_hex": "425", "snes_addr": "BAEE50", "bank": "BA", "label": "Text_425_Dialog_MorningNiceBrightToday", "category": "Dialog", "text_preview": "Morning. It's so nice and bright today."}, {"index_hex": "426", "snes_addr": "BAEEA4", "bank": "BA", "label": "Text_426_Animal_HearWildDogsSometimesCome", "category": "Animal", "text_preview": "I hear wild dogs sometimes come around here. It's dangerous to keep fences broken."}, {"index_hex": "427", "snes_addr": "BAEF56", "bank": "BA", "label": "Text_427_Weather_RainsHavePutEgInside", "category": "Weather", "text_preview": "When it rains: we have to put <CTRL_FFFD>eG inside the house."}, {"index_hex": "428", "snes_addr": "BAEFC2", "bank": "BA", "label": "Text_428_Dialog_DarlingTakeEhEiWalk", "category": "Dialog", "text_preview": "Darling: please take <CTRL_FFFD>eH or <CTRL_FFFD>eI for a walk sometimes."}, {"index_hex": "429", "snes_addr": "BAF05A", "bank": "BA", "label": "Text_429_Dialog_WantRideEj", "category": "Dialog", "text_preview": "I want to ride on <CTRL_FFFD>eJ."}, {"index_hex": "42A", "snes_addr": "BAF088", "bank": "BA", "label": "Text_42A_Mountain_AhThingsLikeTemparaturePlace", "category": "Sign", "text_preview": "Ah:things like temparature of this place make it suitable for making berry juice."}, {"index_hex": "42B", "snes_addr": "BAF13A", "bank": "BA", "label": "Text_42B_Animal_OneWildGrapeJuiceBayberry", "category": "Animal", "text_preview": "This one is wild grape juice. This is bayberry: and this is cowberry. My uncle gave them to me. I want to share them with other people if possible."}, {"index_hex": "42C", "snes_addr": "BAF27A", "bank": "BA", "label": "Text_42C_Dialog_OneMadeSpringDrinkSoon", "category": "Dialog", "text_preview": "This is the one I made in spring. We can drink it soon."}, {"index_hex": "42D", "snes_addr": "BAF2F6", "bank": "BA", "label": "Text_42D_Dialog_PlayMachinesTimeBeingGoing", "category": "Dialog", "text_preview": "I won't play with machines for the time being. I'm going to stay at home."}, {"index_hex": "42E", "snes_addr": "BAF39C", "bank": "BA", "label": "Text_42E_Weather_SnowsLotThoseFencesOften", "category": "Weather", "text_preview": "It snows a lot so those fences are often broken."}, {"index_hex": "42F", "snes_addr": "BAF406", "bank": "BA", "label": "Text_42F_Dialog_HopeSpringComeSoon", "category": "Dialog", "text_preview": "I hope spring will come soon."}, {"index_hex": "430", "snes_addr": "BAF44A", "bank": "BA", "label": "Text_430_Town_BusyWorkingIwantGatherPeople", "category": "Town", "text_preview": "We are not busy working so Iwant to gather people here to have a party."}, {"index_hex": "431", "snes_addr": "BAF4DC", "bank": "BA", "label": "Text_431_Sign_SaySoundBurningWoodSmell", "category": "Sign", "text_preview": "Say:the sound of burning wood and the smell of the smoke make you nostalgic: don't they?"}, {"index_hex": "432", "snes_addr": "BAF598", "bank": "BA", "label": "Text_432_Dialog_AllGrassGroundGoneLooks", "category": "Dialog", "text_preview": "All the grass on the ground is gone. It looks lonesome."}, {"index_hex": "433", "snes_addr": "BAF608", "bank": "BA", "label": "Text_433_Church_HitMyMindButAs", "category": "Church", "text_preview": "Hey:it's just hit my mind but there are as many peopleas there are stars:right? So the probability of meeting a certain person is basically one out of millions. So I really thank God for having you at that ranch."}, {"index_hex": "434", "snes_addr": "BAF7C4", "bank": "BA", "label": "Text_434_Animal_ThoseStarsStillShinewhenBecome", "category": "Animal", "text_preview": "Will those stars still shinewhen we become really old?"}, {"index_hex": "435", "snes_addr": "BAF832", "bank": "BA", "label": "Text_435_Romance_GoodEveningIfIfInterested", "category": "Romance", "text_preview": "Good evening. If.. if you are interested:won't you go see the stars with me after this?"}, {"index_hex": "436", "snes_addr": "BAF8E6", "bank": "BA", "label": "Text_436_Romance_MayEverybodyHappyMayFine", "category": "Romance", "text_preview": "May everybody be happy and may you be fine all the time... OK:let's go home after seeing those stars as we do every year."}, {"index_hex": "437", "snes_addr": "BAF9EE", "bank": "BA", "label": "Text_437_Dialog_GladNowLetsHaveToast", "category": "Dialog", "text_preview": "I'm glad that you are here. Now let's have a toast, I want to spend time with you next year too if possible."}, {"index_hex": "438", "snes_addr": "BAFADE", "bank": "BA", "label": "Text_438_Dialog_HoneyahLateHavingWonderfulTime", "category": "Dialog", "text_preview": "HoneyAh:you are late. We are having a wonderful time. Come and join us."}, {"index_hex": "439", "snes_addr": "BAFB7C", "bank": "BA", "label": "Text_439_Romance_HeyiLookForwardShootingStar", "category": "Romance", "text_preview": ".........................HeyI look forward to the shooting star every year but with you I feel much happier."}, {"index_hex": "43A", "snes_addr": "BAFC68", "bank": "BA", "label": "Text_43A_Dialog_NextYearYearAfterMay", "category": "Dialog", "text_preview": ".......Next year:the year after that......may I be able to see stars with you like this."}, {"index_hex": "43B", "snes_addr": "BAFD24", "bank": "BA", "label": "Text_43B_Dialog_SayOftenSeesomeoneLateNight", "category": "Dialog", "text_preview": "......Say:we don't often seesomeone late at night like this:especially at a place like here....... Not like me but I'm kind of nervous.... .......Hey:are you listening to me?"}, {"index_hex": "43C", "snes_addr": "BAFE96", "bank": "BA", "label": "Text_43C_Dialog_HmmmFeelsGoodBestSpot", "category": "Dialog", "text_preview": "hmmm:it feels good. This is the best spot to see stars."}, {"index_hex": "43D", "snes_addr": "BAFF06", "bank": "BA", "label": "Text_43D_Weather_ThankButAnsweryouRightNow", "category": "Weather", "text_preview": "Thank you but I can't answeryou right now. If it's sunny:I'll be waiting for you at the church at noon on Saturday."}, {"index_hex": "43E", "snes_addr": "BB8000", "bank": "BB", "label": "Text_43E_Weather_SoundsGoodButNowiSunny", "category": "Weather", "text_preview": "What? It sounds good but nowI can't... On sunny Saturdays: I'll be waiting for you in front of the shop so please come before it gets dark."}, {"index_hex": "43F", "snes_addr": "BB812A", "bank": "BB", "label": "Text_43F_Weather_UummmAnswerNowIfSunny", "category": "Weather", "text_preview": "........Uummm:well:I can't answer now. If it's sunny...will you come to the mountain on Sunday? Before it gets dark....I'll be waiting for you there."}, {"index_hex": "440", "snes_addr": "BB8260", "bank": "BB", "label": "Text_440_Weather_AhSorryButAnswerYouright", "category": "Weather", "text_preview": "Ah:........well:I.... sorry but I can't answer youright now.... I'm visiting the livestock dealer's house so please go there if it's sunny. I'm expecting you."}, {"index_hex": "441", "snes_addr": "BB83AC", "bank": "BB", "label": "Text_441_Weather_HuhGotTalkMyGrandpa", "category": "Weather", "text_preview": ".........Huh? Really? well: I've got to talk to my grandpa.... If it's sunny on Saturday: please go to the mountain again:all right? I'll be waiting for you frommorning so come as early as you can."}, {"index_hex": "442", "snes_addr": "BB8548", "bank": "BB", "label": "Text_442_Dialog_MooS", "category": "Dialog", "text_preview": "It moo\"s..........."}, {"index_hex": "443", "snes_addr": "BB8570", "bank": "BB", "label": "Text_443_Dialog_MadeOverallCute", "category": "Dialog", "text_preview": "Hey:I made this overall. Isn't it cute?"}, {"index_hex": "444", "snes_addr": "BB85C6", "bank": "BB", "label": "Text_444_Dialog_MoneyHG", "category": "Dialog", "text_preview": "Money <CTRL_FFFC>h-<CTRL_B2>G"}, {"index_hex": "445", "snes_addr": "BB85E0", "bank": "BB", "label": "Text_445_Animal_CowCChickenC", "category": "Animal", "text_preview": "Cow <CTRL_FFFC>c<$003F> Chicken <CTRL_FFFC>c<$0040>"}, {"index_hex": "446", "snes_addr": "BB8634", "bank": "BB", "label": "Text_446_Dialog_StaminaD", "category": "Dialog", "text_preview": "Stamina <CTRL_FFFC>d:"}, {"index_hex": "447", "snes_addr": "BB864E", "bank": "BB", "label": "Text_447_Animal_CowsBestAffectionRateEk", "category": "Animal", "text_preview": "Cow's best affection rate <CTRL_FFFD>eK <CTRL_FFFC>d<$0042>"}, {"index_hex": "448", "snes_addr": "BB8698", "bank": "BB", "label": "Text_448_Romance_MariasLoveD", "category": "Romance", "text_preview": "Maria's love <CTRL_FFFC>dá"}, {"index_hex": "449", "snes_addr": "BB86BC", "bank": "BB", "label": "Text_449_Romance_AnnsLoveD", "category": "Romance", "text_preview": "Ann's love <CTRL_FFFC>dé"}, {"index_hex": "44A", "snes_addr": "BB86E0", "bank": "BB", "label": "Text_44A_Romance_NinasLoveD", "category": "Romance", "text_preview": "Nina's love <CTRL_FFFC>dí"}, {"index_hex": "44B", "snes_addr": "BB8704", "bank": "BB", "label": "Text_44B_Romance_EllensLoveD", "category": "Romance", "text_preview": "Ellen's love <CTRL_FFFC>d<$0046>"}, {"index_hex": "44C", "snes_addr": "BB8728", "bank": "BB", "label": "Text_44C_Romance_EvesLoveD", "category": "Romance", "text_preview": "Eve's love <CTRL_FFFC>dÀ"}, {"index_hex": "44D", "snes_addr": "BB874C", "bank": "BB", "label": "Text_44D_Shipping_AmountShippedTomatoesD", "category": "Shipping", "text_preview": "Amount of shipped tomatoes <CTRL_FFFC>d<$0048>"}, {"index_hex": "44E", "snes_addr": "BB878E", "bank": "BB", "label": "Text_44E_Shipping_AmountShippedCornD", "category": "Shipping", "text_preview": "Amount of shipped corn <CTRL_FFFC>d<$0049>"}, {"index_hex": "44F", "snes_addr": "BB87D0", "bank": "BB", "label": "Text_44F_Shipping_AmountShippedPotatoesD", "category": "Shipping", "text_preview": "Amount of shipped potatoes <CTRL_FFFC>d<$004A>"}, {"index_hex": "450", "snes_addr": "BB8812", "bank": "BB", "label": "Text_450_Shipping_AmountShippedTurnipsD", "category": "Shipping", "text_preview": "Amount of shipped turnips <CTRL_FFFC>dó"}, {"index_hex": "451", "snes_addr": "BB8854", "bank": "BB", "label": "Text_451_Sign_WoodHouse", "category": "Sign", "text_preview": "Wood house"}, {"index_hex": "452", "snes_addr": "BB886C", "bank": "BB", "label": "Text_452_Sign_SuperWoodHouse", "category": "Sign", "text_preview": "Super wood house"}, {"index_hex": "453", "snes_addr": "BB8890", "bank": "BB", "label": "Text_453_Sign_SuperDeluxeGreatWoodHouse", "category": "Sign", "text_preview": "Super deluxe great wood house"}, {"index_hex": "454", "snes_addr": "BB88E0", "bank": "BB", "label": "Text_454_Dialog_HappinessRateD", "category": "Dialog", "text_preview": "Happiness rate <CTRL_FFFC>dú"}, {"index_hex": "455", "snes_addr": "BB8908", "bank": "BB", "label": "Text_455_Dialog_FloristsCropsNoteTomatoCorn", "category": "Dialog", "text_preview": "Florist's crops note \"tomato: corn\" \"turnip: potato\" \"grass\"<CHOICE_OR_WAIT>d"}, {"index_hex": "456", "snes_addr": "BB89B6", "bank": "BB", "label": "Text_456_Manual_TomatoCornSeedsMustPlanted", "category": "Manual", "text_preview": "Tomato and corn seeds must be planted in summer. Notice: Never grow when planting in other seasons. Be able to have more fruits by watering after the harvest. Tomatoes grow quicker. Die in autumn. Shipping rate: Tomato!<"}, {"index_hex": "457", "snes_addr": "BB8BF6", "bank": "BB", "label": "Text_457_Manual_TurnipPotatoSeedsMustbePlanted", "category": "Manual", "text_preview": "Turnip and potato seeds mustbe planted in spring. They grow quicker than tomatoes and corn. turnip are a quick grower. Only one harvest per year. Shipping rate: Turnip!<CTRL_B3> piece <$00B8><CTRL_B2>G Potato!<CTRL_B3> p"}, {"index_hex": "458", "snes_addr": "BB8DD0", "bank": "BB", "label": "Text_458_Manual_GrassSeedsMustPlantedSpring", "category": "Manual", "text_preview": "Grass seeds must be planted from spring to summer. Cut by autumn. No need to water. Grass doesn't make money but it isimportant as feed to livestock."}, {"index_hex": "459", "snes_addr": "BB8F0E", "bank": "BB", "label": "Text_459_Animal_LivestockNoteCowChickenMilk", "category": "Animal", "text_preview": "Livestock note: \"Cow\" \"Chicken\" \"Milk\" \"Egg\" \"Grass\"<CHOICE_OR_WAIT>f"}, {"index_hex": "45A", "snes_addr": "BB8FB2", "bank": "BB", "label": "Text_45A_Weather_CowsSaleYoungOnesMilk", "category": "Weather", "text_preview": "Cows on sale are young ones that can't milk. Takes <CTRL_B4><CTRL_B3> days to grow large enough for milking. The key is to keep them awayfrom sickness: Don't forget to feed. Don't let them out when it rains:lightening:hu"}, {"index_hex": "45B", "snes_addr": "BB9280", "bank": "BB", "label": "Text_45B_Manual_EquipMilkerPointYButton", "category": "Manual", "text_preview": "Equip the milker and point Y button to a cow to milk. Only once a day. Cow's affection rate increases when being brushedor talked to. Cows you devote your affection to can produce middle-sized and large-sized milk."}, {"index_hex": "45C", "snes_addr": "BB9454", "bank": "BB", "label": "Text_45C_Weather_CowsEatGrownGrassGrass", "category": "Weather", "text_preview": "Cows eat well grown grass. When the grass is young: it's like not feeding: so be careful. Cut grass makes fodder. It's feed in rainy days and winter. Don't run out of it."}, {"index_hex": "45D", "snes_addr": "BB95BA", "bank": "BB", "label": "Text_45D_Weather_ChickensLayOneEggDay", "category": "Weather", "text_preview": "Chickens lay one egg a day. It doesn't lay eggs for <CTRL_B5> days when you forget to feed or it gets wet in the rain. They could be blown away when you let them outside during hurricane. Possibly to be eaten by wild dog"}, {"index_hex": "45E", "snes_addr": "BB978C", "bank": "BB", "label": "Text_45E_Animal_EggsBecomeChicksDayswhenIncubate", "category": "Animal", "text_preview": "Eggs become chicks in <CTRL_B5> dayswhen you incubate them. No feed is necessary for chicks. Chicks grow to chickens in <$00B9> days. If you increase the amount of chickens: the feed will run out so be careful"}, {"index_hex": "45F", "snes_addr": "BB9932", "bank": "BB", "label": "Text_45F_Diary_LessonsLovePresentConversationFestival", "category": "Diary", "text_preview": "\"Lessons of Love\" Present Conversation Festival Diary Marriage<CHOICE_OR_WAIT>f"}, {"index_hex": "460", "snes_addr": "BB99DC", "bank": "BB", "label": "Text_460_Romance_MostPortableThingsPresentsEvery", "category": "Romance", "text_preview": "Most portable things can be presents. Every girl has a different taste so observe their reactions. Expensive presents don't work all the time."}, {"index_hex": "461", "snes_addr": "BB9AFE", "bank": "BB", "label": "Text_461_Romance_ImportantTalkGirlLoveAs", "category": "Romance", "text_preview": "It's important to talk to a girl you love as much as possible."}, {"index_hex": "462", "snes_addr": "BB9B82", "bank": "BB", "label": "Text_462_Festival_FestivalsBestOpportunityGirlsSometimes", "category": "Festival", "text_preview": "Festivals are the best opportunity, Girls are sometimes at different places depending on the festival. Talk to her the day before and check out where she's going the next day. Lucky item is perfume."}, {"index_hex": "463", "snes_addr": "BB9D32", "bank": "BB", "label": "Text_463_Diary_GirlsImpressionYoucanFoundDiary", "category": "Diary", "text_preview": "The girls' impression of youcan be found in the diary ineach one's room. But don't look too often. Try you best to capture her heart,"}, {"index_hex": "464", "snes_addr": "BB9E42", "bank": "BB", "label": "Text_464_Animal_ItemMarriageProposalBlueFeather", "category": "Animal", "text_preview": "Item for marriage proposal is a blue feather. When the good impression rate gets higher:check out the peddleron Sunday. You need to enlarge your house to get married too."}, {"index_hex": "465", "snes_addr": "BB9FA4", "bank": "BB", "label": "Text_465_Animal_SeeEllenShesBehindPen", "category": "Animal", "text_preview": "I see:Ellen. She's behind the pen on Saturdays. She's at the public square on Star Night Festival night. For present:flowers are nice but milk milked by you or an egg willplease her:too."}, {"index_hex": "466", "snes_addr": "BBA138", "bank": "BB", "label": "Text_466_Sign_EveHmmGoBarAsmany", "category": "Sign", "text_preview": "Eve..hmm... Go to the bar asmany times as you can and goto the mountain on Saturdays and Sundays. For present:flowers or berries are good. She doesn't like fish so don't give it to her."}, {"index_hex": "467", "snes_addr": "BBA2C0", "bank": "BB", "label": "Text_467_Romance_SweetheartStayHappyForever", "category": "Romance", "text_preview": "Sweetheart......Stay happy forever."}, {"index_hex": "468", "snes_addr": "BBA30A", "bank": "BB", "label": "Text_468_Dialog_DarlingLikeBabyAbout", "category": "Dialog", "text_preview": "Hey:darling....I would like a baby. How about you?"}, {"index_hex": "469", "snes_addr": "BBA370", "bank": "BB", "label": "Text_469_Dialog_HoneyWorkTooHardWant", "category": "Dialog", "text_preview": ".........Honey:you work too hard. I want you to be with me more."}, {"index_hex": "46A", "snes_addr": "BBA3F2", "bank": "BB", "label": "Text_46A_Dialog_JlCCmGnMoney", "category": "Dialog", "text_preview": "<CTRL_FFFD>jL:<CTRL_FFFC>cã<CTRL_FFFD>cM of <CTRL_FFFD>gN. Money <CTRL_FFFC>hÓ<CTRL_B2>G"}, {"index_hex": "46B", "snes_addr": "BBA436", "bank": "BB", "label": "Text_46B_Dialog_JoCCpGqOclock", "category": "Dialog", "text_preview": "<CTRL_FFFD>jO:<CTRL_FFFC>c<$004F><CTRL_FFFD>cP of <CTRL_FFFD>gQ. It's <$
